      <div class="xf"><label>Budget Head</label><select onchange="fdDraft('budgetHead',this.value)"><option value="">Select\u2026</option>${heads.map(h=>`<option ${h===d.budgetHead?'selected':''}>${esc(h)}</option>`).join("")}</select></div>
      <div class="xf"><label>Payment To</label><select onchange="fdDraft('paymentTo',this.value)"><option value="NGO" ${d.paymentTo==="NGO"?'selected':''}>Partner NGO</option><option value="Vendor" ${d.paymentTo==="Vendor"?'selected':''}>Vendor (direct)</option></select></div>
      <div class="xf"><label>Grant Code</label><input value="${esc(d.grantCode)}" onchange="fdDraft('grantCode',this.value)" placeholder="GR-\u2026"></div>
      <div class="xf"><label>Less: Advance (\u20b9)</label><input inputmode="decimal" value="${d.advanceAdjusted||0}" onchange="fdDraft('advanceAdjusted',fdXlNum(this.value));var a=el('fdAdv');if(a)a.textContent='\u2212 '+fmtRsFull(FD_DRAFT.advanceAdjusted||0)"></div>
      <div class="xf grow"><label>Project / Programme</label><input value="${esc(d.projectName)}" onchange="fdDraft('projectName',this.value)" placeholder="e.g. Watershed programme"></div>
      <div class="xf grow"><label>Purpose / Narration</label><input value="${esc(d.purpose)}" onchange="fdDraft('purpose',this.value)" placeholder="Brief description of the claim"></div>
    </div>
    <div class="xl" id="fdXl"><table>
      <thead><tr><th class="xn">Sr.<br>No.</th><th>Description</th><th class="xr" style="width:170px">Amount (\u20b9)</th><th class="xn" style="width:36px"></th></tr></thead>
      <tbody id="fdLiBody">${d.lineItems.map((li,i)=>fdLiRow(li,i)).join("")}</tbody>
      <tfoot>
        <tr><td colspan="2" style="text-align:right">Total</td><td class="xr" id="fdLiTotal">${fmtRsFull(d.total)}</td><td></td></tr>
        <tr><td colspan="2" style="text-align:right">Less: Advance Adjusted</td><td class="xr" id="fdAdv">\u2212 ${fmtRsFull(d.advanceAdjusted||0)}</td><td></td></tr>
        <tr class="big"><td colspan="2" style="text-align:right">NET PAYABLE</td><td class="xr" id="fdNet">${fmtRsFull(d.netPayable)}</td><td></td></tr>
      </tfoot>
    </table></div>
    <div class="xltip">\ud83d\udca1 Tip: copy rows in Excel (Description \u21e5 Amount) and paste into any cell \u2014 rows fill automatically. &nbsp;<button class="btn sm ghost" onclick="fdAddLine()">+ Add row</button></div>
    ${d.paymentTo==="Vendor"?`<div style="padding:0 12px 4px"><div style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin:6px 0 4px">Vendor / Beneficiary</div>
    <div class="xl"><table>
      <thead><tr><th>Vendor Name</th><th>Account No.</th><th>IFSC</th><th>Bank &amp; Branch</th><th>PAN</th><th>GST</th></tr></thead>
      <tbody><tr>
        <td class="xlc"><input value="${esc(d.vendor.name)}" onchange="fdVend('name',this.value)"></td>
        <td class="xlc"><input value="${esc(d.vendor.ac)}" onchange="fdVend('ac',this.value)"></td>
        <td class="xlc"><input value="${esc(d.vendor.ifsc)}" onchange="fdVend('ifsc',this.value)"></td>
        <td class="xlc"><input value="${esc(d.vendor.bank)}" onchange="fdVend('bank',this.value)"></td>
        <td class="xlc"><input value="${esc(d.vendor.pan)}" onchange="fdVend('pan',this.value)"></td>
        <td class="xlc"><input value="${esc(d.vendor.gst)}" onchange="fdVend('gst',this.value)"></td>
      </tr></tbody></table></div></div>`:""}
    <div style="padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px solid var(--rule)">
      <span style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:700">Documents</span>
      ${d.docs.map((doc,i)=>`<span class="badge gray">${fdDocIcon(doc.type)} ${esc(doc.name)} <a style="color:var(--red);cursor:pointer;margin-left:4px" onclick="fdRmDoc(${i})">\u00d7</a></span>`).join("")}
      <button class="btn sm ghost" onclick="fdAddDoc()">+ Attach</button>
      <span style="margin-left:auto;display:flex;gap:8px">
        <button class="btn" onclick="fdXlClean();fdSaveDraft(false)">\ud83d\udcbe Save Draft</button>
        <button class="btn primary" onclick="fdXlClean();fdSaveDraft(true)">Submit for Verification \u2192</button>
        <button class="btn ghost" onclick="FD_DRAFT=null;fdGo('${"${fdRole()==='NGO'?'mine':'all'}"}')">Cancel</button>
      </span>
    </div>
  </div>`;
}
function fdLiRow(li,i){ return `<tr data-i="${i}">
  <td class="xn">${i+1}</td>
  <td class="xlc"><input data-r="${i}" data-c="0" value="${esc(li.desc)}" onkeydown="fdXlKey(event,${i},0)" onpaste="fdXlPaste(event,${i},0)" onchange="fdLi(${i},'desc',this.value)"></td>
  <td class="xlc xr"><input data-r="${i}" data-c="1" inputmode="decimal" value="${li.amount||0}" onkeydown="fdXlKey(event,${i},1)" onpaste="fdXlPaste(event,${i},1)" onchange="fdLiAmt(${i},fdXlNum(this.value))"></td>
  <td class="xn"><button class="xdel" tabindex="-1" onclick="fdRmLine(${i})">\u00d7</button></td></tr>`; }
function fdLiAmt(i,v){ const li=FD_DRAFT.lineItems[i]; if(!li)return; li.qty=1; li.rate=v; li.amount=v; fdRecalc(FD_DRAFT); fdRefreshTotals(); }
function fdXlNum(v){ const n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n)?0:n; }
function fdXlGoto(r,c){ setTimeout(function(){ const inp=document.querySelector('#fdXl input[data-r="'+r+'"][data-c="'+c+'"]'); if(inp){ inp.focus(); try{inp.select();}catch(e){} } },25); }
function fdXlKey(e,r,c){
  if(e.key==="Enter"){ e.preventDefault(); e.target.blur(); if(r>=FD_DRAFT.lineItems.length-1){ FD_DRAFT.lineItems.push({desc:"",qty:1,rate:0,amount:0}); render(); } fdXlGoto(r+1,c); }
  else if(e.key==="ArrowDown"&&r<FD_DRAFT.lineItems.length-1){ e.preventDefault(); e.target.blur(); fdXlGoto(r+1,c); }
  else if(e.key==="ArrowUp"&&r>0){ e.preventDefault(); e.target.blur(); fdXlGoto(r-1,c); }
}
function fdXlParse(t){ return String(t).replace(/\r/g,"").split("\n").filter(function(l){return l.trim()!=="";}).map(function(l){return l.split("\t");}); }
function fdXlPaste(e,r,c){
  let t=""; try{ t=(e.clipboardData||window.clipboardData).getData("text"); }catch(err){}
  if(!t || (t.indexOf("\t")<0 && t.indexOf("\n")<0)) return;
  e.preventDefault();
  const grid=fdXlParse(t), d=FD_DRAFT;
  grid.forEach(function(cells,ri){ const rr=r+ri;
    while(d.lineItems.length<=rr) d.lineItems.push({desc:"",qty:1,rate:0,amount:0});
    cells.forEach(function(val,ci){ const cc=c+ci;
      if(cc===0) d.lineItems[rr].desc=String(val).trim();
      else if(cc===1){ const n=fdXlNum(val); d.lineItems[rr].qty=1; d.lineItems[rr].rate=n; d.lineItems[rr].amount=n; }
    });
  });
  fdRecalc(d); render(); toast("Pasted "+grid.length+" row(s) from clipboard"); fdXlGoto(Math.min(r+grid.length-1,d.lineItems.length-1),c);
}
function fdXlClean(){ if(!FD_DRAFT)return; FD_DRAFT.lineItems=FD_DRAFT.lineItems.filter(function(li){ return (li.desc&&String(li.desc).trim()) || ((+li.qty||0)*(+li.rate||0))>0; }); fdRecalc(FD_DRAFT); }

function fdDraft(k,v){ FD_DRAFT[k]=v; if(k==="ngoId"||k==="paymentTo"){ render(); } else { fdRecalc(FD_DRAFT); fdRefreshTotals(); } }
function fdVend(k,v){ FD_DRAFT.vendor[k]=v; }
function fdAddLine(){ FD_DRAFT.lineItems.push({desc:"",qty:1,rate:0,amount:0}); render(); }
function fdRmLine(i){ FD_DRAFT.lineItems.splice(i,1); render(); }
function fdLi(i,k,v){ FD_DRAFT.lineItems[i][k]=v; fdRecalc(FD_DRAFT); const row=document.querySelector(`#fdLiBody tr[data-i="${i}"] [data-amt]`); if(row)row.textContent=fmtRsFull(FD_DRAFT.lineItems[i].amount); fdRefreshTotals(); }
function fdRefreshTotals(){ fdRecalc(FD_DRAFT); const t=el("fdLiTotal"); if(t)t.textContent=fmtRsFull(FD_DRAFT.total); const n=el("fdNet"); if(n)n.textContent=fmtRsFull(FD_DRAFT.netPayable); }
function fdAddDoc(){ showModal(modalShell("Attach","Attach Document",`<div class="field"><label>Document type</label><select id="fdDocType">${["Bill","Invoice","Annexure","Utilisation","Payment Request","Other"].map(t=>`<option>${t}</option>`).join("")}</select></div><div class="field" style="margin-top:10px"><label>File name</label><input id="fdDocName" placeholder="e.g. Contractor Bill #441.pdf"></div><div style="font-size:11px;color:var(--ink-3);margin-top:8px">Demo records the document reference. In production this uploads the actual file.</div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="fdConfirmDoc()">Attach</button>`)); }
function fdConfirmDoc(){ const name=el("fdDocName").value.trim(); if(!name){ toast("Enter a file name"); return; } FD_DRAFT.docs.push({name,type:el("fdDocType").value,by:fdMe()}); closeModal(); render(); }
function fdRmDoc(i){ FD_DRAFT.docs.splice(i,1); render(); }
function fdValidate(d){ const e=[]; if(!d.ngoId)e.push("Select an NGO"); if(!d.budgetHead)e.push("Select a budget head"); if(!d.lineItems.length||d.total<=0)e.push("Add at least one line item with an amount"); if(d.paymentTo==="Vendor"&&!d.vendor.name)e.push("Vendor name is required for direct vendor payment"); return e; }
function fdSaveDraft(submit){ fdRecalc(FD_DRAFT); if(submit){ const e=fdValidate(FD_DRAFT); if(e.length){ toast(e[0]); return; } } const ex=fdById(FD_DRAFT.id); if(ex){ Object.assign(ex,FD_DRAFT); } else { FD.notes.push(FD_DRAFT); fdLog(FD_DRAFT,"Created Debit Note","Draft created"); } const d=ex||FD_DRAFT; if(submit){ d.status="Submitted"; d.submittedAt=fdNow(); fdLog(d,"Submitted for Verification","Submitted to KRSF Vadali Accounts · "+fmtRsFull(d.netPayable),"accent"); fdSave(); FD_DRAFT=null; toast("Submitted for verification → Accounts"); fdGo("mine"); } else { fdSave(); FD_DRAFT=null; toast("Draft saved"); fdGo(fdRole()==="NGO"?"mine":"all"); } }
function fdSubmit(id){ const d=fdById(id); const e=fdValidate(d); if(e.length){ toast(e[0]); return; } d.status="Submitted"; d.submittedAt=fdNow(); fdLog(d,"Submitted for Verification","Submitted to KRSF Vadali Accounts","accent"); fdSave(); closeModal(); toast("Submitted → Accounts"); render(); }
function fdRespond(id){ showModal(modalShell("Respond","Respond & Resubmit",`<div class="field"><label>Response to the query</label><textarea id="fdResp" placeholder="Explain the correction made (revise the draft first to add documents)"></textarea></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="fdDoRespond('${id}')">Resubmit →</button>`)); }
function fdDoRespond(id){ const d=fdById(id); const r=(el("fdResp").value||"").trim(); if(d.queries&&d.queries.length){ const q=d.queries[d.queries.length-1]; if(!q.response) q.response=r||"Corrected and resubmitted."; } d.status="Resubmitted"; d.submittedAt=fdNow(); fdLog(d,"Resubmitted After Correction",r?("Response: "+r):"Revised and resubmitted","accent"); fdSave(); closeModal(); toast("Resubmitted → Accounts"); render(); }

/* ---------- VERIFICATION ENGINE (Accounts / Admin) ---------- */
function fdOpenVerify(id){
  if(!fdCanVerify()){ toast("Only the Accounts team can verify"); return; }
  const d=fdById(id); if(!d)return;
  if(d.status!=="AccountsVerification"){ d.status="AccountsVerification"; fdLog(d,"Accounts Verification Started","Opened for first-level verification"); fdSave(); }
  d.checklist=d.checklist||{};
  const body=`<div class="finfo" style="margin-bottom:14px"><div><div class="k">NGO</div><div class="v">${esc(fdNgoName(d.ngoId))}</div></div><div><div class="k">Net Payable</div><div class="v">${fmtRsFull(d.netPayable)}</div></div><div><div class="k">Budget Head</div><div class="v">${esc(d.budgetHead||"—")}</div></div><div><div class="k">Documents</div><div class="v">${d.docs.length} attached</div></div></div>
    <div class="panel" style="margin-bottom:14px"><div class="panel-h"><h3>Verification Checklist</h3><span class="note">complete all 7 before recommending</span></div><div style="padding:14px">${FD_CHECKLIST.map(c=>`<label class="fcheck ${d.checklist[c.k]?'on':''}" id="fdchk_${c.k}" onclick="fdToggleChk('${id}','${c.k}')"><span class="box">✓</span><span><span class="ct">${esc(c.t)}</span><span class="cs">${esc(c.s)}</span></span></label>`).join("")}</div></div>
    <div class="field"><label>Verification comment</label><textarea id="fdVComment" placeholder="Notes for Finance / NGO (required to return or reject)"></textarea></div>`;
  const foot=`<button class="btn danger" onclick="fdVerify('${id}','reject')">Reject</button><button class="btn" style="background:var(--amber);color:#fff;border-color:var(--amber)" onclick="fdVerify('${id}','return')">Send Back for Correction</button><button class="btn primary" id="fdRecBtn" onclick="fdVerify('${id}','recommend')">Recommend → Finance</button>`;
  showModal(modalShell("First-Level Verification · Accounts","Verify · "+esc(d.number), body, foot), true); fdUpdRec(d);
}
function fdToggleChk(id,k){ const d=fdById(id); d.checklist[k]=!d.checklist[k]; const e=el("fdchk_"+k); if(e)e.classList.toggle("on",d.checklist[k]); fdSave(); fdUpdRec(d); }
function fdChkDone(d){ return FD_CHECKLIST.every(c=>d.checklist[c.k]); }
function fdUpdRec(d){ const b=el("fdRecBtn"); if(!b)return; const ok=fdChkDone(d); const n=FD_CHECKLIST.filter(c=>d.checklist[c.k]).length; b.disabled=!ok; b.textContent=ok?"Recommend → Finance":`Recommend → Finance (${n}/7)`; }
function fdVerify(id,act){
  if(!fdCanVerify()){ toast("Not permitted"); return; }
  const d=fdById(id); const c=(el("fdVComment").value||"").trim();
  if(act==="recommend"){ if(!fdChkDone(d)){ toast("Complete all 7 checklist items first"); return; } d.accountsApproval={by:fdMe(),byName:fdMeName(),at:fdNow(),ip:fdIP(),comment:c||"Verified — all checks complete. Recommended for finance approval."}; d.status="FinanceReview"; fdLog(d,"Accounts Verified & Recommended","Checklist 7/7 complete. Forwarded to Finance."+(c?" Note: "+c:""),"green"); toast("Recommended → Finance"); }
  else if(act==="return"){ if(!c){ toast("Add a comment explaining what to correct"); return; } d.status="ReturnedForCorrection"; d.queries=d.queries||[]; d.queries.push({by:fdMe(),byName:fdMeName(),at:fdNow(),text:c}); fdLog(d,"Returned for Correction","Query: "+c,"amber"); toast("Sent back to NGO"); }
  else if(act==="reject"){ if(!c){ toast("Add a reason for rejection"); return; } d.status="Rejected"; fdLog(d,"Rejected by Accounts","Reason: "+c,"red"); toast("Debit note rejected"); }
  fdSave(); closeModal(); render();
}

/* ---------- APPROVAL ENGINE (Finance / Admin) ---------- */
function fdOpenApprove(id){
  if(!fdCanApprove()){ toast("Only Finance can approve"); return; }
  const d=fdById(id); if(!d)return; const high=d.netPayable>=1000000;
  const body=`<div class="finfo" style="margin-bottom:14px"><div><div class="k">NGO</div><div class="v">${esc(fdNgoName(d.ngoId))}</div></div><div><div class="k">Net Payable</div><div class="v" style="color:var(--accent)">${fmtRsFull(d.netPayable)}</div></div><div><div class="k">Budget Head</div><div class="v">${esc(d.budgetHead||"—")}</div></div><div><div class="k">Payment To</div><div class="v">${esc(d.paymentTo)}</div></div></div>
    ${high?`<div class="fbanner amber">★ High-value request (≥ ₹10 L) — scrutinise carefully.</div>`:""}
    ${fdApprovalCard("Verified by Accounts (Vadali)",d.accountsApproval,"violet")}
    <div class="panel" style="margin:6px 0 14px"><div class="panel-h"><h3>Line Items</h3></div><div class="tbl-wrap"><table><thead><tr><th>Particulars</th><th class="num">Amount</th></tr></thead><tbody>${d.lineItems.map(li=>`<tr><td>${esc(li.desc)}</td><td class="num">${fmtRsFull(li.amount)}</td></tr>`).join("")}<tr><td style="text-align:right;font-weight:700">Net Payable</td><td class="num" style="font-weight:800">${fmtRsFull(d.netPayable)}</td></tr></tbody></table></div></div>
    <div class="field"><label>Decision comment</label><textarea id="fdFComment" placeholder="Comment (required for rejection / clarification)"></textarea></div>`;
  const foot=`<button class="btn danger" onclick="fdApprove('${id}','reject')">Final Rejection</button><button class="btn" style="background:var(--amber);color:#fff;border-color:var(--amber)" onclick="fdApprove('${id}','clarify')">Request Clarification</button><button class="btn" onclick="fdApprove('${id}','sendback')">Send Back to Accounts</button><button class="btn green" onclick="fdApprove('${id}','approve')">Approve Fund Release ✓</button>`;
  showModal(modalShell("Final Approval Authority · Finance","Final Review · "+esc(d.number), body, foot), true);
}
function fdApprove(id,act){
  if(!fdCanApprove()){ toast("Not permitted"); return; }
  const d=fdById(id); const c=(el("fdFComment").value||"").trim();
  if(act==="approve"){ d.financeApproval={by:fdMe(),byName:fdMeName(),at:fdNow(),ip:fdIP(),comment:c||"Approved for fund release."}; d.status="Approved"; fdLog(d,"Finance Approved Fund Release","Final approval granted."+(c?" Note: "+c:""),"green"); toast("Approved — ready for fund release"); }
  else if(act==="reject"){ if(!c){ toast("Add a reason"); return; } d.status="Rejected"; fdLog(d,"Final Rejection by Finance","Reason: "+c,"red"); toast("Final rejection recorded"); }
  else if(act==="clarify"){ if(!c){ toast("Add the clarification needed"); return; } d.status="ReturnedForCorrection"; d.queries=d.queries||[]; d.queries.push({by:fdMe(),byName:fdMeName(),at:fdNow(),text:"[Finance] "+c}); fdLog(d,"Finance Requested Clarification","Query: "+c,"amber"); toast("Sent back for clarification"); }
  else if(act==="sendback"){ d.status="AccountsVerification"; d.checklist={}; fdLog(d,"Sent Back to Accounts","Returned to first-level verification."+(c?" Note: "+c:""),"amber"); toast("Sent back to Accounts"); }
  fdSave(); closeModal(); render();
}

/* ---------- FUND RELEASE (Finance / Admin) ---------- */
function fdReleaseView(){
  const pays=FD.payments.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)); const approved=FD.notes.filter(d=>d.status==="Approved");
  return `<div class="kpi-grid">${fdKpi("green","✓","Total Released",fmtRs(fdSum(pays.filter(p=>p.status==="Paid"),p=>p.amount)),pays.filter(p=>p.status==="Paid").length+" payments")}${fdKpi("amber","◷","Pending Release",fmtRs(fdSum(pays.filter(p=>p.status==="Pending"),p=>p.amount)),pays.filter(p=>p.status==="Pending").length+" in progress")}${fdKpi("accent","₹","Approved Awaiting",fmtRs(fdSum(approved,d=>d.netPayable)),approved.length+" notes")}${fdKpi("blue","#","Payment Records",pays.length,"this FY")}</div>
  ${approved.length?`<div class="panel" style="margin-bottom:16px"><div class="panel-h"><h3>Approved — Awaiting Fund Release</h3></div><div class="tbl-wrap"><table><thead><tr><th>DN No.</th><th>Beneficiary</th><th class="num">Amount</th><th>Approved</th><th></th></tr></thead><tbody>${approved.map(d=>`<tr><td class="mono" style="font-size:11.5px"><b>${esc(d.number)}</b></td><td>${esc(d.paymentTo==="Vendor"?(d.vendor.name||"Vendor"):fdNgoFull(d.ngoId))}</td><td class="num">${fmtRsFull(d.netPayable)}</td><td style="font-size:11.5px">${fdDate(d.financeApproval&&d.financeApproval.at)}</td><td style="text-align:right">${fdCanRelease()?`<button class="btn green sm" onclick="fdOpenRelease('${d.id}')">₹ Release</button>`:""}</td></tr>`).join("")}</tbody></table></div></div>`:""}
  <div class="panel"><div class="panel-h"><h3>Payment Records</h3></div><div class="tbl-wrap"><table><thead><tr><th>Payment ID</th><th>DN No.</th><th>Beneficiary</th><th class="num">Amount</th><th>Mode / UTR</th><th>Status</th></tr></thead><tbody>${pays.length?pays.map(p=>`<tr style="cursor:pointer" onclick="openFDN('${p.noteId}')"><td class="mono" style="font-size:11.5px"><b>${esc(p.number)}</b><div style="font-size:10.5px;color:var(--ink-3)">${fdDate(p.date)}</div></td><td class="mono" style="font-size:11.5px">${esc(p.dnNumber)}</td><td>${esc(p.beneficiary)}<div style="font-size:10.5px;color:var(--ink-3)">${esc(p.beneficiaryType)}</div></td><td class="num">${fmtRsFull(p.amount)}</td><td>${esc(p.mode)}<div style="font-size:10.5px;color:var(--ink-3)" class="mono">${esc(p.utr||"—")}</div></td><td><span class="badge ${p.status==="Paid"?"green":p.status==="Failed"?"red":"amber"}">${esc(p.status)}</span></td></tr>`).join(""):`<tr><td colspan="6"><div class="empty"><div class="mk">₹</div><p>No payments recorded yet.</p></div></td></tr>`}</tbody></table></div></div>`;
}
function fdOpenRelease(id){
  if(!fdCanRelease()){ toast("Only Finance can release funds"); return; }
  const d=fdById(id); if(!d)return; closeModal(); const ngo=ngoById(d.ngoId)||{}; const ben=d.paymentTo==="Vendor"?d.vendor:(ngo.bank||{}); const benName=d.paymentTo==="Vendor"?(d.vendor.name||"Vendor"):fdNgoFull(d.ngoId);
  const body=`<div class="fbanner green" style="margin-bottom:14px">Beneficiary: ${esc(benName)} · A/c ${esc(ben.ac||"—")} · ${esc(ben.ifsc||"")} ${esc(ben.bank||"")}</div><div class="fgrid2"><div class="field"><label>Amount (₹)</label><input id="fdpAmt" type="number" value="${d.netPayable}"></div><div class="field"><label>Payment Date</label><input id="fdpDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="field"><label>Payment Mode</label><select id="fdpMode"><option>NEFT</option><option>RTGS</option><option>IMPS</option><option>Cheque</option><option>Bank Transfer</option></select></div><div class="field"><label>UTR / Transaction No.</label><input id="fdpUtr" placeholder="e.g. UTR123456789012"></div><div class="field"><label>Bank Reference</label><input id="fdpRef" placeholder="Bank ref / cheque no."></div><div class="field"><label>Status</label><select id="fdpStatus"><option>Paid</option><option>Pending</option><option>Failed</option></select></div><div class="field" style="grid-column:1/-1"><label>Remarks</label><textarea id="fdpRemarks" placeholder="Optional"></textarea></div></div>`;
  showModal(modalShell("Fund Release · "+esc(d.number),"Record Fund Release", body,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn green" onclick="fdRelease('${id}')">Record &amp; Release ✓</button>`), true);
}
function fdRelease(id){
  if(!fdCanRelease()){ toast("Not permitted"); return; }
  const d=fdById(id); const amt=+el("fdpAmt").value, utr=el("fdpUtr").value.trim(), status=el("fdpStatus").value;

/* ---------------- sheet behaviours ---------------- */
function fdSalEdit(i,field,val){ const dk=fdSalDraftKey(fdSalNgoId(),fdSalMonth()); const rows=FD.salaryDrafts[dk]; if(!rows||!rows[i])return;
  rows[i][field]= field==="amount"? fdXlNum(val) : String(val);
  fdSave(); const t=el("fdSalTot"); if(t)t.textContent=fmtRsFull(fdSalTotal(rows)); }
function fdSalAddRow(){ const dk=fdSalDraftKey(fdSalNgoId(),fdSalMonth()); const rows=FD.salaryDrafts[dk]||fdSalRows(fdSalNgoId(),fdSalMonth()); rows.push(fdSalBlankRow()); fdSave(); render(); }
function fdSalDropRow(i){ const dk=fdSalDraftKey(fdSalNgoId(),fdSalMonth()); const rows=FD.salaryDrafts[dk]; if(rows){ rows.splice(i,1); fdSave(); render(); } }
function fdSalRepopulate(){ delete FD.salaryDrafts[fdSalDraftKey(fdSalNgoId(),fdSalMonth())]; fdSave(); render(); toast("Re-populated from employee master"); }
function fdSalGoto(r,c){ setTimeout(function(){ const inp=document.querySelector('#fdSalXl input[data-r="'+r+'"][data-c="'+c+'"]'); if(inp){ inp.focus(); try{inp.select();}catch(e){} } },25); }
function fdSalKey(e,r,c){ const rows=FD.salaryDrafts[fdSalDraftKey(fdSalNgoId(),fdSalMonth())]||[];
  if(e.key==="Enter"){ e.preventDefault(); e.target.blur(); if(r>=rows.length-1){ rows.push(fdSalBlankRow()); fdSave(); render(); } fdSalGoto(r+1,c); }
  else if(e.key==="ArrowDown"&&r<rows.length-1){ e.preventDefault(); e.target.blur(); fdSalGoto(r+1,c); }
  else if(e.key==="ArrowUp"&&r>0){ e.preventDefault(); e.target.blur(); fdSalGoto(r-1,c); } }
function fdSalPaste(e,r,c){
  let t=""; try{ t=(e.clipboardData||window.clipboardData).getData("text"); }catch(err){}
  if(!t || (t.indexOf("\t")<0 && t.indexOf("\n")<0)) return;
  e.preventDefault();
  const grid=fdXlParse(t); const dk=fdSalDraftKey(fdSalNgoId(),fdSalMonth()); const rows=FD.salaryDrafts[dk]||fdSalRows(fdSalNgoId(),fdSalMonth());
  grid.forEach(function(cells,ri){ const rr=r+ri; while(rows.length<=rr) rows.push(fdSalBlankRow());
    cells.forEach(function(val,ci){ const cc=c+ci; const f=FD_SAL_COLS[cc]; if(!f)return;
      rows[rr][f]= f==="amount"? fdXlNum(val) : String(val).trim(); }); });
  fdSave(); render(); toast("Pasted "+grid.length+" row(s)"); fdSalGoto(Math.min(r+grid.length-1,rows.length-1),c);
}
function fdSalToggle(empId){ const e=fdSalEmps(fdSalNgoId()).find(x=>x.id===empId); if(!e)return; e.active=e.active===false; delete FD.salaryDrafts[fdSalDraftKey(fdSalNgoId(),fdSalMonth())]; fdSave(); render(); }
function fdEmpDelete(empId){ const ngoId=fdSalNgoId();
  confirmAction("Remove this employee?","They will be removed from the master list. Past salary cycles and history are kept unchanged.",function(){ FD.employees[ngoId]=fdSalEmps(ngoId).filter(x=>x.id!==empId); delete FD.salaryDrafts[fdSalDraftKey(ngoId,fdSalMonth())]; fdSave(); closeModal(); render(); toast("Employee removed"); },"Remove",true); }

/* ---------------- PROCESS ---------------- */
function fdSalProcess(){
  fdSalEnsure();
  const ngoId=fdSalNgoId(), month=fdSalMonth();
  if(fdSalCycle(ngoId,month)){ toast("Salary for this month is already processed"); return; }
  let rows=(FD.salaryDrafts[fdSalDraftKey(ngoId,month)]||[]).filter(r=>(r.name&&r.name.trim())||fdSalAmt(r)>0);
  rows=rows.map(r=>({...r,amount:fdSalAmt(r),net:fdSalAmt(r)}));
  const total=fdSalTotal(rows);
  if(!rows.length||total<=0){ toast("Add employees with amounts first"); return; }
  const prof=fdSalProfile(ngoId);
  if(!(prof.bankAc&&prof.ifsc&&prof.bankName)){ toast("Set the NGO bank profile first (⚙ NGO Profile)"); return; }
  // upsert master so next month auto-populates
  const master=fdSalEmps(ngoId);
  rows.forEach(r=>{ let e=r.empId?master.find(x=>x.id===r.empId):null;
    if(!e){ e={id:genId("emp"),active:true}; master.push(e); r.empId=e.id; }
    Object.assign(e,{name:r.name,pan:r.pan,aadhar:r.aadhar,ac:r.ac,bank:r.bank,branch:r.branch,ifsc:r.ifsc,head:r.head||"Salary",particulars:r.particulars||"NEFT",amount:fdSalAmt(r),active:true});
  });
  const scrollNo=String(FD.scrollSeq++).padStart(4,"0");
  const ml=fdSalMonthLong(month);
  const d=fdNewNote(ngoId);
  d.budgetHead="Salary"; d.paymentTo="NGO";
  d.projectName=fdNgoFull(ngoId)+" — Staff Salary"; d.grantCode="SAL-"+month;
  d.purpose="Being Debit Note issued for reimbursement of salary and consultancy fees for the month of "+ml;
  d.lineItems=[{desc:"Debit Note for staff salary and consultancy fees for the month of "+ml+" (scroll ID - "+scrollNo+") (As Per Annexure A attached to this Debit Note)",qty:1,rate:total,amount:total}];
  d.docs=[{name:"Payment Scroll "+scrollNo+" — "+ml+".pdf",type:"Payment Request",by:fdMe()},{name:"Employee Details (Annexure A) — "+ml+".pdf",type:"Annexure",by:fdMe()}];
  fdRecalc(d);
  d.status="Submitted"; d.submittedAt=fdNow();
  FD.notes.push(d);
  fdLog(d,"Created Debit Note","Auto-generated by Employee & Salary module · "+rows.length+" payee(s) · scroll "+scrollNo);
  fdLog(d,"Submitted for Verification","Salary for "+ml+" · "+fmtRsFull(total)+" · routed to KRSF Vadali Accounts","accent");
  const cyc={id:genId("sal"),ngoId,month,scrollNo,rows,total,dnId:d.id,createdAt:fdNow(),createdBy:fdMe()};
  d.salaryCycleId=cyc.id;
  FD.salaryCycles.push(cyc);
  delete FD.salaryDrafts[fdSalDraftKey(ngoId,month)];
  fdSave(); render();
  toast("Salary processed — Debit Note "+d.number+" submitted + Payment Scroll "+scrollNo+" generated");
}

   If the NGO or Accounts team is not using the app, the Program team can
   record a debit note by uploading the actual PDF / Excel file. The file is
   stored in the record and viewable anytime. The note can be saved at the
   stage it reached offline (Submitted / Approved / Fund Released).
   =========================================================================== */
let FD_UP={files:[]};
function fdCanUpload(){ return ["Admin","Programme"].includes(fdRole()); }
function fdUploadView(){
  if(!fdCanUpload()) return `<div class="empty"><div class="mk">🔒</div><p>File upload is for the KRSF Program team.</p></div>`;
  const ngos=(DB&&DB.ngos)||[];
  if(!ngos.length) return `<div class="empty"><div class="mk">⚠</div><p>Add a Partner NGO first (Partner NGOs page).</p></div>`;
  const heads=(typeof BUDGET_CATS!=="undefined")?BUDGET_CATS:["Salary","Travel","Programme","Other"];
  return `
  <div class="fbanner accent">📄 For NGOs / Accounts teams not using the app — record a debit note here by uploading the actual <b>&nbsp;PDF or Excel&nbsp;</b> file. It enters the same register, repository, search and audit trail.</div>
  <div class="panel">
    <div class="panel-h"><h3>Upload Debit Note</h3><span class="note">minimal entry — the file is the document of record</span></div>
    <div class="xlbar">
      <div class="xf" style="min-width:200px"><label>Partner NGO</label><select id="upNgo">${ngos.map(n=>`<option value="${n.id}">${esc(n.name)}</option>`).join("")}</select></div>
      <div class="xf"><label>Budget Head</label><select id="upHead">${heads.map(h=>`<option>${esc(h)}</option>`).join("")}</select></div>
      <div class="xf"><label>Month</label><input type="month" id="upMonth"></div>
      <div class="xf"><label>Debit Note No. (from file, optional)</label><input id="upNo" placeholder="e.g. DB-07 — blank = auto"></div>
      <div class="xf"><label>Net Amount (₹)</label><input id="upAmt" inputmode="decimal" placeholder="0"></div>
      <div class="xf"><label>Processed offline up to</label><select id="upStatus" onchange="var u=el('upUtrWrap');if(u)u.style.display=this.value==='FundReleased'?'flex':'none'">
        <option value="Submitted">Submitted (Accounts will verify in app)</option>
        <option value="Approved">Approved (verified &amp; approved offline)</option>
        <option value="FundReleased">Fund Released (paid offline)</option>
      </select></div>
      <div class="xf" id="upUtrWrap" style="display:none"><label>UTR / Transaction No.</label><input id="upUtr" placeholder="UTR…"></div>
      <div class="xf grow"><label>Purpose / Remarks</label><input id="upPurpose" placeholder="e.g. Debit note for staff salary — April 2026"></div>
    </div>
    <div style="padding:14px">
      <label class="btn" style="cursor:pointer">📎 Choose PDF / Excel file(s)
        <input type="file" multiple accept=".pdf,.xls,.xlsx,.csv,.png,.jpg,.jpeg" style="display:none" onchange="fdUpFilePick(this)">
      </label>
      <span style="font-size:11px;color:var(--ink-3);margin-left:10px">PDF, Excel, CSV or images · up to ~2 MB per file</span>
      <div id="upFiles" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">${fdUpFileChips()}</div>
    </div>
    <div style="padding:10px 14px;border-top:1px solid var(--rule);display:flex;align-items:center;gap:10px">
      <span style="font-size:11.5px;color:var(--ink-2)">Every upload is stamped in the audit trail with your name, date, time &amp; IP.</span>
      <button class="btn green" style="margin-left:auto" onclick="fdUploadSave()">⬆ Save Debit Note Record</button>
    </div>
  </div>`;
}
function fdUpFileChips(){ return FD_UP.files.map((f,i)=>`<span class="badge gray">${fdDocIcon(f.type)} ${esc(f.name)} <span style="color:var(--ink-3)">(${Math.round(f.size/1024)} KB)</span> <a style="color:var(--red);cursor:pointer;margin-left:4px" onclick="FD_UP.files.splice(${i},1);el('upFiles').innerHTML=fdUpFileChips()">×</a></span>`).join("")||'<span style="font-size:11.5px;color:var(--ink-3)">No file chosen yet.</span>'; }
function fdUpDocType(name){ const n=String(name).toLowerCase(); if(n.endsWith(".pdf"))return"Bill"; if(n.endsWith(".xls")||n.endsWith(".xlsx")||n.endsWith(".csv"))return"Utilisation"; return"Annexure"; }
function fdUpFilePick(input){
  const files=Array.from(input.files||[]); input.value="";
  files.forEach(function(file){
    if(file.size>2*1024*1024){ toast(file.name+" is over 2 MB — please compress it"); return; }
    const rd=new FileReader();
    rd.onload=function(){ FD_UP.files.push({name:file.name,type:fdUpDocType(file.name),size:file.size,dataUrl:rd.result,by:fdMe()}); const w=el("upFiles"); if(w)w.innerHTML=fdUpFileChips(); };
    rd.readAsDataURL(file);
  });
}
function fdUploadSave(){
  if(!fdCanUpload()){ toast("Not permitted"); return; }
  const ngoId=el("upNgo").value, amt=fdXlNum(el("upAmt").value), status=el("upStatus").value;
  const month=el("upMonth").value, no=(el("upNo").value||"").trim(), utr=(el("upUtr").value||"").trim();
  const purpose=(el("upPurpose").value||"").trim();
  if(!ngoId){ toast("Select the NGO"); return; }
  if(!amt||amt<=0){ toast("Enter the net amount"); return; }
  if(!FD_UP.files.length){ toast("Attach the debit note file (PDF / Excel)"); return; }
  if(status==="FundReleased"&&!utr){ toast("Enter the UTR for a released payment"); return; }
  const d=fdNewNote(ngoId);
  if(no) d.number=no;
  d.budgetHead=el("upHead").value; d.paymentTo="NGO";
  d.projectName=fdNgoFull(ngoId)+(month?" — "+month:"");
  d.purpose=purpose||"Debit note uploaded as file"+(month?" for "+month:"");
  d.lineItems=[{desc:(purpose||"As per attached debit note file")+(month?" ("+month+")":""),qty:1,rate:amt,amount:amt}];
  d.docs=FD_UP.files.slice();
  fdRecalc(d);
  d.uploadedRecord=true;
  d.status="Submitted"; d.submittedAt=fdNow();
  FD.notes.push(d);
  fdLog(d,"Debit Note Uploaded (file)","Recorded by Program team from uploaded file · "+FD_UP.files.map(f=>f.name).join(", "));
  fdLog(d,"Submitted for Verification","File-based record · "+fmtRsFull(amt),"accent");
  if(status==="Approved"||status==="FundReleased"){
    d.checklist={}; FD_CHECKLIST.forEach(c=>d.checklist[c.k]=true);
    d.accountsApproval={by:fdMe(),byName:fdMeName()+" (offline record)",at:fdNow(),ip:fdIP(),comment:"Verified offline — debit note file on record."};
    fdLog(d,"Accounts Verified & Recommended","Marked as verified offline (file upload provision)","green");
    d.financeApproval={by:fdMe(),byName:fdMeName()+" (offline record)",at:fdNow(),ip:fdIP(),comment:"Approved offline — debit note file on record."};
    d.status="Approved";
    fdLog(d,"Finance Approved Fund Release","Marked as approved offline (file upload provision)","green");
  }
  if(status==="FundReleased"){
    const p=fdNewPayment(d); p.utr=utr; p.status="Paid"; p.remarks="Paid offline — recorded via file upload";
    FD.payments.push(p); d.paymentId=p.id; d.status="FundReleased";
    fdLog(d,"Fund Released",p.number+" · "+fmtRsFull(amt)+" · UTR "+utr+" (offline payment, file on record)","green");
  }
  FD_UP={files:[]};
  fdSave(); toast("Debit note recorded — "+d.number); FD_TAB="all"; render();
}
/* ---- real-file support in the regular Attach modal too ---- */
function fdAddDoc(){
  showModal(modalShell("Attach","Attach Document",
    `<div class="field"><label>Document type</label><select id="fdDocType">${["Bill","Invoice","Annexure","Utilisation","Payment Request","Other"].map(t=>`<option>${t}</option>`).join("")}</select></div>
     <div class="field" style="margin-top:10px"><label>Upload file (PDF / Excel / image — optional)</label><input type="file" id="fdDocFile" accept=".pdf,.xls,.xlsx,.csv,.png,.jpg,.jpeg"></div>
     <div class="field" style="margin-top:10px"><label>Or just record a file name</label><input id="fdDocName" placeholder="e.g. Contractor Bill #441.pdf"></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="fdConfirmDoc()">Attach</button>`));
}
function fdConfirmDoc(){
  const fileInp=el("fdDocFile"); const type=el("fdDocType").value;
  const file=fileInp&&fileInp.files&&fileInp.files[0];
  if(file){
    if(file.size>2*1024*1024){ toast(file.name+" is over 2 MB — please compress it"); return; }
    const rd=new FileReader();
    rd.onload=function(){ FD_DRAFT.docs.push({name:file.name,type,size:file.size,dataUrl:rd.result,by:fdMe()}); closeModal(); render(); toast("File attached"); };
    rd.readAsDataURL(file); return;
  }
  const name=(el("fdDocName").value||"").trim();
  if(!name){ toast("Choose a file or enter a file name"); return; }
  FD_DRAFT.docs.push({name,type,by:fdMe()}); closeModal(); render();
}
function fdOpenDoc(noteId,di){
  const d=fdById(noteId); const doc=d&&d.docs[di];
  if(!doc||!doc.dataUrl){ toast("This document is a reference only (no file stored)"); return; }
  const w=window.open("","_blank"); if(!w){ toast("Allow pop-ups to view"); return; }
  if(String(doc.dataUrl).startsWith("data:application/pdf")||String(doc.dataUrl).startsWith("data:image")){
    w.document.write('<html><head><title>'+esc(doc.name)+'</title></head><body style="margin:0"><iframe src="'+doc.dataUrl+'" style="border:none;width:100vw;height:100vh"></iframe></body></html>');
    w.document.close();
  } else {
    w.document.write('<html><body style="font-family:Arial;padding:30px"><p>Downloading <b>'+esc(doc.name)+'</b>…</p><a id="dl" href="'+doc.dataUrl+'" download="'+esc(doc.name)+'">Click here if it does not start</a><script>document.getElementById("dl").click();<\\/script></body></html>');
    w.document.close();
  }
}

</script>
</body>
</html>
