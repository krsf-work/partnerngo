/* =====================================================================
   INLINE SVG CHART HELPERS
   ===================================================================== */
function svgGroupedBars(rows, seriesNames, colors, money){
  const W=720, H=240, padL=58, padB=34, padT=16, padR=14;
  const plotW=W-padL-padR, plotH=H-padB-padT;
  const maxV = niceMax(Math.max(1, ...rows.flatMap(r=>r.series)));
  const groups = rows.length;
  const gw = plotW/groups;
  const barW = Math.min(14, gw/(seriesNames.length+1.4));
  const ticks=4;
  const fmtV = money? (v=>fmtRs(v)) : (v=>fmtN(v));
  const fmtFull = money? (v=>fmtRsFull(v)) : (v=>fmtN(v));
  const key = "gbars_"+Math.random().toString(36).slice(2,7);

  let grid="";
  for(let t=0;t<=ticks;t++){
    const y=padT+plotH-(plotH*t/ticks);
    const val=maxV*t/ticks;
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--rule)" stroke-width="1"/>`;
    grid+=`<text x="${padL-9}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" font-family="var(--mono)" fill="var(--ink-3)">${fmtV(val)}</text>`;
  }
  let cols="";
  const tipData = rows.map((r,i)=>{
    const gx=padL+gw*i+gw/2;
    let inner=`<rect class="chart-vguide" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}" fill="var(--paper-2)"/>`;
    r.series.forEach((v,si)=>{
      const h=v/maxV*plotH;
      const x=gx-(barW*seriesNames.length+2)/2 + si*(barW+2);
      const y=padT+plotH-h;
      const op=r.dim?0.42:1;
      inner+=`<rect class="chart-bar" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${Math.max(h,0).toFixed(1)}" rx="2" fill="${colors[si]}" opacity="${op}"/>`;
    });
    inner+=`<rect class="chart-hot" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}"
      onmousemove="chartHover(event,'${key}',${i})" onmouseleave="hideChartTip()"/>`;
    inner+=`<text x="${gx.toFixed(1)}" y="${H-padB+15}" text-anchor="middle" font-size="9.5" fill="var(--ink-3)" font-weight="600">${esc(r.label)}</text>`;
    cols+=`<g class="chart-col">${inner}</g>`;
    return { _tip:
      `<div class="tt-h">${esc(r.label)}${r.dim?' · not reported':''}</div>` +
      seriesNames.map((s,si)=>
        `<div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:${colors[si]}"></span>${esc(s)}</span><span class="tt-v">${fmtFull(r.series[si]||0)}</span></div>`
      ).join("")
    };
  });
  window._chartData[key] = tipData;
  const legend = seriesNames.map((s,i)=>
    `<span><span class="lg-sw" style="background:${colors[i]}"></span>${esc(s)}</span>`).join("");
  return `
    <div class="chart-legend">${legend}</div>
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" class="svg-chart" preserveAspectRatio="xMidYMid meet">
        ${grid}${cols}
      </svg>
    </div>`;
}

/* ---- shared chart helpers ---- */
/* round a max value up to a clean axis bound so tick labels read nicely */
function niceMax(v){
  if(v<=0) return 1;
  const mag = Math.pow(10, Math.floor(Math.log10(v)));
  const norm = v/mag;
  const step = norm<=1?1: norm<=2?2: norm<=2.5?2.5: norm<=5?5:10;
  return step*mag;
}
/* the global chart tooltip — created once, positioned in JS */
function chartTip(){
  let t = document.getElementById("chartTip");
  if(!t){
    t = document.createElement("div");
    t.id = "chartTip"; t.className = "chart-tip";
    document.body.appendChild(t);
  }
  return t;
}
function showChartTip(ev, html){
  const t = chartTip();
  t.innerHTML = html;
  t.classList.add("show");
  const pad = 14;
  let x = ev.clientX + pad, y = ev.clientY + pad;
  const r = t.getBoundingClientRect();
  if(x + r.width > window.innerWidth-8)  x = ev.clientX - r.width - pad;
  if(y + r.height > window.innerHeight-8) y = ev.clientY - r.height - pad;
  t.style.left = x+"px"; t.style.top = y+"px";
}
function hideChartTip(){
  const t = document.getElementById("chartTip");
  if(t) t.classList.remove("show");
}
/* stash chart row data so hover handlers can read it without giant inline strings */
window._chartData = window._chartData || {};
function chartHover(ev, key, idx){
  const rows = window._chartData[key];
  if(!rows || !rows[idx]) return;
  showChartTip(ev, rows[idx]._tip);
}

/* value-labelled grouped bars — interactive: hover a month for exact figures.
   rows: [{label, plan, actual, reported}]  */
function svgBudgetBars(rows){
  const W=760, H=300, padL=66, padB=44, padT=22, padR=18;
  const plotW=W-padL-padR, plotH=H-padB-padT;
  const maxV = niceMax(Math.max(1, ...rows.map(r=>Math.max(r.plan||0, r.reported?(r.actual||0):0))));
  const gw = plotW/rows.length;
  const barW = Math.min(16, gw/3.4);
  const gap = 3;
  const ticks=4;
  const key = "bbars_"+Math.random().toString(36).slice(2,7);

  let grid="";
  for(let t=0;t<=ticks;t++){
    const y=padT+plotH-(plotH*t/ticks);
    const val=maxV*t/ticks;
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--rule)" stroke-width="1"/>`;
    grid+=`<text x="${padL-10}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="10" font-family="var(--mono)" fill="var(--ink-3)">${fmtRs(val)}</text>`;
  }

  let cols="";
  const tipData = rows.map((r,i)=>{
    const gx=padL+gw*i+gw/2;
    const ph=(r.plan||0)/maxV*plotH;
    const px=gx-barW-gap/2;
    const py=padT+plotH-ph;
    const over=r.reported && r.actual>r.plan;
    let inner=`<rect class="chart-vguide" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}" fill="var(--paper-2)"/>`;
    inner+=`<rect class="chart-bar" x="${px.toFixed(1)}" y="${py.toFixed(1)}" width="${barW}" height="${Math.max(ph,0).toFixed(1)}" rx="3" fill="var(--blue-soft)" stroke="var(--blue)" stroke-width="1"/>`;
    if(r.reported){
      const ah=(r.actual||0)/maxV*plotH;
      const ax=gx+gap/2, ay=padT+plotH-ah;
      inner+=`<rect class="chart-bar" x="${ax.toFixed(1)}" y="${ay.toFixed(1)}" width="${barW}" height="${Math.max(ah,0).toFixed(1)}" rx="3" fill="var(--${over?'red':'accent'})"/>`;
    }
    // transparent full-height hotzone for reliable hover
    inner+=`<rect class="chart-hot" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}"
      onmousemove="chartHover(event,'${key}',${i})" onmouseleave="hideChartTip()"/>`;
    inner+=`<text x="${gx.toFixed(1)}" y="${H-padB+17}" text-anchor="middle" font-size="10.5" fill="var(--ink-2)" font-weight="600">${esc(r.label)}</text>`;
    cols+=`<g class="chart-col">${inner}</g>`;
    // tooltip html
    const dvar = r.reported ? (r.actual-r.plan) : null;
    return { _tip:
      `<div class="tt-h">${esc(r.label)}</div>
       <div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--blue-soft);border:1px solid var(--blue)"></span>Planned</span><span class="tt-v">${fmtRsFull(r.plan||0)}</span></div>
       ${r.reported
         ? `<div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--${over?'red':'accent'})"></span>Actual</span><span class="tt-v">${fmtRsFull(r.actual||0)}</span></div>
            <div class="tt-d" style="color:${dvar>0?'#ff9b8a':'#9be3c4'}">${dvar>=0?'+':''}${fmtRsFull(dvar)} ${dvar>0?'over plan':'under plan'}</div>`
         : `<div class="tt-d">Not yet reported</div>`}`
    };
  });
  window._chartData[key] = tipData;

  return `
    <div class="chart-legend">
      <span><span class="lg-sw" style="background:var(--blue-soft);border:1px solid var(--blue)"></span>Planned</span>
      <span><span class="lg-sw" style="background:var(--accent)"></span>Actual</span>
      <span><span class="lg-sw" style="background:var(--red)"></span>Actual · over plan</span>
    </div>
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" class="svg-chart" preserveAspectRatio="xMidYMid meet">
        ${grid}${cols}
      </svg>
    </div>`;
}

/* cumulative line chart — running planned total vs running actual.
   Interactive: hover any month for exact running figures and the gap.
   pts: [{label, cumPlan, cumActual, reported}]  */
function svgCumulativeLine(pts){
  const W=760, H=320, padL=70, padB=44, padT=22, padR=20;
  const plotW=W-padL-padR, plotH=H-padB-padT;
  const maxV = niceMax(Math.max(1, ...pts.map(p=>Math.max(p.cumPlan||0, p.reported?(p.cumActual||0):0))));
  const ticks=4;
  const x = i => padL + (pts.length>1? plotW*i/(pts.length-1) : plotW/2);
  const y = v => padT + plotH - (v/maxV*plotH);
  const key = "cline_"+Math.random().toString(36).slice(2,7);

  let grid="";
  for(let t=0;t<=ticks;t++){
    const gy=padT+plotH-(plotH*t/ticks);
    grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="var(--rule)" stroke-width="1"/>`;
    grid+=`<text x="${padL-10}" y="${(gy+3.5).toFixed(1)}" text-anchor="end" font-size="10" font-family="var(--mono)" fill="var(--ink-3)">${fmtRs(maxV*t/ticks)}</text>`;
  }
  let xlab="";
  pts.forEach((p,i)=>{
    xlab+=`<text x="${x(i).toFixed(1)}" y="${H-padB+17}" text-anchor="middle" font-size="10.5" fill="var(--ink-2)" font-weight="600">${esc(p.label)}</text>`;
  });

  const planPath = pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(p.cumPlan).toFixed(1)}`).join(" ");
  const rep = pts.map((p,i)=>({i,p})).filter(o=>o.p.reported);
  const actPath = rep.map((o,k)=>`${k?'L':'M'}${x(o.i).toFixed(1)},${y(o.p.cumActual).toFixed(1)}`).join(" ");

  // shaded gap between the two cumulative lines (over = red, under = green)
  let gapFill="";
  if(rep.length>1){
    const last=rep[rep.length-1];
    const over=last.p.cumActual>last.p.cumPlan;
    const top = rep.map(o=>`${x(o.i).toFixed(1)},${y(o.p.cumActual).toFixed(1)}`).join(" ");
    const bot = rep.slice().reverse().map(o=>`${x(o.i).toFixed(1)},${y(o.p.cumPlan).toFixed(1)}`).join(" ");
    gapFill=`<polygon points="${top} ${bot}" fill="var(--${over?'red':'green'})" opacity="0.13"/>`;
  }

  // dots
  let planDots="", actDots="";
  pts.forEach((p,i)=>{
    planDots+=`<circle cx="${x(i).toFixed(1)}" cy="${y(p.cumPlan).toFixed(1)}" r="3" fill="var(--blue)" opacity="0.6"/>`;
  });
  rep.forEach(o=>{
    const over=o.p.cumActual>o.p.cumPlan;
    actDots+=`<circle class="chart-pt" cx="${x(o.i).toFixed(1)}" cy="${y(o.p.cumActual).toFixed(1)}" r="4.5" fill="var(--${over?'red':'accent'})" stroke="var(--card)" stroke-width="1.8"/>`;
  });

  // interactive hover columns + tooltip data
  let hot="";
  const colW = pts.length>1 ? plotW/(pts.length-1) : plotW;
  const tipData = pts.map((p,i)=>{
    const cx=x(i);
    hot+=`<g class="chart-col">
      <line class="chart-vguide" x1="${cx.toFixed(1)}" y1="${padT}" x2="${cx.toFixed(1)}" y2="${padT+plotH}" stroke="var(--rule-2)" stroke-width="1" stroke-dasharray="3 3"/>
      <rect class="chart-hot" x="${(cx-colW/2).toFixed(1)}" y="${padT}" width="${colW.toFixed(1)}" height="${plotH}"
        onmousemove="chartHover(event,'${key}',${i})" onmouseleave="hideChartTip()"/>
    </g>`;
    const diff = p.reported ? (p.cumActual-p.cumPlan) : null;
    const over = diff!=null && diff>0;
    return { _tip:
      `<div class="tt-h">By ${esc(p.label)}</div>
       <div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--blue)"></span>Planned (cumulative)</span><span class="tt-v">${fmtRsFull(p.cumPlan||0)}</span></div>
       ${p.reported
         ? `<div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--accent)"></span>Actual (cumulative)</span><span class="tt-v">${fmtRsFull(p.cumActual||0)}</span></div>
            <div class="tt-d" style="color:${over?'#ff9b8a':'#9be3c4'}">${over?'Over':'Under'} plan by ${fmtRsFull(Math.abs(diff))}</div>`
         : `<div class="tt-d">Not yet reported</div>`}`
    };
  });
  window._chartData[key] = tipData;

  return `
    <div class="chart-legend">
      <span><span class="lg-sw" style="background:var(--blue);opacity:.6"></span>Cumulative planned</span>
      <span><span class="lg-sw" style="background:var(--accent)"></span>Cumulative actual</span>
    </div>
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" class="svg-chart" preserveAspectRatio="xMidYMid meet">
        ${grid}
        ${gapFill}
        <path d="${planPath}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-dasharray="6 4" opacity="0.75"/>
        ${actPath?`<path d="${actPath}" fill="none" stroke="var(--accent)" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>`:''}
        ${planDots}${actDots}
        ${xlab}
        ${hot}
      </svg>
    </div>`;
}

function svgDonut(done,notDone,pending,pctLabel){
  const total=done+notDone+pending||1;
  const r=22, C=2*Math.PI*r, cx=28, cy=28;
  const segs=[
    {v:done,    col:"var(--green)"},
    {v:notDone, col:"var(--red)"},
    {v:pending, col:"var(--amber)"}
  ];
  let off=0, circles="";
  segs.forEach(s=>{
    const len=s.v/total*C;
    if(len>0){
      circles+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.col}"
        stroke-width="8" stroke-dasharray="${len} ${C}" stroke-dashoffset="${-off}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
    }
    off+=len;
  });
  return `<div class="donut-c">
    <svg width="54" height="54" viewBox="0 0 56 56">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--rule)" stroke-width="8"/>
      ${circles}
    </svg>
    <div class="dn-mid">${pctLabel}%</div>
  </div>`;
}

function svgRadar(dims){
  const N=dims.length, cx=150, cy=150, R=110, max=5;
  const angle=i=>(-Math.PI/2)+(2*Math.PI*i/N);
  const pt=(i,rad)=>[cx+Math.cos(angle(i))*rad, cy+Math.sin(angle(i))*rad];

  let rings="";
  for(let g=1;g<=max;g++){
    const pts=dims.map((_,i)=>pt(i,R*g/max).join(",")).join(" ");
    rings+=`<polygon points="${pts}" fill="none" stroke="var(--rule)" stroke-width="1"/>`;
  }
  let spokes="", labels="";
  dims.forEach((d,i)=>{
    const [ex,ey]=pt(i,R);
    spokes+=`<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="var(--rule)" stroke-width="1"/>`;
    const [lx,ly]=pt(i,R+18);
    const anchor = Math.abs(lx-cx)<8?"middle":(lx>cx?"start":"end");
    labels+=`<text x="${lx}" y="${ly+3}" text-anchor="${anchor}" font-size="9" fill="var(--ink-2)" font-weight="600">${esc(d.key)}</text>`;
  });
  const dataPts=dims.map((d,i)=>pt(i,R*d.score/max).join(",")).join(" ");
  return `
    <svg viewBox="0 0 300 300" width="280" height="280">
      ${rings}${spokes}
      <polygon points="${dataPts}" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="2"/>
      ${dims.map((d,i)=>{const[x,y]=pt(i,R*d.score/max);return `<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`;}).join("")}
      ${labels}
    </svg>`;
}

/* one editable scroll-line row */
function scrollRowHtml(line, i){
  return `<tr class="scroll-row">
    <td><input type="text" class="sc-id" value="${esc(line.scrollId||'')}" placeholder="Scroll ID e.g. 0001"></td>
    <td><input type="number" class="sc-amt" value="${line.amount!==''&&line.amount!=null?line.amount:''}"
         placeholder="Amount ₹" oninput="recalcScrollTotal()"></td>
    <td><button type="button" class="sc-del" onclick="removeScrollRow(this)" title="Remove">×</button></td>
  </tr>`;
}
function addScrollRow(){
  const tb = el("dfScrolls");
  if(!tb) return;
  const tmp = document.createElement("tbody");
  tmp.innerHTML = scrollRowHtml({scrollId:"",amount:""}, tb.children.length);
  tb.appendChild(tmp.firstElementChild);
}
function removeScrollRow(btn){
  const tb = el("dfScrolls");
  const row = btn.closest("tr");
  if(tb && tb.children.length>1) row.remove();
  else { row.querySelector(".sc-id").value=""; row.querySelector(".sc-amt").value=""; }
  recalcScrollTotal();
}
function readScrollLines(){
  return Array.from(document.querySelectorAll("#dfScrolls .scroll-row")).map(r=>({
    scrollId: r.querySelector(".sc-id").value.trim(),
    amount: parseFloat(r.querySelector(".sc-amt").value)||0
  }));
}
function recalcScrollTotal(){
  const total = readScrollLines().reduce((s,l)=>s+l.amount,0);
  const el2 = el("dfTotal");
  if(el2) el2.textContent = fmtRsFull(total);
}

/* sync the Reporting Month dropdown whenever the note date changes */
function syncDebitMonth(){
  const raw = (el("dfDate")||{}).value || "";
  if(raw.length < 7) return;
  const ym = raw.slice(0, 7);
  const sel = el("dfMonth");
  if(sel && FY_MONTHS.includes(ym)) sel.value = ym;
}

/* read the Drive-link filename and pre-fill debit number + month */
function debitParseLink(){
  const url = (el("dfUrl")?el("dfUrl").value:"") || "";
  const msg = el("dfParseMsg");
  let txt = "";
  try{ txt = decodeURIComponent(url); }catch(e){ txt = url; }
  // debit note number — DB-01, DN-12, etc.
  const noEl = el("dfNo");
  const numM = txt.match(/\b(D[BN][-\s]?\d{1,3})\b/i);
  if(numM && noEl && !noEl.value.trim()){
    noEl.value = numM[1].toUpperCase().replace(/\s/g,"-");
  }
  // month name + year → FY month value
  const months = {january:"01",february:"02",march:"03",april:"04",may:"05",june:"06",
    july:"07",august:"08",september:"09",october:"10",november:"11",december:"12"};
  const mM = txt.toLowerCase().match(/(january|february|march|april|may|june|july|august|september|october|november|december)[\s_-]*(\d{4})/);
  if(mM){
    const val = mM[2]+"-"+months[mM[1]];
    if(FY_MONTHS.includes(val) && el("dfMonth")) el("dfMonth").value = val;
  }
  if(msg){
    if(numM || mM){
      msg.style.color = "var(--green)";
      msg.innerHTML = "✓ Read from the file name"
        + (numM?` — number <b>${esc((numM[1]||'').toUpperCase().replace(/\s/g,'-'))}</b>`:"")
        + (mM?`, month <b>${esc(monthLong(mM[2]+'-'+months[mM[1]]))}</b>`:"")
        + ". Check and adjust below.";
    } else {
      msg.style.color = "var(--ink-3)";
      msg.textContent = "Link saved. Fill in the number and month below.";
    }
  }
}

/* infer the budget category from free text on the debit note */
function guessDebitCategory(text){
  const t = (text||"").toLowerCase();
  if(/salary|stipend|honorar|wage|payroll|remuner/.test(t)) return "Salary";
  if(/travel|conveyance|fuel|transport|mileage|fare|ta\/da|tada/.test(t)) return "Travel";
  if(/admin|office|rent|utility|stationery|audit|bank charge|misc/.test(t)) return "Other";
  if(/programme|program|training|workshop|field|activity|material|equipment|event/.test(t)) return "Programme";
  return "Programme";
}

/* ---- read a debit-note Excel file and auto-fill the whole form ----
   Forgiving by design: scans every sheet, finds the header row wherever it
   sits, and maps columns by recognising their names. */
function importDebitExcel(){
  const inp = el("dfXls");
  const msg = el("dfXlsMsg");
  if(!inp || !inp.files || !inp.files[0]) return;
  if(typeof XLSX==="undefined"){
    if(msg){ msg.style.color="var(--red)"; msg.textContent="Spreadsheet reader didn't load — check your connection and retry."; }
    return;
  }
  const file = inp.files[0];
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const wb = XLSX.read(reader.result, {type:"array"});

      // ---- gather every sheet as its own grid (don't merge — sheets have
      //      different table shapes; merging loses the per-table structure) ----
      const sheets = wb.SheetNames.map(sn=>({
        name: sn,
        rows: XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:""})
               .map(r=>r.map(c=>String(c).trim()))
      }));
      const allFlat = [].concat(...sheets.map(s=>s.rows));
      const joined = allFlat.map(r=>r.join(" | ")).join("\n");

      // ---- debit note number: DB-01, DN-12 etc., anywhere in the workbook ----
      let dnNo = "";
      const numM = joined.match(/\b(D[BN][-\s]?\d{1,3})\b/i);
      if(numM) dnNo = numM[1].toUpperCase().replace(/\s/g,"-");

      // ---- reporting month: prefer the explicit "…for April 2026" phrase ----
      let phraseYm = "";
      {
        const monthsMap={january:"01",february:"02",march:"03",april:"04",may:"05",june:"06",july:"07",august:"08",september:"09",october:"10",november:"11",december:"12"};
        const mM = joined.toLowerCase().match(/(?:for|month of)\s+(january|february|march|april|may|june|july|august|september|october|november|december)[\s_-]*(\d{4})/);
        if(mM){ const ym = mM[2]+"-"+monthsMap[mM[1]]; if(FY_MONTHS.includes(ym)) phraseYm = ym; }
      }

      // ---- no number inside the file? suggest the next one for this NGO ----
      // (these salary scrolls carry no DB-/DN- number, so we always fall back
      //  to a suggestion — never leave the field empty)
      let dnSuggested = false;
      if(!dnNo){
        const ngoForSuggest = (typeof window._dfNgoId!=="undefined") ? window._dfNgoId : "";
        let mx = 0;
        (DB.debits||[]).filter(d=>!ngoForSuggest || d.ngoId===ngoForSuggest).forEach(d=>{
          const m = String(d.dnNo||"").match(/(\d{1,4})\s*$/); if(m) mx = Math.max(mx, +m[1]);
        });
        dnNo = "DB-"+String(mx+1).padStart(2,"0"); dnSuggested = true;
      }

      // ---- date: prefer one on a line that mentions the debit-note date ----
      let isoDate = "";
      const toIso = (d1,m1,y1)=>{
        if(String(y1).length===2) y1="20"+y1;
        return y1+"-"+String(m1).padStart(2,"0")+"-"+String(d1).padStart(2,"0");
      };
      // first look for a row containing "Date" near the top (the note's own date)
      for(const row of allFlat){
        const line = row.join(" ");
        if(/debit\s*no|date\s*[:.]/i.test(line)){
          // strip ordinal suffixes (16th, 1st, 2nd, 3rd) so the date parses
          const clean = line.replace(/(\d)(st|nd|rd|th)\b/gi,"$1");
          const m = clean.match(/(\d{1,2})[-./\s]+(\d{1,2}|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*[-./ ,]+(\d{2,4})/i);
          if(m){
            const mon = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
            let mm = isNaN(+m[2]) ? mon[m[2].toLowerCase().slice(0,3)] : +m[2];
            if(mm){ isoDate = toIso(m[1],mm,m[3]); break; }
          }
        }
      }
      // fall back to the first date anywhere
      if(!isoDate){
        const dM = joined.match(/\b(\d{1,2})[-./](\d{1,2})[-./](\d{2,4})\b/);
        if(dM) isoDate = toIso(dM[1],dM[2],dM[3]);
        const ymM = joined.match(/\b(20\d{2})[-./](\d{1,2})[-./](\d{1,2})\b/);
        if(ymM && !isoDate) isoDate = ymM[1]+"-"+String(ymM[2]).padStart(2,"0")+"-"+String(ymM[3]).padStart(2,"0");
        // Excel stores dates as serial numbers (e.g. "Date of Entry" cells) — convert the first one found
        if(!isoDate){
          outer: for(const row of allFlat){
            for(const cell of row){
              if(/^[45][0-9]{4}(\.0+)?$/.test(cell)){
                const ser = parseFloat(cell);
                if(ser>40000 && ser<60000){
                  const dt = new Date(Math.round((ser-25569)*86400*1000)+12*3600*1000);
                  isoDate = dt.getUTCFullYear()+"-"+String(dt.getUTCMonth()+1).padStart(2,"0")+"-"+String(dt.getUTCDate()).padStart(2,"0");
                  break outer;
                }
              }
            }
          }
        }
      }

      // ---- find the BEST data table across all sheets ----
      // For each sheet: locate a header row (one with an amount-like column),
      // then count the data rows beneath it. The table with the MOST data rows
      // wins — that's the detailed expense/scroll breakdown, not a 1-line summary.
      // Liberal column matching — normalise to lowercase letters only, then
      // check for any of these substrings anywhere in the cell text.
      const isAmtCol = c => (/amt|amount|payment|paid|value/.test(c) || /^rs$|^inr$|^amtrs$/.test(c)) && !/bank|account|acno|pan|ifsc|aadhar|date/.test(c);
      const isIdCol  = c => /scroll|srno|slno|sno|^sr$|^sl$|^no$|serial|entryno/.test(c);
      let best = null;   // {lines:[…], descText:''}
      sheets.forEach(({name: sheetName, rows: flat})=>{
        let headerIdx=-1,colAmt=-1,colId=-1,colDesc=-1;
        for(let i=0;i<flat.length;i++){
          const rawRow = flat[i];
          const cells = rawRow.map(c=>c.toLowerCase().replace(/[^a-z]/g,""));
          const ai = cells.findIndex(c=>isAmtCol(c));
          if(ai<0) continue;
          // Require this to look like a real table header, not a sentence:
          // at least 2 non-empty cells, and the amount-column cell must be a
          // short label (≤6 words), not a long prose sentence.
          const nonEmpty = cells.filter(c=>c.length>0).length;
          const amtLabel = rawRow[ai] ? String(rawRow[ai]).trim() : "";
          const wordCount = amtLabel.split(/\s+/).length;
          if(nonEmpty < 2 || wordCount > 6) continue;
          headerIdx=i; colAmt=ai;
          colId  = cells.findIndex(c=>isIdCol(c));
          colDesc= cells.findIndex(c=>/desc|particular|budgetline|narration|head/.test(c));
          break;
        }
        if(headerIdx<0) return;
        const lines=[]; let descText="";
        for(let i=headerIdx+1;i<flat.length;i++){
          const row=flat[i];
          if(/total/i.test(row.join(" "))) continue;            // skip summary rows
          const rawCell = (row[colAmt]||"").trim();
          // reject formula strings (start with =) and non-numeric looking cells
          if(rawCell.startsWith("=")) continue;
          // only accept cells that look like a plain number (digits, commas, dot, optional leading minus)
          if(!/^-?[\d,]+\.?\d*$/.test(rawCell)) continue;
          const amt=parseFloat(rawCell.replace(/,/g,""));
          // reject implausibly small amounts (serial numbers, date fragments, etc.)
          if(isNaN(amt)||amt<100) continue;
          lines.push({ scrollId: colId>=0?(row[colId]||"").trim():"", amount:amt });
          if(colDesc>=0 && row[colDesc]) descText += " "+row[colDesc];
        }
        if(lines.length){
          const isScroll = /scroll|payment.?scroll|payment.?summary/i.test(sheetName);
          const betterThanBest = !best
            || (isScroll && !best.isScroll)           // scroll sheet always beats non-scroll
            || (isScroll === best.isScroll && lines.length > best.lines.length); // tie-break by row count
          if(betterThanBest) best = { lines, descText, isScroll };
        }
      });
      const lines = best ? best.lines : [];
      const descText = best ? best.descText : "";

      // ---- apply to the form ----
      if(dnNo && el("dfNo") && !el("dfNo").value.trim()) el("dfNo").value = dnNo;
      // Reporting month: the "…for <Month> <Year>" phrase wins — it's the
      // salary period being reimbursed, NOT the date the payment was entered
      // or made. (e.g. April salary paid/entered on 5 May still reports as
      // April.) Only fall back to a parsed date's month when there's no phrase.
      let repMonth = phraseYm;
      if(!repMonth && isoDate){
        const mv = isoDate.slice(0,7);
        if(FY_MONTHS.includes(mv)) repMonth = mv;
      }
      if(repMonth && el("dfMonth")) el("dfMonth").value = repMonth;

      // Debit-note date: only adopt a parsed date when it sits inside the
      // reporting month. A "Date of Entry"/payment date in a different month
      // is not the note's reporting date — leave the field blank so it
      // defaults to the reporting month on save instead of showing May.
      if(el("dfDate")){
        el("dfDate").value =
          (isoDate && (!repMonth || isoDate.slice(0,7)===repMonth)) ? isoDate : "";
      }
      // category: detect ONLY from the expense-line descriptions — never the
      // whole workbook, whose legal boilerplate ("…Salary/Professional fees…")
      // would otherwise mis-trigger. Fall back to Programme if no lines.
      if(el("dfCat")){
        el("dfCat").value = descText.trim()
          ? guessDebitCategory(descText)
          : "Programme";
      }

      if(lines.length){
        const tb = el("dfScrolls");
        if(tb){
          tb.innerHTML = lines.map((l,i)=>scrollRowHtml(l,i)).join("");
          recalcScrollTotal();
        }
      }

      if(msg){
        const total = lines.reduce((s,l)=>s+l.amount,0);
        if(lines.length || dnNo){
          msg.style.color = "var(--green)";
          msg.innerHTML = "✓ Read from the Excel file"
            + (dnNo?` — number <b>${esc(dnNo)}</b>${dnSuggested?" <span style='color:var(--ink-3)'>(suggested — none in the file)</span>":""}`:"")
            + (repMonth?`, month <b>${esc(monthLong(repMonth))}</b>`:"")
            + (lines.length?`, <b>${lines.length}</b> line${lines.length>1?'s':''} totalling <b>${fmtRsFull(total)}</b>`:"")
            + ". Check the fields below and save.";
        } else {
          msg.style.color = "var(--amber)";
          msg.textContent = "Couldn't find a data table in that file — fill the fields in by hand below.";
        }
      }
    }catch(e){
      console.error(e);
      if(msg){ msg.style.color="var(--red)"; msg.textContent="Couldn't read that file — is it a valid Excel/CSV?"; }
    }
  };
  reader.onerror = ()=>{ if(msg){ msg.style.color="var(--red)"; msg.textContent="Couldn't open that file."; } };
  reader.readAsArrayBuffer(file);
}

async function saveDebit(ngoId, editId){
  const scrolls = readScrollLines().filter(l=>l.scrollId || l.amount);
  if(!scrolls.length){ toast("Add at least one scroll line with an amount"); return; }
  const amt = scrolls.reduce((s,l)=>s+l.amount,0);
  if(amt<=0){ toast("The scroll lines must add up to more than zero"); return; }
  const dnNo = el("dfNo").value.trim();
  if(!dnNo){ toast("Enter the debit note number"); return; }
  // guard against logging the same debit note twice for this NGO
  const dup = DB.debits.find(x=>x.ngoId===ngoId && x.id!==editId
    && (x.dnNo||"").trim().toLowerCase()===dnNo.toLowerCase());
  if(dup){
    toast("Debit note "+dnNo+" is already logged for this NGO");
    return;
  }
  // Reporting month = the dropdown the user sees and confirms. It is kept in
  // sync with the note date by syncDebitMonth() on manual edits and set from
  // the "…for <Month>" phrase on import, so it is the single source of truth.
  // Do NOT re-derive it from the date here — that would wrongly pull a
  // payment/entry date (e.g. 5 May) and report April salary under May.
  const month = el("dfMonth").value;
  const status = (document.querySelector('input[name="dfStatus"]:checked')||{}).value || DN_STATUS_DEFAULT;
  const d = editId ? DB.debits.find(x=>x.id===editId) : null;
  const obj = {
    month, category: el("dfCat").value, dnNo,
    amount: amt, scrolls,
    url: el("dfUrl").value.trim(),
    date: el("dfDate").value || (month+"-28"),
    note: el("dfNote").value.trim(),
    status,
    editedBy: ME?ME.name:"—", editedAt: TODAY_ISO
  };
  // build/extend the timestamped status history
  let history = (d && Array.isArray(d.history)) ? d.history.slice() : [];
  const prevStatus = d ? d.status : null;
  if(!history.length){
    // first save — record the starting stage
    history.push({ status, at: stamp(), by: ME?ME.name:"—" });
  } else if(status !== prevStatus){
    // status changed — append a new stamped entry
    history.push({ status, at: stamp(), by: ME?ME.name:"—" });
  }
  obj.history = history;

  // over-budget guard — compare against spend within this financial year
  const b = DB.budgets[ngoId];
  if(b && b.totalAnnual){
    let spentSoFar = DB.debits
      .filter(x=>x.ngoId===ngoId && x.id!==editId && FY_MONTHS.includes(x.month))
      .reduce((s,x)=>s+(x.amount||0),0);
    if(spentSoFar + amt > b.totalAnnual){
      const over = spentSoFar + amt - b.totalAnnual;
      confirmAction("This exceeds the approved budget",
        `Logging this debit note takes total spend to
         <b>${fmtRsFull(spentSoFar+amt)}</b>, which is <b>${fmtRsFull(over)}</b>
         over ${esc(ngoById(ngoId).short)}'s approved budget of ${fmtRsFull(b.totalAnnual)}.
         Save it anyway?`,
        ()=>commitDebit(ngoId,editId,obj), "Save anyway", true);
      return;
    }
  }
  commitDebit(ngoId,editId,obj);
}
async function commitDebit(ngoId, editId, obj){
  if(editId){
    const d=DB.debits.find(x=>x.id===editId);
    Object.assign(d,obj);
  } else {
    DB.debits.push({ id:genId("dn"), ngoId, ...obj });
  }
  await saveDB();
  closeModal();
  render();
  toast(editId?"Debit note updated":"Debit note logged · budget actuals refreshed");
}
function deleteDebit(id){
  const d = DB.debits.find(x=>x.id===id);
  confirmAction("Delete this debit note?",
    `Debit note <b>${esc(d?d.dnNo:'')}</b> (${d?fmtRsFull(d.amount):''}) will be removed and the budget actuals will refresh.`,
    async ()=>{
      DB.debits = DB.debits.filter(d=>d.id!==id);
      await saveDB();
      closeModal();
      render();
      toast("Debit note deleted");
    }, "Delete debit note", true);
}

let FIN_NGO = "all";   // Finance page NGO filter
function pageBudget(){
  const ngos = visibleNgos();
  // keep the filter valid if the visible set changes
  if(FIN_NGO!=="all" && !ngos.some(n=>n.id===FIN_NGO)) FIN_NGO = "all";

  const elapsed = monthsElapsed(CUR_MONTH);
  const expectedPct = Math.round(elapsed/12*100);
  const curIdx = FY_MONTHS.indexOf(CUR_MONTH);
  const nextMonth = curIdx>=0 && curIdx<11 ? FY_MONTHS[curIdx+1] : null;

  // the set the page is currently reporting on (all NGOs, or just one)
  const scope = FIN_NGO==="all" ? ngos : ngos.filter(n=>n.id===FIN_NGO);

  let totalAnnual=0, totalSpent=0, totalPlan=0, totalNextPlan=0;
  const rows = scope.map(n=>{
    const b = DB.budgets[n.id] || emptyBudget();
    const spent = ngoSpendUpto(n.id,CUR_MONTH);
    const planUpto = b.monthlyPlan.slice(0,elapsed).reduce((a,c)=>a+c,0);
    const nextPlan = nextMonth ? (b.monthlyPlan[curIdx+1]||0) : 0;
    let devSum=0, devCnt=0;
    FY_MONTHS.forEach((m,i)=>{
      if(m>CUR_MONTH) return;
      const plan = b.monthlyPlan[i];
      const actual = ngoSpendForMonth(n.id,m);
      if(actual>0 && plan>0){ devSum += Math.abs(actual-plan)/plan; devCnt++; }
    });
    const adherence = devCnt ? Math.round(devSum/devCnt*100) : null;
    const cumVar = spent - planUpto;
    totalAnnual+=b.totalAnnual; totalSpent+=spent; totalPlan+=planUpto; totalNextPlan+=nextPlan;
    return { n, b, spent, planUpto, nextPlan, util:pct(spent,b.totalAnnual),
             adherence, cumVar, varPct: planUpto? Math.round(cumVar/planUpto*100):0 };
  });

  const portUtil = pct(totalSpent,totalAnnual);
  const portVar  = totalSpent - totalPlan;
  const variance = portVar, over = portVar>0;
  const utilCls  = portUtil>95?"red": portUtil<55?"amber":"green";
  const projectedYearEnd = elapsed ? Math.round(totalSpent/elapsed*12) : 0;
  const projectedPct = pct(projectedYearEnd,totalAnnual);

  // insights — computed across the FULL portfolio so they stay meaningful even when filtered
  const allRows = ngos.map(n=>{
    const b = DB.budgets[n.id] || emptyBudget();
    const spent = ngoSpendUpto(n.id,CUR_MONTH);
    const planUpto = b.monthlyPlan.slice(0,elapsed).reduce((a,c)=>a+c,0);
    let devSum=0, devCnt=0;
    FY_MONTHS.forEach((m,i)=>{
      if(m>CUR_MONTH) return;
      const plan=b.monthlyPlan[i], actual=ngoSpendForMonth(n.id,m);
      if(actual>0&&plan>0){ devSum+=Math.abs(actual-plan)/plan; devCnt++; }
    });
    const adherence = devCnt?Math.round(devSum/devCnt*100):null;
    const cumVar = spent-planUpto;
    return { n, b, spent, planUpto, adherence, cumVar,
             varPct: planUpto?Math.round(cumVar/planUpto*100):0 };
  });
  const bestDiscipline = allRows.filter(r=>r.adherence!=null).sort((a,b)=>a.adherence-b.adherence)[0];
  const highestVar = allRows.slice().sort((a,b)=>Math.abs(b.cumVar)-Math.abs(a.cumVar))[0];

  // cumulative running totals across the scope (drives the line chart + readout)

async function dismissFlagged(id){
  const f = DB.flagged && DB.flagged[id];
  if(!f){ toast("Already dismissed"); return; }
  f.dismissed = true;
  f.dismissedBy = ME?ME.name:"—";
  f.dismissedAt = TODAY_ISO;
  await saveDB();
  render();
  toast("Dismissed — flagged email removed from review");
}

/* ---- email-capture review queue: okay / reject ---- */
async function okayPendingDebit(id){
  const d = DB.debits.find(x=>x.id===id);
  if(!d){ toast("Note not found"); return; }
  if(!canEditNgo(d.ngoId)){ toast("You don't have access to approve this NGO's notes"); return; }
  const inp = el("pr_amt_"+id);
  /* the input is comma-formatted ("1,38,000") — strip commas before parsing */
  const v = inp ? parseFloat(String(inp.value||"").replace(/,/g,"")) : NaN;
  if(isNaN(v) || v<=0){ toast("Enter a valid amount before okaying"); return; }
  d.amount = Math.round(v);
  if(Array.isArray(d.scrolls) && d.scrolls.length===1) d.scrolls[0].amount = d.amount;
  const catSel = el("pr_cat_"+id);
  if(catSel && BUDGET_CATS.includes(catSel.value)) d.category = catSel.value;
  delete d.pendingReview;
  d.note = (d.note||"").replace(/^⚠ From PDF — verify amount during review\.\s*/,
            "From PDF — amount okayed in review by "+(ME?ME.name:"—")+" on "+TODAY_ISO+". ");
  d.history = Array.isArray(d.history) ? d.history : [];
  d.history.push({ status:d.status, at:stamp(), by:(ME?ME.name:"—")+" · okayed email capture" });
  await saveDB(); render();
  toast("Debit note "+d.dnNo+" approved — now in the ledger and budget actuals");
}
function rejectPendingDebit(id){
  const d = DB.debits.find(x=>x.id===id);
  if(!d) return;
  if(!canEditNgo(d.ngoId)){ toast("You don't have access to reject this NGO's notes"); return; }
  confirmAction("Reject this captured note?",
    `<b>${esc(d.dnNo)}</b> (${fmtRsFull(d.amount)}, ${esc((ngoById(d.ngoId)||{}).short||'')}) will be deleted from the queue.
     The original email stays in Gmail, so you can always log it manually.`,
    async ()=>{
      DB.debits = DB.debits.filter(x=>x.id!==id);
      await saveDB(); closeModal(); render();
      toast("Captured note rejected");
    }, "Reject & delete", true);
}

let TASK_F = { ngo:"all", priority:"all", from:"", to:"" };
function setTaskFilter(field, val){ TASK_F[field]=val; render(); }
function clearTaskFilters(){ TASK_F={ngo:"all",priority:"all",from:"",to:""}; render(); }

function pageTasks(){
  let tasks = DB.tasks.slice();
  if(ME.role==="APL") tasks = tasks.filter(t=>t.aplId===ME.id);
  if(ME.role==="Programme"){ const _ids=new Set(visibleNgos().map(n=>n.id)); tasks=tasks.filter(t=>_ids.has(t.ngoId)); }
  const ngos = visibleNgos();

  // apply filters
  const active = TASK_F.ngo!=="all" || TASK_F.priority!=="all" || TASK_F.from || TASK_F.to;
  let filtered = tasks.filter(t=>{
    if(TASK_F.ngo!=="all" && t.ngoId!==TASK_F.ngo) return false;
    if(TASK_F.priority!=="all" && t.priority!==TASK_F.priority) return false;
    if(TASK_F.from && t.due && t.due < TASK_F.from) return false;
    if(TASK_F.to && t.due && t.due > TASK_F.to) return false;
    return true;
  });

  const open = filtered.filter(t=>t.status==="Open").sort((a,b)=>a.due.localeCompare(b.due));
  const done = filtered.filter(t=>t.status==="Done");

  const taskRow = t=>{
    const n = ngoById(t.ngoId);
    const apl = userById(t.aplId);
    const overdue = t.status==="Open" && t.due && t.due<TODAY_ISO;
    const pc = t.priority==="High"?"red":t.priority==="Medium"?"amber":"gray";
    const who = apl ? apl.name.split(" ")[0] : "Unassigned";
    return `<div class="lrow">
      <button onclick="toggleTask('${t.id}')" style="width:20px;height:20px;border-radius:5px;border:1.5px solid var(--${t.status==='Done'?'green':'rule-2'});background:${t.status==='Done'?'var(--green)':'transparent'};color:#fff;font-size:12px;flex:none">${t.status==='Done'?'✓':''}</button>
      <div class="meta">
        <div class="t" style="${t.status==='Done'?'text-decoration:line-through;color:var(--ink-3)':''}">${esc(t.title)}</div>
        <div class="s">${esc(n?n.short:'—')} · ${esc(who)} · due ${fmtDMY(t.due)}${overdue?' <b style="color:var(--red)">overdue</b>':''}</div>
      </div>
      <span class="badge ${pc}">${t.priority}</span>
      ${canEdit()?`<button class="btn ghost sm" onclick="openTaskForm('${t.id}')">Edit</button>`:''}
    </div>`;
  };

  const filterBar = `
    <div class="filter-bar">
      <div class="ff">
        <label>Partner NGO</label>
        <select class="sel-inp" onchange="setTaskFilter('ngo',this.value)">
          <option value="all" ${TASK_F.ngo==='all'?'selected':''}>All NGOs</option>
          ${ngos.map(n=>`<option value="${n.id}" ${TASK_F.ngo===n.id?'selected':''}>${esc(n.short)}</option>`).join("")}
        </select>
      </div>
      <div class="ff">
        <label>Priority</label>
        <select class="sel-inp" onchange="setTaskFilter('priority',this.value)">
          <option value="all" ${TASK_F.priority==='all'?'selected':''}>Any priority</option>
          ${["High","Medium","Low"].map(p=>`<option value="${p}" ${TASK_F.priority===p?'selected':''}>${p}</option>`).join("")}
        </select>
      </div>
      <div class="ff">
        <label>Due from</label>
        <input type="date" class="sel-inp" value="${TASK_F.from}" onchange="setTaskFilter('from',this.value)">
      </div>
      <div class="ff">
        <label>Due to</label>
        <input type="date" class="sel-inp" value="${TASK_F.to}" onchange="setTaskFilter('to',this.value)">
      </div>
      ${active?`<button class="btn ghost sm" style="align-self:flex-end" onclick="clearTaskFilters()">Clear filters</button>`:''}
    </div>`;

  return `
  <div class="phead">
    <div class="phead-row">
      <div>
        <div class="eyebrow">Action items</div>
        <h1 class="serif">Tasks</h1>
        <div class="desc">${ME.role==="PM"?"Open work items across all partnership leads.":"Your open work items."}</div>
      </div>
      ${canEdit()?`<button class="btn accent" onclick="openTaskForm()">+ New task</button>`:''}
    </div>
  </div>
  ${filterBar}
  <div class="panel">
    <div class="panel-h"><h3>Open</h3><span class="note">${open.length} item${open.length!==1?'s':''}${active?' · filtered':''}</span></div>
    ${open.length? open.map(taskRow).join("")
      : `<div class="empty"><div class="mk">✓</div><p>${active?'No open tasks match these filters.':'Nothing open — all caught up.'}</p></div>`}
  </div>
  ${done.length?`<div class="panel" style="margin-top:16px">
    <div class="panel-h"><h3>Completed</h3><span class="note">${done.length} item${done.length!==1?'s':''}</span></div>
    ${done.map(taskRow).join("")}
  </div>`:''}`;
}
async function toggleTask(id){
  if(blockIfReadOnly()) return;
  const t = DB.tasks.find(x=>x.id===id);
  t.status = t.status==="Done"?"Open":"Done";
  await saveDB();
  render();
}
function openTaskForm(editId){
  if(blockIfReadOnly()) return;
  const ngos = visibleNgos();
  const t = editId ? DB.tasks.find(x=>x.id===editId) : null;
  const body = `
    <div class="field">
      <label>Task</label>
      <input type="text" id="tfTitle" value="${t?esc(t.title):''}" placeholder="e.g. Field verification visit to VNCS"/>
    </div>
    <div class="frow">
      <div class="field">
        <label>NGO</label>
        <select id="tfNgo">${ngos.map(n=>`<option value="${n.id}" ${t&&t.ngoId===n.id?'selected':''}>${esc(n.short)}</option>`).join("")}</select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="tfPri">
          <option ${t&&t.priority==='High'?'selected':''}>High</option>
          <option ${!t||t.priority==='Medium'?'selected':''}>Medium</option>
          <option ${t&&t.priority==='Low'?'selected':''}>Low</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Due date</label>
      <input type="date" id="tfDue" value="${t?t.due:'2026-02-15'}"/>
    </div>`;
  const foot = `
    ${editId?`<button class="btn danger" style="margin-right:auto" onclick="deleteTask('${editId}')">Delete</button>`:''}
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveTask('${editId||''}')"> ${editId?'Save changes':'Create task'}</button>`;
  showModal(modalShell(editId?"Edit task":"New task", editId?"Edit Task":"Add a Task", body, foot));
}
async function saveTask(editId){
  const title = el("tfTitle").value.trim();
  if(!title){ toast("Add a task title"); return; }
  const ngoId = el("tfNgo").value;
  if(editId){
    const t = DB.tasks.find(x=>x.id===editId);
    if(t){ Object.assign(t, { title, ngoId, due:el("tfDue").value, priority:el("tfPri").value }); }
  } else {
    const apl = (DB.users||[]).find(u=>u.role==="APL" && Array.isArray(u.ngoIds) && u.ngoIds.includes(ngoId));
    DB.tasks.push({ id:genId("t"), ngoId, aplId: apl?apl.id:"",
      title, due:el("tfDue").value, status:"Open", priority:el("tfPri").value });
  }
  await saveDB();
  closeModal();
  render();
  toast(editId?"Task updated":"Task created");
}
function deleteTask(id){
  const t = DB.tasks.find(x=>x.id===id);
  if(!t) return;
  confirmAction("Delete this task?",
    `"${esc((t.title||"").slice(0,80))}" will be permanently removed.`,
    async ()=>{
      DB.tasks = DB.tasks.filter(x=>x.id!==id);
      await saveDB(); closeModal(); render();
      toast("Task deleted");
    }, "Delete", true);
}

function pageDocs(){
  const ngos = visibleNgos();

  const docs = DB.documents.filter(d=>ids.has(d.ngoId));
  const expired  = docs.filter(d=>d.expires && d.expires<TODAY_ISO);
  const expiring = docs.filter(d=>d.expires && d.expires>=TODAY_ISO && d.expires<SOON_CUTOFF_ISO);
  const flagged  = expired.concat(expiring);

  return `
  <div class="phead">
    <div class="phead-row">
      <div>
        <div class="eyebrow">Compliance vault</div>
        <h1 class="serif">Documents</h1>

  ${flagged.length?`<div class="panel" style="margin-bottom:16px;border-left:3px solid var(--${expired.length?'red':'amber'})">
    <div class="panel-h"><h3>Needs renewal</h3><span class="note">${expired.length?expired.length+' expired · ':''}${expiring.length} expiring within 90 days</span></div>
    ${flagged.map(d=>{
      const n=ngoById(d.ngoId);
      const isExp = d.expires<TODAY_ISO;
      return `<div class="lrow"><span class="ico">${isExp?'⛔':'⚠'}</span>
        <div class="meta"><div class="t">${esc(n.short)} — ${esc(d.type)}</div><div class="s">${esc(d.name)}</div></div>
        <span class="badge ${isExp?'red':'amber'}">${isExp?'Expired '+d.expires:'Expires '+d.expires}</span></div>`;
    }).join("")}
  </div>`:''}
  <div class="panel">
    <div class="panel-h"><h3>All documents</h3><span class="note">${docs.length} files across ${ngos.length} NGOs</span></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>NGO</th><th>Type</th><th>File</th><th>Added</th><th>Validity</th></tr></thead>
        <tbody>
        ${ngos.map(n=>{
          const nd = docs.filter(d=>d.ngoId===n.id);
          return nd.map(d=>{
            let exp;
            if(!d.expires) exp = `<span style="color:var(--ink-3);font-size:12px">—</span>`;
            else if(d.expires<TODAY_ISO) exp = `<span class="badge red">Expired ${fmtDMY(d.expires)}</span>`;
            else if(d.expires<SOON_CUTOFF_ISO) exp = `<span class="badge amber">Expires ${fmtDMY(d.expires)}</span>`;
            else exp = `<span class="badge gray">Valid to ${fmtDMY(d.expires)}</span>`;
            return `<tr>
              <td><b>${esc(n.short)}</b></td>
              <td>${esc(d.type)}</td>
              <td class="mono" style="font-size:11px;color:var(--ink-2)">${esc(d.name)}</td>
              <td style="font-size:12px">${d.uploaded}</td>
              <td>${exp}</td>
            </tr>`;
          }).join("");
        }).join("")}

      </table>
    </div>
  </div>`;
}

/* ---- backup / restore ---- */
function exportBackup(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "NGO_Partnership_Program_backup_"+TODAY_ISO+".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Backup downloaded");
}
function importBackup(input){
  if(ME.role!=="PM") return;
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    let data;
    try{ data = JSON.parse(reader.result); }
    catch(e){ toast("That file isn't a valid backup"); return; }
    if(!data || !Array.isArray(data.users)){ toast("That file doesn't look like a tracker backup"); return; }
    confirmAction("Restore from this backup?",
      `This replaces <b>all current live data</b> with the contents of the backup
       file. Everyone's tracker will update. This cannot be undone — make sure
       you have a current backup first.`,
      async ()=>{
        DB = migrateDB(data);
        // force every collection to be treated as changed so it all writes
        DB_PARTS.forEach(p=>{ _lastSynced[p] = "__force__"; });
        await saveDB();
        closeModal(); render();
        toast("Data restored from backup");
      }, "Restore everything", true);
  };
  reader.readAsText(file);
  input.value = "";
}

/* ---- boot ---- */
window.addEventListener("load", ()=>{
  // Safety net: if init takes >8 s, show the login form anyway so the
  // page never gets permanently stuck on "Connecting…"
  const safetyTimer = setTimeout(()=>{
    const bootEl = el("loginBoot"), formEl = el("loginForm");
    if(formEl && formEl.style.display==="none"){
      if(bootEl){ bootEl.style.color="var(--amber)"; bootEl.textContent="⚠ Could not reach server — check your connection and reload."; }
      if(formEl) formEl.style.display="block";
    }
  }, 8000);
  init().finally(()=>clearTimeout(safetyTimer));
});

/* ===== FDNMS MODULE (5-role, single host login) ===== */
/* ===========================================================================
   FDNMS · Fund Disbursement & Debit Note Management  (additive module)
   Its OWN 5-role identity + sign-in, independent of the host monitoring login.
   Persists to localStorage ("krsf_fdnms_v2"). Reads host NGO master (DB.ngos)
   and reuses host UI helpers. The Goals/OKR/Bets/Budget app is untouched.
   =========================================================================== */
const FD_KEY = "krsf_fdnms_v2";
let FD = null;
let FD_TAB = null;
let FD_DRAFT = null;
let _fdSeq = 1;

/* ---- the five roles, each with distinct rights ---- */
const FD_ROLES = {
  NGO:       {label:"Partner NGO",            color:"#3079bd", desc:"Creates & submits debit notes for its own NGO"},
  Accounts:  {label:"KRSF Vadali · Accounts", color:"#7d63cc", desc:"First-level verification only"},

  Programme: {label:"Programme Team",         color:"#d6912a", desc:"Read-only monitoring"},

};
const FD_FLOW = ["Draft","Submitted","AccountsVerification","ReturnedForCorrection","Resubmitted","FinanceReview","Approved","FundReleased","Closed","Rejected"];
const FD_LABEL = {Draft:"Draft",Submitted:"Submitted",AccountsVerification:"Accounts Verification",ReturnedForCorrection:"Returned for Correction",Resubmitted:"Resubmitted",FinanceReview:"Finance Review",Approved:"Approved",FundReleased:"Fund Released",Closed:"Closed",Rejected:"Rejected"};
const FD_CHECKLIST = [
  {k:"amount", t:"Amount matches bills & invoices", s:"Claimed total reconciles with supporting documents"},

  {k:"docs",   t:"All supporting documents uploaded", s:"Bills, invoices, annexures & utilisation present"},
  {k:"vendor", t:"Vendor / beneficiary details verified", s:"Name, bank account and PAN/GST confirmed"},
  {k:"ngo",    t:"NGO details verified", s:"Partner NGO registration and grant linkage confirmed"},

];

/* ---------- persistence ---------- */
function fdSave(){ try{ localStorage.setItem(FD_KEY, JSON.stringify(FD)); }catch(e){} }
function fdLoad(){
  try{ const r=localStorage.getItem(FD_KEY); if(r){ FD=JSON.parse(r); } }catch(e){}
  if(!FD || typeof FD!=="object"){ FD={users:[],notes:[],payments:[],audit:[],seq:1,paySeq:1,meId:null,seeded:false}; }
  ["users","notes","payments","audit"].forEach(k=>{ if(!Array.isArray(FD[k])) FD[k]=[]; });
  FD.notes.forEach(d=>{ if(d && d.budgetHead==="Admin-Other") d.budgetHead="Other"; });
  if(!FD.seq) FD.seq=FD.notes.length+1;
  if(!FD.paySeq) FD.paySeq=FD.payments.length+1;
}
fdLoad();

/* ---------- identity: mapped from the host single login (ME) ---------- */
const FD_ROLE_MAP={ PM:"Admin", APL:"NGO", Accounts:"Accounts", Finance:"Finance", Programme:"Programme", Viewer:"Programme" };
function FD_ME(){ return (typeof ME!=="undefined")?ME:null; }
function fdSignedIn(){ return !!FD_ME(); }
function fdRole(){ const m=FD_ME(); return m? (FD_ROLE_MAP[m.role]||"Programme") : null; }
function fdMe(){ const m=FD_ME(); return m?m.id:"system"; }
function fdMeName(){ const m=FD_ME(); return m?m.name:"System"; }
function fdRoleLabel(){ const r=fdRole(); return r?FD_ROLES[r].label:""; }
function fdIsAdmin(){ return fdRole()==="Admin"; }
function fdCanCreate(){ return ["NGO","Admin"].includes(fdRole()); }
function fdCanVerify(){ return ["Accounts","Admin"].includes(fdRole()); }
function fdCanApprove(){ return ["Finance","Admin"].includes(fdRole()); }
function fdCanRelease(){ return ["Finance","Admin"].includes(fdRole()); }
function fdReadOnly(){ return fdRole()==="Programme"; }
function fdUserById(id){ return (typeof userById==="function")?userById(id):null; }
function fdUserName(id){ const u=fdUserById(id); if(u)return u.name; if(id==="seed")return"Partner NGO"; return id===fdMe()?fdMeName():"—"; }
function fdMyNgoIds(){ const m=FD_ME(); if(m&&m.role==="APL") return new Set(Array.isArray(m.ngoIds)?m.ngoIds:[]); if(m&&m.role==="Programme"&&Array.isArray(m.ngoIds)&&m.ngoIds.length) return new Set(m.ngoIds); return null; }
function fdAssignedNgos(){ const m=FD_ME(); const all=(DB&&DB.ngos)||[]; if(m&&m.role==="APL") return all.filter(n=>(m.ngoIds||[]).includes(n.id)); if(m&&m.role==="Programme"&&Array.isArray(m.ngoIds)&&m.ngoIds.length) return all.filter(n=>m.ngoIds.includes(n.id)); return all; }
function fdVisibleNotes(){ const ids=fdMyNgoIds(); return ids? FD.notes.filter(d=>ids.has(d.ngoId)) : FD.notes.slice(); }
function fdNgoName(id){ const n=(typeof ngoById==="function")?ngoById(id):null; return n?(n.short||n.name):"—"; }
function fdNgoFull(id){ const n=(typeof ngoById==="function")?ngoById(id):null; return n?n.name:"—"; }

/* ---------- small helpers ---------- */
function fdIP(){ return "10."+(20+Math.floor(Math.random()*40))+"."+Math.floor(Math.random()*255)+"."+(2+Math.floor(Math.random()*250)); }
function fdNow(){ return new Date().toISOString(); }
function fdDate(iso){ if(!iso)return"—"; const d=new Date(iso); if(isNaN(d))return String(iso); return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear(); }
function fdDateTime(iso){ if(!iso)return"—"; const d=new Date(iso); if(isNaN(d))return String(iso); return fdDate(iso)+" · "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); }
function fdSum(a,f){ return a.reduce((s,x)=>s+(f?f(x):x),0); }
function fdAge(iso){ return Math.floor((Date.now()-new Date(iso))/864e5); }
function fdInitials(n){ return (n||"?").split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function fdPill(s){ return `<span class="fst fst-${s}"><span class="sd"></span>${esc(FD_LABEL[s]||s)}</span>`; }
function fdDocIcon(t){ return ({Bill:"🧾",Invoice:"🧾",Annexure:"📎","Utilisation":"📊","Payment Request":"₹"}[t])||"📄"; }
function fdNavCount(){ if(!FD)return null; const r=fdRole();
  if(r==="Accounts"||r==="Admin"){ const n=FD.notes.filter(d=>["Submitted","Resubmitted","AccountsVerification"].includes(d.status)).length; if(n)return n; }
  if(r==="Finance"){ const n=FD.notes.filter(d=>["FinanceReview","Approved"].includes(d.status)).length; if(n)return n; }
  if(r==="NGO"){ const ids=fdMyNgoIds(); const n=FD.notes.filter(d=>ids.has(d.ngoId)&&d.status==="ReturnedForCorrection").length; if(n)return n; }
  return null;
}

/* ---------- domain ---------- */
function fdNewNote(ngoId){ const n=FD.seq++; return { id:genId("fdn"), number:"DN/26-27/"+String(n).padStart(4,"0"), ngoId:ngoId||"", projectName:"", grantCode:"", budgetHead:"", purpose:"", lineItems:[], docs:[], vendor:{name:"",ac:"",ifsc:"",bank:"",pan:"",gst:""}, paymentTo:"NGO", advanceAdjusted:0, status:"Draft", checklist:{}, queries:[], accountsApproval:null, financeApproval:null, paymentId:null, total:0, netPayable:0, createdBy:fdMe(), createdAt:fdNow(), submittedAt:null }; }
function fdRecalc(d){ d.lineItems.forEach(li=>{ li.amount=(+li.qty||0)*(+li.rate||0); }); d.total=fdSum(d.lineItems,li=>+li.amount||0); d.netPayable=d.total-(+d.advanceAdjusted||0); }
function fdLog(d,action,detail,color){ FD.audit.push({id:genId("fa"),noteId:d.id,number:d.number,userId:fdMe(),userName:fdMeName(),role:fdRoleLabel(),action,detail:detail||"",at:fdNow(),ip:fdIP(),color:color||"accent"}); }
function fdNoteAudit(id){ return FD.audit.filter(a=>a.noteId===id).sort((a,b)=>new Date(a.at)-new Date(b.at)); }
function fdById(id){ return FD.notes.find(d=>d.id===id); }
function fdPayById(id){ return FD.payments.find(p=>p.id===id); }
function fdNewPayment(d){ const n=FD.paySeq++; const ben=d.paymentTo==="Vendor"?(d.vendor.name||"Vendor"):fdNgoFull(d.ngoId); return { id:genId("fpay"), number:"PMT/26-27/"+String(n).padStart(4,"0"), noteId:d.id, dnNumber:d.number, amount:d.netPayable, beneficiary:ben, beneficiaryType:d.paymentTo, date:fdNow(), mode:"NEFT", utr:"", bankRef:"", remarks:"", status:"Pending", createdBy:fdMe() }; }

/* ---------- seed users + sample notes (local, once) ---------- */
function fdEnsureSeed(){
  const ngos=(DB&&DB.ngos)||[];
  if(FD.seeded || FD.notes.length || !ngos.length){ return; }
  const apl=(DB.users||[]).find(u=>u.role==="APL" && Array.isArray(u.ngoIds) && u.ngoIds.length);
  const a = apl? ngoById(apl.ngoIds[0]) : ngos[0];
  const b = (apl && apl.ngoIds[1] && ngoById(apl.ngoIds[1])) || ngos[1] || a;
  const uid = apl?apl.id:"seed", uname = apl?apl.name:"Partner NGO";
  const heads=(typeof BUDGET_CATS!=="undefined")?BUDGET_CATS:["Programme","Salary","Travel","Other"];
  function L(d,xid,xname,role,action,detail,at,color){ FD.audit.push({id:genId("fa"),noteId:d.id,number:d.number,userId:xid,userName:xname,role,action,detail:detail||"",at:at||fdNow(),ip:fdIP(),color:color||"accent"}); }
  function mk(ngo,head,purpose,items,docs,daysAgo){ const d=fdNewNote(ngo.id); d.createdBy=uid; d.createdByName=uname; d.budgetHead=head; d.purpose=purpose; d.projectName=ngo.name+" \u2014 "+head; d.grantCode="GR-"+head.slice(0,3).toUpperCase()+"-26"; d.lineItems=items; d.docs=docs; d.createdAt=new Date(Date.now()-daysAgo*864e5).toISOString(); fdRecalc(d); FD.notes.push(d); L(d,uid,uname,"Partner NGO","Created Debit Note",items.length+" line item(s)",d.createdAt); return d; }
  function submit(d,days){ d.submittedAt=new Date(Date.now()-days*864e5).toISOString(); d.status="Submitted"; L(d,uid,uname,"Partner NGO","Submitted for Verification","Submitted to KRSF Vadali Accounts",d.submittedAt); }
  function verify(d){ d.checklist={}; FD_CHECKLIST.forEach(c=>d.checklist[c.k]=true); d.accountsApproval={by:"seed",byName:"Vadali Accounts Team",at:fdNow(),ip:fdIP(),comment:"All bills reconciled; budget available. Recommended."}; d.status="FinanceReview"; L(d,"seed","Vadali Accounts Team","KRSF Vadali \u00b7 Accounts","Accounts Verified & Recommended","Checklist 7/7 complete. Forwarded to Finance.",null,"green"); }
  function approve(d){ d.financeApproval={by:"seed",byName:"Ahmedabad Finance",at:fdNow(),ip:fdIP(),comment:"Approved for fund release."}; d.status="Approved"; L(d,"seed","Ahmedabad Finance","KRSF Ahmedabad \u00b7 Finance","Finance Approved Fund Release","Final approval granted",null,"green"); }
  function release(d){ const p=fdNewPayment(d); p.createdBy="seed"; p.utr="UTR"+Math.floor(1e11+Math.random()*8e11); p.status="Paid"; FD.payments.push(p); d.paymentId=p.id; d.status="FundReleased"; L(d,"seed","Ahmedabad Finance","KRSF Ahmedabad \u00b7 Finance","Fund Released",p.number+" \u00b7 "+fmtRsFull(p.amount)+" \u00b7 UTR "+p.utr,null,"green"); }
  const d1=mk(a,heads[0]||"Programme","Check-dam civil works at Site A",[{desc:"RCC check dam \u2014 Site A",qty:1,rate:680000},{desc:"Loose boulder structures (12 nos)",qty:12,rate:14500}],[{name:"Contractor Bill #441.pdf",type:"Bill"},{name:"Measurement book.pdf",type:"Annexure"},{name:"Utilisation.xlsx",type:"Utilisation"}],38); submit(d1,37); verify(d1); approve(d1); release(d1);
  const d2=mk(a,heads[2]||"Travel","SHG revolving-fund disbursal (8 groups)",[{desc:"SHG revolving fund \u2014 8 groups",qty:8,rate:120000}],[{name:"SHG resolutions.pdf",type:"Annexure"},{name:"Disbursal request.pdf",type:"Payment Request"}],9); submit(d2,8); verify(d2);
  const d3=mk(b,heads[0]||"Programme","Learning kits & library books",[{desc:"Learning kits \u2014 400 children",qty:400,rate:850},{desc:"Library books \u2014 6 centres",qty:6,rate:18000}],[{name:"Vendor quotation.pdf",type:"Invoice"}],6); submit(d3,5); d3.status="ReturnedForCorrection"; d3.queries.push({by:"seed",byName:"Vadali Accounts Team",at:fdNow(),text:"Vendor quotation insufficient \u2014 attach the final tax invoice and centre-wise breakup."}); L(d3,"seed","Vadali Accounts Team","KRSF Vadali \u00b7 Accounts","Returned for Correction","Query raised: missing final tax invoice",null,"amber");
  const d4=mk(b,heads[1]||"Salary","Classroom repair & flooring \u2014 Centre 3",[{desc:"Civil repair & flooring",qty:1,rate:475000}],[{name:"Civil estimate.pdf",type:"Annexure"},{name:"Photographs.pdf",type:"Annexure"}],2); submit(d4,1);
  mk(a,heads[1]||"Salary","Farmer field school \u2014 3 villages",[{desc:"Field school sessions",qty:3,rate:45000}],[],1);
  FD.seeded=true; fdSave();
}

/* ===========================================================================

   =========================================================================== */
function fdTabsForRole(){
  switch(fdRole()){
    case"NGO":       return [["overview","Overview"],["salary","Employees & Salary"],["mine","My Debit Notes"],["new","New Debit Note"],["repo","Repository"],["search","Search"]];
    case"Accounts":  return [["overview","Overview"],["verify","Verification Queue",true],["all","All Debit Notes"],["repo","Repository"],["audit","Audit Trail"],["search","Search"]];
    case"Finance":   return [["overview","Overview"],["approve","Approval Queue",true],["release","Fund Release"],["all","All Debit Notes"],["repo","Repository"],["audit","Audit Trail"],["search","Search"]];
    case"Programme": return [["overview","Overview"],["all","All Debit Notes"],["upload","Upload Debit Note"],["monitor","Fund Utilisation"],["repo","Repository"],["search","Search"]];
    case"Admin":     return [["overview","Overview"],["all","All Debit Notes"],["upload","Upload Debit Note"],["salary","Employees & Salary"],["verify","Verification"],["approve","Approval"],["release","Fund Release"],["repo","Repository"],["audit","Audit Trail"],["search","Search"]];
    default:         return [["overview","Overview"]];
  }
}
function fdGo(tab){ FD_TAB=tab; if(tab!=="new") FD_DRAFT=null; render(); window.scrollTo(0,0); }
function pageFDNMS(){
  fdEnsureSeed();
  const tabs=fdTabsForRole();
  // "new" is reachable via the "+ New Debit Note" button even for roles (e.g.
  // Super Admin) that don't carry it as a visible tab — treat it as valid so
  // the button isn't silently bounced back to the overview.
  const tabIsValid = tabs.some(t=>t[0]===FD_TAB) || (FD_TAB==="new" && fdCanCreate());
  if(!FD_TAB || !tabIsValid) FD_TAB=tabs[0][0];
  const head=`
    <div class="phead"><div class="phead-row">
      <div><div class="eyebrow">${esc((DB&&DB.meta&&DB.meta.fyLabel)||"FY 2026-27")} \u00b7 Fund Disbursement \u00b7 ${esc(fdRoleLabel())}</div>
        <h1 class="serif">Debit Note Management</h1>
        <div class="desc">Digital debit-note approval &amp; grant disbursement \u2014 submission, two-level verification, fund release and a full audit trail.</div></div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="fd-whoami"><span class="av" style="background:var(--accent)">${esc(fdInitials(fdMeName()))}</span><span><b>${esc(fdMeName())}</b><br><span style="font-size:11px;color:var(--ink-3)">${esc(fdRoleLabel())}</span></span></span>
        ${fdCanCreate()?`<button class="btn accent" onclick="fdGo('new')">+ New Debit Note</button>`:""}
      </div>
    </div></div>`;
  const cVer=FD.notes.filter(d=>["Submitted","Resubmitted","AccountsVerification"].includes(d.status)).length;
  const cApp=FD.notes.filter(d=>d.status==="FinanceReview").length;
  const bar=`<div class="fd-tabs">${tabs.map(t=>{ const c=t[0]==="verify"?cVer:t[0]==="approve"?cApp:null; return `<button class="fd-tab ${FD_TAB===t[0]?'on':''}" onclick="fdGo('${t[0]}')">${esc(t[1])}${c?`<span class="ct alert">${c}</span>`:""}</button>`; }).join("")}</div>`;
  let body="";
  switch(FD_TAB){
    case"overview": body=fdOverview(); break;
    case"verify":   body=fdQueue("verify"); break;
    case"approve":  body=fdQueue("approve"); break;
    case"mine": case"all": body=fdListView(); break;
    case"new":      body=fdCreateView(); break;

    case"upload":   body=fdUploadView(); break;

    case"monitor":  body=fdMonitorView(); break;
    case"repo":     body=fdRepoView(); break;
    case"audit":    body=fdAuditView(); break;

  return head+bar+body;
}
function fdKpi(tile,ic,lab,val,sub){ return `<div class="kpi"><div class="ktop"><div class="ktile ${tile}">${ic}</div><div class="lab">${esc(lab)}</div></div><div class="val">${val}</div><div class="sub">${sub||""}</div></div>`; }

/* ---------- OVERVIEW ---------- */
function fdOverview(){
  const role=fdRole(), notes=fdVisibleNotes();
  if(role==="NGO"){
    const released=notes.filter(d=>d.status==="FundReleased"), pending=notes.filter(d=>!["FundReleased","Closed","Rejected","Draft"].includes(d.status)), returned=notes.filter(d=>d.status==="ReturnedForCorrection");
    return (returned.length?`<div class="fbanner amber">↩ ${returned.length} debit note(s) need correction. <a style="margin-left:auto;cursor:pointer" onclick="fdGo('mine')">Review →</a></div>`:"")+
    `<div class="kpi-grid">${fdKpi("blue","▦","My Debit Notes",notes.length,fmtRs(fdSum(notes,d=>d.netPayable))+" total")}${fdKpi("amber","⏳","In Progress",pending.length,"awaiting KRSF")}${fdKpi("green","✓","Fund Released",released.length,fmtRs(fdSum(released,d=>d.netPayable)))}${fdKpi("red","↩","Need Correction",returned.length,"")}</div>`+fdMiniTable(notes.slice().reverse().slice(0,8),"My recent debit notes");
  }
  if(role==="Accounts"){
    const vq=notes.filter(d=>["Submitted","Resubmitted","AccountsVerification"].includes(d.status)), recommended=notes.filter(d=>d.accountsApproval), overdue=vq.filter(d=>fdAge(d.submittedAt||d.createdAt)>3);
    return (vq.length?`<div class="fbanner amber">⏳ ${vq.length} note(s) awaiting your verification — ${fmtRs(fdSum(vq,d=>d.netPayable))}. <a style="margin-left:auto;cursor:pointer" onclick="fdGo('verify')">Open queue →</a></div>`:"")+
    `<div class="kpi-grid">${fdKpi("blue","▦","Submitted",notes.filter(d=>d.status!=="Draft").length,"")}${fdKpi("amber","⏳","Pending Verification",vq.length,fmtRs(fdSum(vq,d=>d.netPayable)))}${fdKpi("red","⚠","Overdue (>3d)",overdue.length,"")}${fdKpi("green","✓","Recommended",recommended.length,"to Finance")}</div>`+fdQueue("verify");
  }
  if(role==="Finance"){
    const aq=notes.filter(d=>d.status==="FinanceReview"), appr=notes.filter(d=>d.status==="Approved"), rel=FD.payments.filter(p=>p.status==="Paid"), high=aq.filter(d=>d.netPayable>=1000000);
    return (aq.length?`<div class="fbanner accent">📋 ${aq.length} verified note(s) awaiting final approval. <a style="margin-left:auto;cursor:pointer" onclick="fdGo('approve')">Review →</a></div>`:"")+(appr.length?`<div class="fbanner green">₹ ${appr.length} approved note(s) ready for release. <a style="margin-left:auto;cursor:pointer" onclick="fdGo('release')">Release →</a></div>`:"")+
    `<div class="kpi-grid">${fdKpi("accent","📋","Pending Approval",aq.length,fmtRs(fdSum(aq,d=>d.netPayable)))}${fdKpi("amber","₹","Approved Awaiting",appr.length,fmtRs(fdSum(appr,d=>d.netPayable)))}${fdKpi("green","✓","Funds Released",rel.length,fmtRs(fdSum(rel,p=>p.amount)))}${fdKpi("red","★","High Value",high.length,"≥ ₹10 L")}</div>`+fdQueue("approve");
  }
  // Programme + Admin
  const sub=notes.filter(d=>d.status!=="Draft"), rel=FD.payments.filter(p=>p.status==="Paid"), pend=notes.filter(d=>!["FundReleased","Closed","Rejected","Draft"].includes(d.status));
  return `<div class="kpi-grid">${fdKpi("blue","▦","All Debit Notes",sub.length,fmtRs(fdSum(sub,d=>d.netPayable)))}${fdKpi("green","₹","Funds Disbursed",fmtRs(fdSum(rel,p=>p.amount)),rel.length+" releases")}${fdKpi("amber","⏳","In Pipeline",pend.length,fmtRs(fdSum(pend,d=>d.netPayable)))}${fdKpi("violet","◷","Avg Cycle",fdAvgCycle()+"d","submit→release")}</div>`+
    (role==="Admin"?`<div class="fbanner accent">You are Super Admin — manage roles & NGO logins in <a style="cursor:pointer;text-decoration:underline" onclick="fdGo('users')">Users &amp; Roles</a>.</div>`:"")+fdMiniTable(sub.slice().reverse().slice(0,8),"Recent activity");
}
function fdAvgCycle(){ const rel=FD.notes.filter(d=>d.status==="FundReleased"&&d.paymentId&&d.submittedAt); if(!rel.length)return"—"; const days=rel.map(d=>{ const p=fdPayById(d.paymentId); return (new Date(p.date)-new Date(d.submittedAt))/864e5; }); return Math.max(1,Math.round(fdSum(days)/days.length)); }
function fdMiniTable(rows,title){ return `<div class="panel"><div class="panel-h"><h3>${esc(title)}</h3></div><div class="tbl-wrap"><table><thead><tr><th>DN No.</th><th>NGO</th><th class="num">Net Payable</th><th>Status</th><th>Updated</th></tr></thead><tbody>${rows.length?rows.map(d=>`<tr style="cursor:pointer" onclick="openFDN('${d.id}')"><td class="mono" style="font-size:11.5px"><b>${esc(d.number)}</b></td><td>${esc(fdNgoName(d.ngoId))}</td><td class="num">${fmtRsFull(d.netPayable)}</td><td>${fdPill(d.status)}</td><td style="font-size:11.5px;color:var(--ink-2)">${fdDate(d.submittedAt||d.createdAt)}</td></tr>`).join(""):`<tr><td colspan="5"><div class="empty"><div class="mk">▦</div><p>Nothing yet.</p></div></td></tr>`}</tbody></table></div></div>`; }

/* ---------- QUEUE ---------- */
function fdQueue(kind){
  const canAct = kind==="verify"?fdCanVerify():fdCanApprove();
  const states = kind==="verify"?["Submitted","Resubmitted","AccountsVerification"]:["FinanceReview"];
  const list=FD.notes.filter(d=>states.includes(d.status)).sort((a,b)=>new Date(a.submittedAt||a.createdAt)-new Date(b.submittedAt||b.createdAt));
  return `<div class="panel"><div class="panel-h"><h3>${kind==="verify"?"First-Level Verification — Accounts":"Final Approval — Finance"}</h3><span class="note">${list.length} awaiting · ${fmtRs(fdSum(list,d=>d.netPayable))}</span></div>
  <div class="tbl-wrap"><table><thead><tr><th>DN No.</th><th>NGO</th><th>Budget Head</th><th class="num">Net Payable</th><th>Age</th><th>Status</th><th></th></tr></thead>
  <tbody>${list.length?list.map(d=>`<tr style="cursor:pointer" onclick="openFDN('${d.id}')"><td class="mono" style="font-size:11.5px"><b>${esc(d.number)}</b></td><td>${esc(fdNgoName(d.ngoId))}</td><td>${esc(d.budgetHead||"—")}</td><td class="num">${fmtRsFull(d.netPayable)}</td><td style="font-size:11.5px">${fdAge(d.submittedAt||d.createdAt)}d</td><td>${fdPill(d.status)}</td><td style="text-align:right">${canAct?`<button class="btn primary sm" onclick="event.stopPropagation();${kind==='verify'?`fdOpenVerify('${d.id}')`:`fdOpenApprove('${d.id}')`}">${kind==='verify'?'Verify':'Review'} →</button>`:""}</td></tr>`).join(""):`<tr><td colspan="7"><div class="empty"><div class="mk">✓</div><p>Queue is clear.</p></div></td></tr>`}</tbody></table></div></div>`;
}
