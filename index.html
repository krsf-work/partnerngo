/* the latest FY month that actually has reported data (debit notes,
   bet actuals or scorecards) — used as the smart default reporting month */
function latestDataMonth(){
  let latest = FY_MONTHS[0];
  (DB.debits||[]).forEach(d=>{ if(FY_MONTHS.includes(d.month) && d.month>latest) latest=d.month; });
  (DB.bigBets||[]).forEach(b=>{
    FY_MONTHS.forEach(m=>{ const c=b.months&&b.months[m]; if(c&&c.actual!=null&&m>latest) latest=m; });
  });
  Object.values(DB.scorecards||{}).forEach(sc=>{
    Object.keys(sc).forEach(m=>{ if(FY_MONTHS.includes(m)&&m>latest) latest=m; });
  });
  /* prefer the live calendar month if it's inside the FY and not behind the data */
  const live = liveReportingMonth();
  return live>=latest ? live : latest;
}

async function init(){
  // connect + load data from Firebase — never let an error freeze the login screen
  try{
    DB = await loadDB();
  }catch(e){
    console.error("loadDB failed, falling back to skeleton", e);
    DB = migrateDB(skeletonData());
    CLOUD_OK = false;
  }
  setConnState(CLOUD_OK);
  // reveal the login form (or skip straight in if a session is remembered)
  const bootEl = el("loginBoot"), formEl = el("loginForm");
  if(bootEl) bootEl.style.display = "none";
  if(formEl) formEl.style.display = "block";
  if(!CLOUD_OK && bootEl){
    bootEl.style.display = "block";
    bootEl.style.color = "var(--amber)";
    bootEl.textContent = "⚠ Offline — working from this device's saved copy.";

  if(sess && userById(sess)){
    ME = userById(sess);
    el("login").style.display="none";
    el("app").style.display="block";
    bootApp();
  } else {
    const u = el("loginUser"); if(u) u.focus();
    // a quiet hint so the owner can confirm the app reached the database
    const hint = el("loginHint");
    if(hint){
      if(CLOUD_OK){

        hint.innerHTML = pm
          ? "Connected. Program Manager username: <b>"+esc(pm.username||"admin")+"</b>"
          : "Connected, but no admin account was found — use “Can't sign in?”.";

        hint.textContent = "Not connected to Firebase — see “Can't sign in?”.";
      }
    }
  }
}

                   crumb = `<span style="cursor:pointer" onclick="go('ngos')">Partner NGOs</span> &nbsp;›&nbsp; <b>${esc(ngoById(PAGE_ARG)?.short||'')}</b>`;
                   break;
    case "budget": c.innerHTML = pageBudget(); break;
    case "debits": c.innerHTML = pageDebits(); break;
    case "fdnms":  c.innerHTML = pageFDNMS(); break;
    case "tasks":  c.innerHTML = pageTasks(); break;
    case "okrupload": c.innerHTML = pageOkrUpload(); break;

}

let _scorePopAnchor = null;
function openScorePop(ev, ngoId, key){
  ev.stopPropagation();
  let pop = el("scorePop");
  if(!pop){
    pop = document.createElement("div");
    pop.id = "scorePop";
    pop.className = "score-pop";
    document.body.appendChild(pop);
  }
  const crit = SCORE_CRITERIA.find(c=>c.key===key);
  const opts = [0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5];
  pop.innerHTML =
    `<div class="sp-head">${esc(crit?crit.label:key)}</div>` +
    opts.map(v=>`<div class="sp-opt" onclick="setScoreCell('${ngoId}','${key}',${v})">${fmtScore(v)}</div>`).join("") +
    `<div class="sp-opt" style="grid-column:1/-1;background:var(--paper)"
          onclick="setScoreCell('${ngoId}','${key}',null)">Clear</div>`;
  pop.classList.add("show");
  _scorePopAnchor = ev.currentTarget;
  positionScorePop();
  // dismiss on outside click, or whenever the page scrolls
  setTimeout(()=>{
    document.addEventListener("click", closeScorePop, {once:true});
  },0);
  window.addEventListener("scroll", closeScorePop, {once:true,capture:true});
  window.addEventListener("resize", closeScorePop, {once:true});
}
function positionScorePop(){
  const pop = el("scorePop");
  if(!pop || !_scorePopAnchor) return;
  const r = _scorePopAnchor.getBoundingClientRect();
  const pw = pop.offsetWidth||196, ph = pop.offsetHeight||260;
  let left = r.left;
  let top  = r.bottom + 6;
  if(left + pw > window.innerWidth - 8)  left = window.innerWidth - pw - 8;
  if(top + ph > window.innerHeight - 8)  top = r.top - ph - 6;   // flip above
  pop.style.left = Math.max(8,left) + "px";
  pop.style.top  = Math.max(8,top) + "px";
}
function closeScorePop(){
  const pop = el("scorePop");
  if(pop) pop.classList.remove("show");
  _scorePopAnchor = null;
}

function scoreClass(v){
  if(v==null) return "s-na";
  if(v>=4) return "s-hi";
  if(v>=3) return "s-mid";
  return "s-lo";
}
let SC_VIEW = "grid";   // grid | trend
function setScView(v){ SC_VIEW = v; render(); }

function scorecardPanel(ngos){
  const crit = SCORE_CRITERIA;
  const tabs = `
    <div class="sc-tabs">
      <button class="sc-tab ${SC_VIEW==='grid'?'active':''}" onclick="setScView('grid')">Scorecard</button>
      <button class="sc-tab ${SC_VIEW==='trend'?'active':''}" onclick="setScView('trend')">Trend</button>
    </div>`;
  const body = SC_VIEW==='trend' ? scorecardTrend(ngos) : scorecardGrid(ngos, crit);

  <div class="panel">

      <div style="display:flex;align-items:center;gap:10px;padding-bottom:9px">

        <span class="note">${SC_VIEW==='trend'
          ? 'monthly total / '+SCORE_MAX+' · last 6 reported months'

      </div>
      ${tabs}
    </div>
    ${body}
  </div>`;

function scorecardGrid(ngos, crit){
  const month = CUR_MONTH;
  const colAvg = crit.map(c=>{
    const vals = ngos.map(n=>{
      const sc=(DB.scorecards[n.id]||{})[month]||{};
      return sc[c.key];
    }).filter(v=>typeof v==="number");
    return vals.length? (vals.reduce((a,b)=>a+b,0)/vals.length):0;
  });
  const scored = ngos.map(n=>ngoScore(n.id,month)).filter(s=>s.scored);
  const totAvg = scored.length ? scored.reduce((s,x)=>s+x.total,0)/scored.length : 0;

  return `
    <div class="tbl-wrap">
      <table class="sc-tbl">
        <thead><tr>
          <th>Partner</th>
          ${crit.map(c=>`<th class="sc-c" title="${esc(c.label)}">${esc(c.key)}</th>`).join("")}
          <th class="sc-tot">Total /${SCORE_MAX}</th>
          <th class="sc-st">Status</th>
        </tr></thead>
        <tbody>
        ${ngos.map(n=>{
          const sc = (DB.scorecards[n.id]||{})[month] || {};
          const s = ngoScore(n.id, month);
          const initials = n.short.slice(0,2).toUpperCase();
          return `<tr>
            <td class="sc-name">
              <span class="av">${esc(initials)}</span>
              <b>${esc(n.name.length>30?n.name.slice(0,30)+'…':n.name)}</b>
              <span style="color:var(--ink-3);font-size:11px"> · ${esc(n.vertical)}</span>
            </td>
            ${crit.map(c=>{
              const v = sc[c.key];
              return `<td class="sc-c">
                <div class="sc-cell ${scoreClass(v)}"
                     onclick="openScorePop(event,'${n.id}','${c.key}')">
                  ${v==null?'–':fmtScore(v)}
                </div></td>`;
            }).join("")}
            <td class="sc-tot"><span class="sc-tot-v">${s.scored?fmtScore(s.total):'–'}</span></td>
            <td class="sc-st"><span class="badge ${s.status}">${
              s.scored?scoreStatusLabel(s.total):'Not scored'}</span></td>
          </tr>`;
        }).join("")}
        </tbody>
        <tfoot class="sc-foot"><tr>
          <td class="sc-name" style="font-weight:700">Portfolio average</td>
          ${colAvg.map(a=>`<td class="sc-c"><div class="sc-cell">${a?fmtScore(a):'–'}</div></td>`).join("")}
          <td class="sc-tot"><span class="sc-tot-v">${totAvg?fmtScore(totAvg):'–'}</span></td>
          <td class="sc-st"><span class="badge ${totAvg?scoreStatus(totAvg):'gray'}">${
            totAvg?scoreStatusLabel(totAvg):'—'}</span></td>
        </tr></tfoot>
      </table>
    </div>`;
}

/* Trend tab — monthly total /40 per partner over the last 6 reported months */
function scorecardTrend(ngos){
  const allMonths = new Set();
  ngos.forEach(n=>{
    Object.keys(DB.scorecards[n.id]||{}).forEach(m=>allMonths.add(m));
  });
  const months = [...allMonths].sort().slice(-6);
  if(!months.length){
    return `<div class="empty"><div class="mk">▦</div><p>No scorecard history yet.</p></div>`;
  }
  return `
    <div class="tbl-wrap">
      <table class="sc-tbl">
        <thead><tr>
          <th>Partner</th>
          ${months.map(m=>`<th class="sc-c">${esc(monthLabel(m))}</th>`).join("")}
          <th class="sc-st">Latest</th>
        </tr></thead>
        <tbody>
        ${ngos.map(n=>{
          const initials = n.short.slice(0,2).toUpperCase();
          const cells = months.map(m=>{
            const s = ngoScore(n.id, m);
            return s.scored
              ? `<td class="sc-c"><div class="sc-cell ${scoreCellClass(s.status)}">${fmtScore(s.total)}</div></td>`
              : `<td class="sc-c"><div class="sc-cell s-na">–</div></td>`;
          }).join("");
          const last = ngoScore(n.id, months[months.length-1]);
          return `<tr>
            <td class="sc-name">
              <span class="av">${esc(initials)}</span>
              <b>${esc(n.name.length>30?n.name.slice(0,30)+'…':n.name)}</b>

/* show 4.5 not 4.50, and 32 not 32.0 */
function fmtScore(v){
  if(v==null||isNaN(v)) return "–";
  return (Math.round(v*10)/10).toString();
}

/* one NGO row + (if expanded) its big-bet sub-rows */
function dashNgoRow(n){
  const sc   = ngoScore(n.id);
  const bd   = DB.budgets[n.id]||{};
  const appr = bd.totalAnnual||0;
  const used = ngoSpendUpto(n.id,CUR_MONTH);
  const up   = pct(used,appr);
  const bets = betsForNgo(n.id);
  const open = DASH_OPEN===n.id;

  // NGO-level delivery: how many of its bets are on track, and avg % of annual target
  const healths = bets.map(b=>betHealth(b).status);
  const onTrack = healths.filter(s=>s==="green").length;
  const offTrack= healths.filter(s=>s==="red").length;
  const progs = bets.map(b=>betProgress(b));
  const avgProg = progs.length? Math.round(progs.reduce((a,b)=>a+b,0)/progs.length):0;
  // band reflects DELIVERY (vs plan), not raw % — matches the rest of the app
  const aBand = !bets.length?'gray': offTrack? 'red' : onTrack<bets.length? 'amber' : 'green';

  const scLabel = sc.status==='green'?'Green':sc.status==='amber'?'Yellow':sc.status==='red'?'Red':'—';

  const mainRow = `
    <tr class="ngo-main ${open?'open':''}" onclick="toggleNgoRow('${n.id}')">
      <td>
        <span class="caret">▶</span>
        <b>${esc(n.short)}</b>
        <span style="color:var(--ink-3);font-size:11px"> · ${esc(n.state)}</span>
      </td>
      <td style="font-size:12px">${esc(aplNamesFor(n.id))}</td>
      <td class="num">
        ${fmtRs(appr)} <span style="color:var(--ink-3)">·</span> ${fmtRs(used)}
        <div style="font-size:10.5px;color:var(--${up>=100?'red':up>=85?'amber':'green'})">${up}% used</div>
      </td>
      <td>
        <span class="ptag ${n.partnership}" onclick="setPartnership('${n.id}',event)" title="Click to change">
          <span class="pd"></span>${n.partnership}
        </span>
      </td>
      <td><span class="badge ${sc.status}"><span class="dot ${sc.status}"></span>${scLabel}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:9px" title="${onTrack} of ${bets.length} milestones on track · ${avgProg}% of annual targets">
          <div class="mini-bar"><i class="${aBand}" style="width:${Math.min(avgProg,100)}%"></i></div>
          <b style="font-size:11.5px;color:var(--${aBand});white-space:nowrap">${bets.length?onTrack+'/'+bets.length:'—'}</b>
        </div>
      </td>
    </tr>`;

  if(!open) return mainRow;

  const sub = bets.length ? bets.map(b=>{
    const p = betProgress(b);
    const band = betHealth(b).status;
    const cum = betCumulative(b,FY_END);
    return `<div class="bet-sub-inner">
      <span class="bi">${b.icon||'◎'}</span>
      <span class="bt">${esc(b.title)}</span>
      <span class="bv">${fmtCompact(cum,b.unit)} / ${fmtCompact(b.annualTarget,b.unit)}</span>
      <div class="mini-bar"><i class="${band==='gray'?'amber':band}" style="width:${Math.min(p,100)}%"></i></div>
      <b style="font-size:12px;width:42px;text-align:right;color:var(--${band==='gray'?'ink-3':band})">${p}%</b>
    </div>`;
  }).join("") : `<div class="bet-sub-inner"><span class="bt" style="color:var(--ink-3)">No milestones defined for this NGO yet.</span></div>`;

  return mainRow + `<tr class="bet-sub"><td colspan="6">${sub}</td></tr>`;
}

function fmtCompact(v,unit){
  if(unit==="₹") return fmtRs(v);
  return fmtN(v);
}

let BETS_FILTER = "all";   // all | green | amber | red

/* one compact bet row; expands to the monthly ladder when open */
function renderBetRow(bet){
  const n = ngoById(bet.ngoId);
  const h = betHealth(bet);
  const level = betIsLevelType(bet);
  const cum = betCumulative(bet,FY_END);
  const prog = pct(cum, bet.annualTarget);
  const progCls = h.status==="gray"?"accent":h.status;
  const open = BETS_OPEN===bet.id;

  const row = `
    <div class="bet-row ${open?'open':''}" onclick="toggleBet('${bet.id}')">
      <span class="caret">▶</span>
      <span class="bi">${bet.icon||'◎'}</span>
      <div class="bmain">
        <div class="btitle">${esc(bet.title)}</div>
        <div class="bngo">${esc(n.short)} · ${esc(n.vertical)}</div>
      </div>
      <div class="bbar-wrap">
        <span class="bdot ${h.status}"></span>
        <div class="pbar"><i class="${progCls}" style="width:${Math.min(prog,100)}%"></i></div>
      </div>
      <span class="bpct" style="color:var(--${progCls==='accent'?'ink-3':progCls})">${prog}%</span>
      <div class="bfig">
        <div class="fv">${level?fmtRs(cum):fmtN(cum)}</div>
        <div class="ft">of ${level?fmtRs(bet.annualTarget):fmtN(bet.annualTarget)}</div>
      </div>
    </div>`;

  if(!open) return row;

  // expanded: monthly ladder
  const cellsHtml = FY_MONTHS.map(m=>{
    const c = bet.months[m]||{};
    const isFuture = m>CUR_MONTH;
    const isCurrent = m===CUR_MONTH;
    const hasActual = c.actual!=null;
    let varHtml="";
    if(c.plan!=null && hasActual){
      const d = c.actual-c.plan;
      const vcls = d>=0?"pos": d< -c.plan*0.15?"neg":"zero";
      varHtml = `<div class="lad-var ${vcls}">${d>=0?'+':''}${fmtCompact(d,bet.unit)}</div>`;
    } else if(c.plan!=null && !hasActual && !isFuture){
      varHtml = `<div class="lad-var zero">awaiting</div>`;
    }
    return `<div class="lad-cell editable ${isFuture?'future':''} ${isCurrent?'current':''}"
                 onclick="event.stopPropagation();openCellEdit('${bet.id}','${m}')">
      <div class="lad-mo">${monthLabel(m)}</div>
      <div class="lad-body">
        <div class="lad-line"><span class="k">Plan</span><span class="v plan">${c.plan!=null?fmtCompact(c.plan,bet.unit):'·'}</span></div>
        <div class="lad-line"><span class="k">Got</span><span class="v ach" style="color:${hasActual?'var(--ink)':'var(--ink-3)'}">${hasActual?fmtCompact(c.actual,bet.unit):'·'}</span></div>
        ${varHtml}
      </div>
    </div>`;
  }).join("");

  const detail = `
    <div class="bet-detail">
      <div class="dhead">
        <span>${level?'Current level vs annual target':'Cumulative against annual target'} —
          <b>${prog}%</b> ${h.status!=='gray'?`· <span style="color:var(--${h.status})">${h.label} (${h.pace}% of plan-to-date)</span>`:'· not started'}
        </span>
        <span style="display:flex;gap:8px">
          ${canEdit()?`<button class="btn sm" onclick="event.stopPropagation();openBetForm('${bet.id}')">Edit bet</button>`:''}
        </span>
      </div>
      <div style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:6px">
        Monthly ladder ${canEdit()?'· tap a month to enter plan &amp; achieved':'· read-only'}
      </div>
      <div class="ladder">${cellsHtml}</div>
      ${bet.editedAt?`<div style="font-size:10.5px;color:var(--ink-3);margin-top:8px">Last updated ${esc(bet.editedAt)} by ${esc(bet.editedBy||'—')}</div>`:''}
    </div>`;

  return row + detail;
}

/* =================================================================

let _lastFocus = null;
function showModal(html, wide){
  _lastFocus = document.activeElement;
  const m = el("modal");
  m.className = "modal" + (wide?" wide":"");
  m.innerHTML = html;
  el("modalBg").classList.add("show");
  // focus the first sensible control for keyboard users
  setTimeout(()=>{
    const f = m.querySelector("input,select,textarea,button.primary,button.accent");
    if(f) f.focus();
  },30);
}
function closeModal(){
  el("modalBg").classList.remove("show");
  el("modal").innerHTML = "";
  if(_lastFocus && _lastFocus.focus){ try{_lastFocus.focus();}catch(e){} }
}
/* Escape closes any open modal or popover */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if(el("modalBg") && el("modalBg").classList.contains("show")) closeModal();
    closeScorePop();
  }
});
function modalShell(eyebrow, title, body, footer){
  return `
    <div class="modal-h">
      <div>
        <div class="eyebrow">${eyebrow}</div>
        <h2 class="serif">${title}</h2>
      </div>
      <button class="x" onclick="closeModal()" aria-label="Close" title="Close (Esc)">×</button>
    </div>
    <div class="modal-b">${body}</div>
    <div class="modal-f">${footer}</div>`;
}

/* a styled confirmation dialog — replaces native confirm() everywhere */
let _confirmCb = null;
function confirmAction(title, message, onYes, yesLabel, danger){
  _confirmCb = onYes;
  showModal(modalShell("Please confirm", title,
    `<div style="font-size:13px;color:var(--ink-2);line-height:1.6">${message}</div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn ${danger?'danger':'primary'}" onclick="runConfirm()">${esc(yesLabel||'Confirm')}</button>`));
}
function runConfirm(){
  const cb = _confirmCb; _confirmCb = null;
  closeModal();
  if(typeof cb==="function") cb();
}

/* stamp a record with who last edited it and when — lightweight audit trail */
function stampEdit(rec){
  if(!rec) return rec;
  rec.editedBy = ME ? ME.name : "—";
  rec.editedAt = TODAY_ISO;
  return rec;
}
function editStampLine(rec){
  if(!rec || !rec.editedAt) return "";
  return `<div style="font-size:10.5px;color:var(--ink-3);margin-top:2px">
    Last updated ${fmtDMY(rec.editedAt)} by ${esc(rec.editedBy||'—')}</div>`;
}
/* block an edit action for read-only Viewers; returns true if blocked */
function blockIfReadOnly(){
  if(!canEdit()){ toast("Read-only access — you can view but not change records"); return true; }
  return false;
}
/* block an edit unless the user can edit THIS NGO; returns true if blocked */
function blockIfCantEditNgo(ngoId){
  if(!canEdit()){ toast("Read-only access — you can view but not change records"); return true; }
  if(!canEditNgo(ngoId)){
    toast("This NGO isn't assigned to you — you can view it but not edit it");
    return true;
  }
  return false;
}

/* ---------- monthly cell edit (plan + achieved) ---------- */
function openCellEdit(betId, month){
  const bet = DB.bigBets.find(b=>b.id===betId);
  if(!bet) return;
  if(blockIfCantEditNgo(bet.ngoId)) return;
  const n = ngoById(bet.ngoId);
  const c = bet.months[month] || {plan:null,actual:null,note:""};
  const level = betIsLevelType(bet);
  const idx = FY_MONTHS.indexOf(month);

  // context: cumulative before this month
  const prevMonth = idx>0? FY_MONTHS[idx-1] : null;
  const cumBefore = prevMonth? betCumulative(bet,prevMonth) : (bet.baseline||0);

  const body = `
    <div style="background:var(--paper-2);border:1px solid var(--rule);padding:13px 15px;margin-bottom:18px;border-radius:6px">
      <div style="display:flex;gap:9px;align-items:center;margin-bottom:5px">
        <span style="font-size:20px">${bet.icon}</span>
        <div style="font-family:var(--display);font-weight:600;font-size:14px;line-height:1.3">${esc(bet.title)}</div>
      </div>
      <div style="font-size:11.5px;color:var(--ink-3)">${esc(n.short)} · annual target
        <b style="color:var(--ink)">${level?fmtRs(bet.annualTarget):fmtN(bet.annualTarget)+' '+esc(bet.unit)}</b>
        ${level?'':` · ${prevMonth?'cumulative to '+monthLabel(prevMonth):'baseline'}: <b style="color:var(--ink)">${fmtN(cumBefore)}</b>`}
      </div>
    </div>

    <div class="frow">
      <div class="field">
        <label>${level?'Income level planned':'Target for'} ${monthLong(month)}</label>
        <input type="number" id="cellPlan" value="${c.plan!=null?c.plan:''}" placeholder="e.g. ${level?'30000':'600'}"/>
        <div class="hint">${level?'Where you expect the income level to reach.':'What the NGO + APL plan to deliver this month.'}</div>
      </div>
      <div class="field">
        <label>Actually achieved</label>
        <input type="number" id="cellActual" value="${c.actual!=null?c.actual:''}" placeholder="e.g. ${level?'27800':'576'}"/>
        <div class="hint">${level?'Reported income level at month-end.':'Filled at month-end against the target.'}</div>
      </div>
    </div>
    <div class="field">
      <label>Note / evidence link <span style="text-transform:none;font-weight:400">(optional)</span></label>
      <textarea id="cellNote" placeholder="Context, reasons for variance, or a link to field evidence / data sheet…">${esc(c.note||'')}</textarea>
    </div>
    <div id="cellPreview"></div>
  `;
  const footer = `
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveCellEdit('${betId}','${month}')">Save month</button>`;

  showModal(modalShell(
    monthLong(month)+" · monthly entry",
    "Plan &amp; Achieved",
    body, footer));

  // live variance preview
  const upd=()=>{
    const p=parseFloat(el("cellPlan").value), a=parseFloat(el("cellActual").value);
    const pv=el("cellPreview");
    if(isNaN(p)||isNaN(a)){ pv.innerHTML=""; return; }
    const d=a-p, pc=pct(a,p);
    const cls=pc>=95?"green":pc>=80?"amber":"red";
    pv.innerHTML=`<div style="border:1px solid var(--rule);border-radius:6px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);font-weight:600">This month</div>
        <div style="font-size:13px;margin-top:3px">Variance <b class="mono" style="color:var(--${cls})">${d>=0?'+':''}${fmtCompact(d,bet.unit)}</b> · ${pc}% of target</div>
      </div>
      <span class="badge ${cls}">${pc>=95?'On target':pc>=80?'Slight slip':'Below target'}</span>
    </div>`;
  };
  ["cellPlan","cellActual"].forEach(id=>el(id).addEventListener("input",upd));
  upd();
}
async function saveCellEdit(betId, month){
  const bet = DB.bigBets.find(b=>b.id===betId);
  const p = el("cellPlan").value.trim();
  const a = el("cellActual").value.trim();
  bet.months[month] = {
    plan:   p===""?null:parseFloat(p),
    actual: a===""?null:parseFloat(a),
    note:   el("cellNote").value.trim(),
    editedBy: ME?ME.name:"—", editedAt: TODAY_ISO
  };
  stampEdit(bet);
  await saveDB();
  closeModal();
  render();
  toast("Saved "+monthLabel(month)+" for this milestone");
}

async function saveBet(editId){
  const title = el("bfTitle").value.trim();
  const target = parseFloat(el("bfTarget").value);
  if(!title || isNaN(target)){ toast("Add a title and an annual target"); return; }
  const icSel = document.querySelector(".icon-pick.sel-ic");
  const icon = icSel? icSel.dataset.ic : "🎯";
  const unit = el("bfUnit").value.trim()||"units";
  const baseline = parseFloat(el("bfBaseline").value)||0;
  const levelType = el("bfLevel").value==="true";
  if(editId){
    const b = DB.bigBets.find(x=>x.id===editId);
    b.title=title; b.annualTarget=target; b.unit=unit; b.icon=icon;
    b.baseline=baseline; b.ngoId=el("bfNgo").value; b.levelType=levelType;
    stampEdit(b);
  } else {
    const months={};
    FY_MONTHS.forEach(m=>months[m]={plan:null,actual:null,note:""});
    const rec = { id:genId("b"), ngoId:el("bfNgo").value, title, icon,
      unit, annualTarget:target, baseline, levelType, months };
    stampEdit(rec);
    DB.bigBets.push(rec);
  }
  await saveDB();
  closeModal();
  render();
  toast(editId?"Milestone updated":"Milestone created");
}
function deleteBet(id){
  const bet = DB.bigBets.find(b=>b.id===id);
  confirmAction("Delete this milestone?",
    `“${esc(bet?bet.title:'')}” and all of its monthly plan &amp; achieved data will be removed permanently.`,
    async ()=>{
      DB.bigBets = DB.bigBets.filter(b=>b.id!==id);
      await saveDB();
      closeModal();
      render();
      toast("Milestone deleted");
    }, "Delete milestone", true);
}

async function saveNgo(editId){
  const name = el("nfName").value.trim();
  const short = el("nfShort").value.trim();
  if(!name || !short){ toast("Name and short name are required"); return; }
  const fields = {
    name, short,
    vertical: el("nfVertical").value,
    state: el("nfState").value.trim()||"—",
    since: el("nfSince").value,
    lead: el("nfLead").value.trim()||"—",
    partnership: el("nfStatus").value
  };
  if(editId){
    const n = ngoById(editId);
    Object.assign(n, fields);
    stampEdit(n);
  } else {
    const rec = { id:genId("n"), ...fields };
    stampEdit(rec);
    DB.ngos.push(rec);
    DB.budgets[rec.id] = emptyBudget();
  }
  await saveDB();
  closeModal();
  render();
  toast(editId?"Partner updated":"Partner added — set up its budget & milestones next");
}

  confirmAction("Delete this partner NGO?",
    `<b>${esc(n.name)}</b> will be removed along with ${betN} milestone${betN!==1?'s':''},
     ${dnN} debit note${dnN!==1?'s':''}, its budget, documents, tasks, scorecards and outcomes.
     This cannot be undone.`,
    async ()=>{
      DB.ngos     = DB.ngos.filter(x=>x.id!==id);
      DB.bigBets  = DB.bigBets.filter(b=>b.ngoId!==id);
      DB.debits   = DB.debits.filter(d=>d.ngoId!==id);
      DB.documents= DB.documents.filter(d=>d.ngoId!==id);
      DB.tasks    = DB.tasks.filter(t=>t.ngoId!==id);
      DB.mbo      = (DB.mbo||[]).filter(r=>r.ngoId!==id);
      if(DB.budgets) delete DB.budgets[id];
      if(DB.scorecards) delete DB.scorecards[id];

      go("ngos");
      toast("Partner NGO deleted");
    }, "Delete partner", true);
}

function ngoActivityStream(ngoId){
  // build a real activity feed from debit notes, bet updates and documents
  const items = [];
  // recent debit notes
  DB.debits.filter(d=>d.ngoId===ngoId).forEach(d=>{
    items.push({
      sort:d.month+"-"+(d.date||""),
      icon:"₹",
      title:`Debit note ${d.dnNo} ${d.status.toLowerCase()}`,
      detail:`${d.category} — ${fmtRsFull(d.amount)} · ${monthLabel(d.month)}`,
      date:monthLabel(d.month)
    });
  });
  // latest reported month on each bet
  betsForNgo(ngoId).forEach(bet=>{
    const lm = lastReportedMonth(bet);
    if(lm){
      const c = bet.months[lm]||{};
      items.push({
        sort:lm+"-15",
        icon:bet.icon||"◎",
        title:`Milestone progress logged`,
        detail:`${bet.title.slice(0,54)}${bet.title.length>54?'…':''} — ${fmtN(c.actual)} ${esc(bet.unit)} in ${monthLabel(lm)}`,
        date:monthLabel(lm)
      });
    }
  });
  // documents
  DB.documents.filter(d=>d.ngoId===ngoId).forEach(d=>{
    items.push({
      sort:d.uploaded,
      icon:"▣",
      title:`${d.type} uploaded`,
      detail:`${esc(d.name)}`,
      date:d.uploaded
    });
  });
  items.sort((a,b)=>b.sort.localeCompare(a.sort));
  return items.slice(0,7);
}

        items.push({
          sort:lm+"-15", icon:bet.icon||"◎",
          title:`${n.short} · milestone progress logged`,

/* =====================================================================
   TAB 2 · OKR / MBO  — carried over from V2 exactly.
   The APL uploads an Excel sheet; every objective + key result comes
   straight from that file. Rows are filtered by month, grouped by
   objective, and shown as collapsible cards with a status donut.
   ===================================================================== */
let MBO_MONTH = {};     // selected month per ngo
let MBO_OPEN  = {};     // open/closed state per objective group key

function ngoMboTab(ngoId){
  const n = ngoById(ngoId);
  const all = (DB.mbo||[]).filter(r=>r.ngoId===ngoId);

  // months that have data, newest first  (V2: months[0] is default)
  const months = [...new Set(all.map(r=>r.month))].sort().reverse();
  const selMonth = MBO_MONTH[ngoId] || (months[0] || "");

  const monthOpts = months.map(m=>
    `<option value="${m}" ${m===selMonth?'selected':''}>${monthLong(m)}</option>`).join("");

  let html = `
  <div class="sec-head">
    <h2>Monthly Outcomes</h2>
    <div class="sh-act">
      ${months.length? `<select class="mbo-month" onchange="MBO_MONTH['${ngoId}']=this.value;render()">${monthOpts}</select>`:''}
      ${canEditNgo(ngoId)&&selMonth?`<button class="btn ghost sm" style="color:var(--red)" onclick="deleteMboMonth('${ngoId}','${selMonth}')">Delete month</button>`:''}
      ${canEditNgo(ngoId)?`<button class="btn ghost sm" onclick="openMboUpload('${ngoId}')">↑ Upload Excel</button>
      <button class="btn accent sm" onclick="openMboModal('${ngoId}')">+ Key Result</button>`:''}
    </div>
  </div>`;

  if(!selMonth){
    html += `<div class="panel"><div class="empty"><div class="mk">◎</div>
      <p>No outcomes recorded yet. Upload an Excel sheet or click <b>+ Key Result</b>.</p></div></div>`;
    return html;
  }

  const rows = all.filter(r=>r.month===selMonth);
  const allDerived = rows.length && rows.every(r=>r.derived);
  if(allDerived){
    html += `<div class="cum-readout" style="background:var(--amber-soft);border-left-color:var(--amber)">
      <b>Placeholder outcomes.</b> These key results were auto-generated from this NGO's
      Goal targets so the tab isn't empty. Replace them by uploading the partner's real
      monthly outcomes sheet${canEditNgo(ngoId)?' via <b>↑ Upload Excel</b>':''}.
    </div>`;
  }
  html += renderMboBlocks(rows, ngoId);
  return html;
}

/* V2's renderMboBlocks — group rows by objNum+objective, main first,
   then an "Other Objectives" divider for isOther rows */
function renderMboBlocks(rows, ngoId){
  const main  = rows.filter(r=>!r.isOther);
  const other = rows.filter(r=>r.isOther);

  const groupBy = (arr)=>{
    const map = {};
    arr.forEach(r=>{
      const key = (r.objNum||0)+"|"+r.objective;
      if(!map[key]) map[key] = { objNum:r.objNum, objective:r.objective, key, krs:[] };
      map[key].krs.push(r);
    });
    return Object.values(map).sort((a,b)=>(a.objNum||0)-(b.objNum||0));
  };

  let html = "";
  groupBy(main).forEach(g=>html += renderObjCard(g, ngoId));
  if(other.length){
    html += `<div class="other-divider">Other Objectives</div>`;
    groupBy(other).forEach(g=>html += renderObjCard(g, ngoId));
  }
  if(!html) html = `<div class="panel"><div class="empty"><div class="mk">◎</div><p>No outcomes for this month.</p></div></div>`;
  return html;
}

/* a single objective card — collapsible, with status donut + KR rows */
function renderObjCard(g, ngoId){
  const done    = g.krs.filter(k=>k.status==="Done").length;
  const notDone = g.krs.filter(k=>k.status==="Not Done").length;
  const pending = g.krs.filter(k=>k.status==="Pending").length;
  const total   = g.krs.length||1;
  const donePct = Math.round(done/total*100);
  const open    = MBO_OPEN[g.key] !== false;   // open by default

  return `
  <div class="obj-card ${open?'open':''}">
    <div class="obj-head" onclick="MBO_OPEN['${esc(g.key)}']=${!open};render()">
      <div class="obj-num">${g.objNum||"—"}</div>
      <div>
        <div class="obj-title">${esc(g.objective)}</div>
        <div class="obj-legend">
          ${done?`<span><b style="color:var(--green)">${done}</b> done</span>`:''}
          ${notDone?`<span><b style="color:var(--red)">${notDone}</b> not done</span>`:''}
          ${pending?`<span><b style="color:var(--amber)">${pending}</b> in progress</span>`:''}
        </div>
      </div>
      ${svgDonut(done,notDone,pending,donePct)}
      <div class="obj-arrow">›</div>
    </div>
    <div class="obj-body">
      ${g.krs.map(k=>{
        const sCls = k.status==="Done"?"kr-done":k.status==="Not Done"?"kr-not":"kr-prog";
        const sel  = k.status==="Done"?"green":k.status==="Not Done"?"red":"amber";
        return `
        <div class="kr-row ${sCls}">
          <div>
            <div class="kr-text">${esc(k.kr)}</div>
            <div class="kr-meta">
              ${k.timeline?`<time>${fmtDMY(k.timeline)}</time>`:''}
              ${k.ref?`<a href="${esc(k.ref)}" target="_blank" rel="noopener">↗ Reference</a>`:''}
            </div>
            ${k.comment?`<div class="kr-cmt">${esc(k.comment)}</div>`:''}
          </div>
          <div class="kr-actions">
            <select class="status-select ${sel}" onchange="updateKrStatus('${k.id}',this.value)" ${canEditNgo(k.ngoId)?'':'disabled'}>
              <option value="Done"     ${k.status==="Done"?'selected':''}>Done</option>
              <option value="Not Done" ${k.status==="Not Done"?'selected':''}>Not Done</option>
              <option value="Pending"  ${k.status==="Pending"?'selected':''}>In progress</option>
            </select>
            ${canEditNgo(k.ngoId)?`<button class="btn ghost sm" onclick="openMboModal('${k.ngoId}','${k.id}')">Edit</button>`:''}
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function saveMbo(ngoId, editId){
  const objective = el("mbObjective").value.trim();
  const kr = el("mbKr").value.trim();
  if(!objective || !kr){ toast("Objective and key result are required"); return; }
  const rec = {
    id: editId || genId("mbo"),
    ngoId,
    month: el("mbMonth").value,
    objNum: parseInt(el("mbObjNum").value)||1,
    objective, kr,
    timeline: el("mbTimeline").value.trim(),
    status: el("mbStatus").value,
    comment: el("mbComment").value.trim(),
    ref: el("mbRef").value.trim(),
    isOther: el("mbIsOther").value==="true"
  };
  stampEdit(rec);
  if(!DB.mbo) DB.mbo = [];
  if(editId){
    const i = DB.mbo.findIndex(x=>x.id===editId);
    if(i>=0) DB.mbo[i] = rec; else DB.mbo.push(rec);
  } else {
    DB.mbo.push(rec);
  }
  MBO_MONTH[ngoId] = rec.month;
  saveDB(); closeModal(); render();
  toast(editId?"Key result updated":"Key result added");
}

function deleteMbo(id){
  const r = (DB.mbo||[]).find(x=>x.id===id);
  confirmAction("Delete this key result?",
    `“${esc(r?(r.kr||'').slice(0,80):'')}…” will be removed from the outcomes log.`,
    ()=>{
      DB.mbo = (DB.mbo||[]).filter(x=>x.id!==id);
      saveDB(); closeModal(); render();
      toast("Key result deleted");
    }, "Delete", true);
}

/* Excel upload affordance — the APL uploads the monthly outcomes sheet */
function deleteMboMonth(ngoId, month){
  const n = ngoById(ngoId);
  const count = (DB.mbo||[]).filter(r=>r.ngoId===ngoId&&r.month===month).length;
  confirmAction("Delete all outcomes for this month?",
    `This will permanently remove all <b>${count} key result${count!==1?'s':''}</b> recorded for
     <b>${esc(n?n.short:'this NGO')}</b> in <b>${monthLong(month)}</b>.`,
    async ()=>{
      DB.mbo = (DB.mbo||[]).filter(r=>!(r.ngoId===ngoId&&r.month===month));
      delete MBO_MONTH[ngoId];
      await saveDB(); closeModal(); render();
      toast("Outcomes for "+monthLong(month)+" deleted");
    }, "Delete all", true);
}

/* read a cell value flexibly under several possible header names */
function pickCol(row, names){
  for(const k of Object.keys(row)){
    const norm = k.toLowerCase().replace(/[^a-z]/g,"");
    for(const n of names){ if(norm===n||norm.includes(n)) return row[k]; }
  }
  return "";
}
async function importMboFile(ngoId){
  const inp = el("mbFile");
  if(!inp || !inp.files || !inp.files[0]){ toast("Choose a file first"); return; }
  if(typeof XLSX==="undefined"){ toast("Spreadsheet reader didn't load — check your connection"); return; }
  const defMonth = el("mbUpMonth").value;
  try{
    const buf = await inp.files[0].arrayBuffer();
    const wb = XLSX.read(buf,{type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{defval:""});
    if(!rows.length){ toast("No rows found in that file"); return; }
    let added = 0;
    rows.forEach(r=>{
      const objective = String(pickCol(r,["objective","goal"])).trim();
      const kr = String(pickCol(r,["keyresult","kr","activity","result"])).trim();
      if(!objective && !kr) return;
      let status = String(pickCol(r,["status"])).trim();
      const sl = status.toLowerCase();
      status = sl.startsWith("done")||sl.startsWith("complete")?"Done"
             : sl.startsWith("not")?"Not Done":"Pending";
      let month = String(pickCol(r,["month"])).trim();
      if(!/^\d{4}-\d{2}$/.test(month)) month = defMonth;
      const rec = {
        id: genId("mbo"), ngoId, month,
        objNum: parseInt(pickCol(r,["objectiveno","objno","objnum","no"]))||1,
        objective: objective||"(untitled objective)",
        kr: kr||"(untitled key result)",
        timeline: String(pickCol(r,["timeline","targetdate","duedate"])).trim(),
        status,
        comment: String(pickCol(r,["comment","remark","note"])).trim(),
        ref: String(pickCol(r,["reference","ref","link"])).trim(),
        isOther: String(pickCol(r,["type"])).toLowerCase().includes("other")
      };
      stampEdit(rec);
      if(!DB.mbo) DB.mbo=[];
      DB.mbo.push(rec);
      added++;
    });
    if(!added){ toast("Couldn't find Objective / Key Result columns"); return; }
    MBO_MONTH[ngoId] = defMonth;
    await saveDB();
    closeModal();
    render();
    toast(added+" key result"+(added>1?"s":"")+" imported");
  }catch(e){
    console.error(e);
    toast("Couldn't read that file — is it a valid spreadsheet?");
  }
}

/* =====================================================================
   PAGE · TEAM OKR UPLOAD
   A dedicated place for team members to upload their OKR / MBO outcomes
   for a partner NGO — reuses the exact OKR/MBO template and the same
   DB.mbo store that the per-NGO "OKR / MBO" tab uses.
   ===================================================================== */
function pageOkrUpload(){
  const ngos = visibleNgos();
  // Partnership Leads = APL users
  const leads = (DB.users||[]).filter(u=>u.role==="APL");

  // Determine selected lead (default to first)
  if(!window.TEAM_OKR_LEAD && leads.length) window.TEAM_OKR_LEAD = leads[0].id;
  const leadId = window.TEAM_OKR_LEAD || (leads[0]||{}).id || "";
  const lead   = leads.find(u=>u.id===leadId);

  // The NGOs assigned to this lead
  const leadNgoIds = lead ? (lead.ngoIds||[]) : [];
  const leadNgos   = ngos.filter(n=>leadNgoIds.includes(n.id));

  // For the OKR view: use the lead's first assigned NGO
  if(!window.TEAM_OKR_NGO || !leadNgoIds.includes(window.TEAM_OKR_NGO))
    window.TEAM_OKR_NGO = leadNgos.length ? leadNgos[0].id : "";
  const ngoId = window.TEAM_OKR_NGO;

  const all = (DB.mbo||[]).filter(r=>r.ngoId===ngoId);
  const months = [...new Set(all.map(r=>r.month))].sort().reverse();
  const selMonth = MBO_MONTH[ngoId] || (months[0] || "");

  const monthOpts = months.map(m=>
    `<option value="${m}" ${m===selMonth?'selected':''}>${monthLong(m)}</option>`).join("");

  // Partnership Lead selector
  const leadSel = leads.length ? `
    <select style="font-size:12px;padding:5px 8px;border:1px solid var(--rule-2);border-radius:7px;margin-right:6px"
      onchange="window.TEAM_OKR_LEAD=this.value;window.TEAM_OKR_NGO=null;render()">
      ${leads.map(u=>`<option value="${u.id}" ${u.id===leadId?'selected':''}>${esc(u.name)}</option>`).join("")}
    </select>` : '';

  // If the lead has multiple NGOs, show a sub-selector
  const ngoSubSel = leadNgos.length > 1 ? `
    <select style="font-size:12px;padding:5px 8px;border:1px solid var(--rule-2);border-radius:7px;margin-right:6px"
      onchange="window.TEAM_OKR_NGO=this.value;render()">
      ${leadNgos.map(n=>`<option value="${n.id}" ${n.id===ngoId?'selected':''}>${esc(n.short)}</option>`).join("")}
    </select>` : '';

  let html = `
  <div class="phead slim">
    <div class="eyebrow">Work</div>
    <h1 class="serif">Team OKR</h1>
  </div>

  <div class="sec-head">
    <h2>Monthly Outcomes</h2>
    <div class="sh-act">
      ${leadSel}
      ${ngoSubSel}
      ${months.length? `<select class="mbo-month" onchange="MBO_MONTH['${ngoId}']=this.value;render()">${monthOpts}</select>`:''}
      ${ngoId&&selMonth?`<button class="btn ghost sm" style="color:var(--red)" onclick="deleteMboMonth('${ngoId}','${selMonth}')">Delete month</button>`:''}
      ${ngoId? `<button class="btn ghost sm" onclick="openMboUpload('${ngoId}')">↑ Upload Excel</button>
      <button class="btn accent sm" onclick="openMboModal('${ngoId}')">+ Key Result</button>`:''}
    </div>
  </div>`;

  if(!leads.length){
    html += `<div class="panel"><div class="empty"><div class="mk">▤</div><p>No Partnership Leads yet — add one in Admin first.</p></div></div>`;
    return html;
  }

  if(!ngoId || !leadNgos.length){
    html += `<div class="panel"><div class="empty"><div class="mk">▤</div><p>${esc(lead?lead.name:"This lead")} has no NGOs assigned yet.</p></div></div>`;
    return html;
  }

  if(!selMonth){
    html += `<div class="panel"><div class="empty"><div class="mk">◎</div>
      <p>No outcomes recorded yet. Upload an Excel sheet or click <b>+ Key Result</b>.</p></div></div>`;
    return html;
  }

  const rows = all.filter(r=>r.month===selMonth);
  const allDerived = rows.length && rows.every(r=>r.derived);
  if(allDerived){
    html += `<div class="cum-readout" style="background:var(--amber-soft);border-left-color:var(--amber)">
      <b>Placeholder outcomes.</b> These key results were auto-generated from this NGO's
      Goal targets so the tab isn't empty. Replace them by uploading the partner's real
      monthly outcomes sheet via <b>↑ Upload Excel</b>.
    </div>`;
  }
  html += renderMboBlocks(rows, ngoId);
  return html;
}

/* =====================================================================
   TAB 3 · BUDGET  (from V1 — KPI tiles + budget-vs-actual + table)
   ===================================================================== */
function ngoBudgetTab(ngoId){
  const n = ngoById(ngoId);
  const b = DB.budgets[ngoId];
  if(!b) return `<div class="panel"><div class="empty"><div class="mk">▦</div>
    <p>No budget uploaded for ${esc(n.short)}.</p><br>
    <button class="btn accent" onclick="openBudgetUpload('${ngoId}')">↑ Upload budget plan</button></div></div>`;

  const spentUpto = ngoSpendUpto(ngoId,CUR_MONTH);
  const utilPct   = pct(spentUpto, b.totalAnnual);
  const elapsed   = monthsElapsed(CUR_MONTH);
  const planUpto  = b.monthlyPlan.slice(0,elapsed).reduce((a,c)=>a+c,0);
  const variance  = spentUpto - planUpto;
  const utilCls   = utilPct>95?"red": utilPct<55?"amber":"green";
  const over      = variance>0;

  // per-month + cumulative running totals
  let cumPlan=0, cumActual=0;
  const monthRows = FY_MONTHS.map((m,i)=>{
    const plan=b.monthlyPlan[i];
    const actual=ngoSpendForMonth(ngoId,m);
    const reported = m<=CUR_MONTH && actual>0;
    cumPlan += plan;
    if(reported) cumActual += actual;
    return {m,plan,actual,reported,cumPlan,cumActual};
  });
  const linePts = monthRows.map(r=>({
    label:monthLabel(r.m).split(" ")[0],
    cumPlan:r.cumPlan,
    cumActual:r.cumActual,
    reported:r.reported
  }));

  return `
  <div class="sec-head">
    <h2>Budget vs Actual</h2>
    <div class="sh-act">
      <button class="btn ghost sm" style="color:var(--red)" onclick="clearBudget('${ngoId}')">✕ Clear budget</button>
      <button class="btn accent sm" onclick="openBudgetUpload('${ngoId}')">✎ Edit budget plan</button>
    </div>
  </div>

  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card">
      <div class="stat-ico blue">₹</div>
      <div><div class="stat-l">Approved Budget</div>
        <div class="stat-v">${fmtRs(b.totalAnnual)}</div>
        <div class="stat-sub">${DB.meta.fyLabel} plan</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-ico ${utilCls}">◔</div>
      <div><div class="stat-l">Utilised to ${monthLabel(CUR_MONTH)}</div>
        <div class="stat-v">${fmtRs(spentUpto)}</div>
        <div class="stat-sub" style="color:var(--${utilCls})">${utilPct}% of approved budget</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-ico blue">◑</div>
      <div><div class="stat-l">Budget remaining</div>
        <div class="stat-v">${fmtRs(Math.max(0,b.totalAnnual-spentUpto))}</div>
        <div class="stat-sub">${pct(Math.max(0,b.totalAnnual-spentUpto),b.totalAnnual)}% of the approved budget unspent</div></div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:16px">
    <div class="panel-h">
      <h3>Cumulative spend — planned vs actual</h3>
      <span class="note">running totals across the year</span>
    </div>
    <div class="panel-b">
      <div class="cum-readout ${over?'over':'under'}">
        By <b>${monthLong(CUR_MONTH)}</b> the plan is to have spent <b>${fmtRsFull(planUpto)}</b>;
        actual spend is <b>${fmtRsFull(spentUpto)}</b> —
        <span class="cum-verdict">${over
          ? 'overspending by '+fmtRsFull(variance)
          : variance===0 ? 'exactly on plan'
          : 'underspending by '+fmtRsFull(-variance)}</span>.
      </div>
      ${svgCumulativeLine(linePts)}
    </div>
  </div>

  <div class="panel" style="margin-bottom:16px">
    <div class="panel-h"><h3>Month-by-month spend</h3><span class="note">planned vs debit-note actuals</span></div>
    <div class="panel-b">
      ${svgBudgetBars(monthRows.map(r=>({
        label:monthLabel(r.m).split(" ")[0],
        plan:r.plan, actual:r.actual, reported:r.reported
      })))}
    </div>
  </div>

  <div class="panel">
    <div class="panel-h"><h3>Detailed breakdown</h3></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Month</th><th class="num">Planned</th><th class="num">Actual</th>
          <th class="num">Monthly variance</th><th class="num">Cumulative plan</th>
          <th class="num">Cumulative actual</th><th class="num">Running variance</th>
        </tr></thead>
        <tbody>
        ${monthRows.map(r=>{
          const d=r.actual-r.plan;
          const runVar = r.reported? (r.cumActual-r.cumPlan) : null;
          return `<tr>
            <td><b>${monthLabel(r.m)}</b>${r.m===CUR_MONTH?' <span class="badge blue" style="font-size:9px">current</span>':''}</td>
            <td class="num">${fmtRsFull(r.plan)}</td>
            <td class="num">${r.reported?fmtRsFull(r.actual):'<span style="color:var(--ink-3)">—</span>'}</td>
            <td class="num" style="color:${r.reported?(d>0?'var(--red)':'var(--green)'):'var(--ink-3)'}">${r.reported?(d>=0?'+':'')+fmtRs(d):'—'}</td>
            <td class="num" style="color:var(--ink-3)">${fmtRsFull(r.cumPlan)}</td>
            <td class="num">${r.reported?fmtRsFull(r.cumActual):'—'}</td>
            <td class="num" style="font-weight:700;color:${runVar==null?'var(--ink-3)':(runVar>0?'var(--red)':'var(--green)')}">${runVar==null?'—':(runVar>=0?'+':'')+fmtRs(runVar)}</td>
          </tr>`;
        }).join("")}
        </tbody>
        <tfoot class="tbl-foot">
          <tr>
            <td>Total to ${monthLabel(CUR_MONTH)}</td>
            <td class="num">${fmtRsFull(planUpto)}</td>
            <td class="num">${fmtRsFull(spentUpto)}</td>
            <td class="num" style="color:${over?'var(--red)':'var(--green)'}">${variance>=0?'+':''}${fmtRs(variance)}</td>
            <td class="num"></td><td class="num"></td>
            <td class="num" style="color:${over?'var(--red)':'var(--green)'}">${variance>=0?'+':''}${fmtRs(variance)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>`;
}

/* download a blank budget template — horizontal with Budget + Actual columns per month */
function downloadBudgetTemplate(ngoId){
  if(typeof XLSX==="undefined"){ toast("Spreadsheet library not loaded — check your connection"); return; }
  const n = ngoById(ngoId);
  const fyLabel = "FY "+FY_MONTHS[0].slice(0,4)+"-"+FY_MONTHS[11].slice(2,4);
  const monthName = ym=>{ const [yr,mo]=ym.split("-").map(Number); return MONTH_NAMES[mo]+" "+yr; };
  const rows=[
    [(n?n.name:"NGO")+" — Monthly Budget Plan "+fyLabel],
    ["Fill the Planned Budget column for every month (April to March). Keep the Month Code column unchanged, then upload this file back in the app."],
    ["Month Code","Month","Planned Budget (₹)"],
    ...FY_MONTHS.map(ym=>[ym, monthName(ym), 0]),
    ["","Total",{f:"SUM(C4:C15)"}]
  ];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  for(let i=0;i<12;i++){ const ref="A"+(4+i); if(ws[ref]) ws[ref].t="s"; } /* keep month codes as text */
  ws["!cols"]=[{wch:12},{wch:14},{wch:20}];
  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:2}},{s:{r:1,c:0},e:{r:1,c:2}}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Budget Plan");
  XLSX.writeFile(wb, (n?n.short:"NGO")+"_Monthly_Budget_"+FY_MONTHS[0].slice(0,4)+"-"+FY_MONTHS[11].slice(2,4)+".xlsx");
}

/* parse an uploaded monthly-plan sheet into a 12-element array (or null).
   Supports two formats:
   1. Tall/list format  — columns: Month, Planned (one row per month)
   2. Wide/pivot format — months as column headers, rows are cost categories;
      uses the row whose first cell matches "total" (case-insensitive).
      Month columns are detected as Excel date serials, YYYY-MM strings, or
      short month names (Apr, May …). */
async function parseBudgetSheet(file){
  if(typeof XLSX==="undefined") return null;
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf,{type:"array",cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];

    /* ---- helper: resolve a raw cell value to a FY_MONTHS index ---- */
    /* resolve any date-like value to a FY_MONTHS index.
       Handles: JS Date objects, Excel serial numbers, YYYY-MM strings,
       short/long month names, and the common case where Jan-Mar are stored
       with the fiscal-year START year (e.g. 2026-01 in an FY 2026-27 sheet)
       instead of the correct end year (2027-01). */
    const _dateToIdx = (yr, mo)=>{
      const ym = yr+"-"+String(mo).padStart(2,"0");
      let idx = FY_MONTHS.indexOf(ym);
      /* Jan/Feb/Mar stored with wrong year (start-year instead of end-year) */
      if(idx<0 && mo<=3){
        const altYm = (yr+1)+"-"+String(mo).padStart(2,"0");
        idx = FY_MONTHS.indexOf(altYm);
      }
      return idx;
    };
    const monthIndex = (raw)=>{
      if(raw==null || raw==="") return -1;
      /* Excel Date object (when cellDates:true) */
      if(raw instanceof Date){ const d2=new Date(raw.getTime()+12*3600*1000); return _dateToIdx(d2.getUTCFullYear(), d2.getUTCMonth()+1); }
      /* Excel date serial number (when raw:true) — days since 1899-12-30 */
      if(typeof raw==="number" && raw>40000 && raw<60000){
        const d = new Date(Math.round((raw-25569)*86400*1000));
        return _dateToIdx(d.getUTCFullYear(), d.getUTCMonth()+1);
      }
      const s = String(raw).trim();
      /* YYYY-MM */
      if(/^\d{4}-\d{2}$/.test(s)){
        const [yr,mo] = s.split("-").map(Number);
        return _dateToIdx(yr, mo);
      }
      /* ISO datetime string: 2027-03-01T00:00:00.000Z (SheetJS cellDates:true).
         Noon-shift guards against timezone month-shift (e.g. 28-Feb 18:30Z = 1-Mar IST). */
      if(/^\d{4}-\d{2}-\d{2}/.test(s)){
        const dt = new Date(s);
        if(!isNaN(dt)){ const d2=new Date(dt.getTime()+12*3600*1000); return _dateToIdx(d2.getUTCFullYear(), d2.getUTCMonth()+1); }
        const [yr,mo] = s.split("-").map(Number);
        return _dateToIdx(yr, mo);
      }
      /* Short/long month name: Apr, April, May … — match by month number only */
      const mn = s.slice(0,3).toLowerCase();
      const num = Object.keys(MONTH_NAMES).find(k=>MONTH_NAMES[k].toLowerCase()===mn);
      if(!num) return -1;
      return FY_MONTHS.findIndex(m=>(+m.split("-")[1])===(+num));
    };

    /* ---- attempt 1: tall/list format (Month + Planned columns) ----
       First locate the header row (a cell starting with "Month"), so title /
       instruction rows above the table don't swallow the headers. */
    const probe = XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:false,dateNF:"YYYY-MM"});
    let hdrRow = 0;
    for(let ri=0;ri<Math.min(probe.length,10);ri++){
      if((probe[ri]||[]).some(c=>/^month/i.test(String(c).trim()))){ hdrRow=ri; break; }
    }
    const rows = XLSX.utils.sheet_to_json(ws,{defval:"",raw:false,dateNF:"YYYY-MM",range:hdrRow});
    const plan1 = FY_MONTHS.map(()=>0);
    let hit1 = 0; const seen1 = new Set();
    rows.forEach(r=>{
      const idx = monthIndex(pickCol(r,["month","mon"]));
      const amt = parseFloat(String(pickCol(r,["planned","plan","amount","budget"])).replace(/[^0-9.\-]/g,""));
      if(idx>=0 && !isNaN(amt)){ plan1[idx]=amt; hit1++; seen1.add(idx); }
    });
    if(hit1>=1){ window._bgMonthsRead=[...seen1]; return plan1; }

    /* ---- attempt 2: wide/pivot format (months as column headers) ----
       Read raw 2-D array so we can inspect every row and header cell. */
    const grid = XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:true});
    /* Find the header row: the row that contains the most month-like values */
    let headerRowIdx = -1, headerColMap = {}; /* colIndex -> FY_MONTHS index */
    for(let ri=0;ri<Math.min(grid.length,10);ri++){
      const row = grid[ri];
      const map = {};
      for(let ci=1;ci<row.length;ci++){
        const mi = monthIndex(row[ci]);
        if(mi>=0) map[ci]=mi;
      }
      if(Object.keys(map).length > Object.keys(headerColMap).length){
        headerColMap = map; headerRowIdx = ri;
      }
    }
    if(headerRowIdx<0 || Object.keys(headerColMap).length===0) return null;

    /* Find the "Total" data row (first col contains "total", case-insensitive).
       Also accept "grand total". Fall back to the last non-empty numeric row. */
    const plan2 = FY_MONTHS.map(()=>0);
    let hit2 = 0;
    let fallbackPlan = null, fallbackHit = 0;
    for(let ri=headerRowIdx+1;ri<grid.length;ri++){
      const row = grid[ri];
      const label = String(row[0]||"").trim().toLowerCase();
      /* Try every data row as a candidate and accumulate a fallback */
      const rowPlan = FY_MONTHS.map(()=>0); let rowHit=0;
      for(const [ci,mi] of Object.entries(headerColMap)){
        const v = parseFloat(String(row[ci]||"").replace(/[^0-9.\-]/g,""));
        if(!isNaN(v) && v>0){ rowPlan[mi]=v; rowHit++; }
      }
      if(rowHit>0 && rowHit>=fallbackHit){ fallbackPlan=rowPlan; fallbackHit=rowHit; }
      /* Prefer the explicit "Total" / "Grand Total" row */
      if((label==="total"||label.includes("grand total")||label.includes("total")) && rowHit>0){
        for(const [mi,v] of Object.entries(rowPlan)) plan2[mi]=v;
        hit2=rowHit; break;
      }
    }
    window._bgMonthsRead=[...new Set(Object.values(headerColMap))];
    if(hit2>0) return plan2;
    if(fallbackPlan && fallbackHit>0) return fallbackPlan;

    return null;
  }catch(e){ console.error(e); return null; }
}

async function saveBudgetPlan(ngoId){
  const annualInput = parseFloat(el("bgAnnual").value);
  const fileInput = el("bgFile");
  let monthlyPlan = null;

  // a sheet, if provided, defines the plan directly
  if(fileInput && fileInput.files && fileInput.files[0]){
    monthlyPlan = await parseBudgetSheet(fileInput.files[0]);
    if(!monthlyPlan){ toast("Couldn't read a Month / Planned column from that file"); return; }
    const _read = (window._bgMonthsRead||[]);
    if(_read.length && _read.length<12){
      const _missing = FY_MONTHS.map((m,i)=>_read.includes(i)?null:monthLabel(m)).filter(Boolean);
      toast("⚠ Read "+_read.length+" of 12 months — missing: "+_missing.join(", ")+". Saved anyway — please check the sheet.");
    }
  }
  const existing = DB.budgets[ngoId];

  // the Salary/Other monthly grid, if filled, defines the plan next
  let salaryPlan=null, otherPlan=null;
  if(!monthlyPlan && el("bbS0")){
    const gs = FY_MONTHS.map((m,i)=>parseFloat(el("bbS"+i).value)||0);
    const go = FY_MONTHS.map((m,i)=>parseFloat(el("bbO"+i).value)||0);
    if(gs.some(v=>v>0) || go.some(v=>v>0)){
      salaryPlan = gs; otherPlan = go;
      monthlyPlan = FY_MONTHS.map((m,i)=>gs[i]+go[i]);
    }
  }

  if(!monthlyPlan){
    if(!annualInput || annualInput<=0){ toast("Enter a valid annual budget amount"); return; }
    const split = el("bgSplit").value;
    if(split==="keep" && existing && existing.monthlyPlan && existing.totalAnnual){
      const oldTotal = existing.monthlyPlan.reduce((a,c)=>a+c,0) || 1;
      monthlyPlan = existing.monthlyPlan.map(v=>Math.round(v/oldTotal*annualInput));
    } else {
      const per = Math.round(annualInput/12);
      monthlyPlan = FY_MONTHS.map(()=>per);
    }
  }
  const annual = monthlyPlan.reduce((a,c)=>a+c,0);
  // keep the Salary/Other monthly split in step when the grid wasn't used
  if(!salaryPlan){
    const exS = (existing && existing.annual && +existing.annual.Salary) || 0;
    const exT = (existing && +existing.totalAnnual) || 0;
    const share = exT>0 ? Math.min(1, Math.max(0, exS/exT)) : 0;
    salaryPlan = monthlyPlan.map(v=>Math.round(v*share));
    otherPlan  = monthlyPlan.map((v,i)=>v-salaryPlan[i]);
  }
  const salarySum = salaryPlan.reduce((a,c)=>a+c,0), otherSum = annual-salarySum;
  // category split: Salary is exact; spread the rest over known proportions
  let annualCats = {}; BUDGET_CATS.forEach(c=>annualCats[c]=0);
  annualCats.Salary = salarySum;
  const exNon = existing && existing.annual
    ? BUDGET_CATS.filter(c=>c!=="Salary").reduce((a,c)=>a+(+existing.annual[c]||0),0) : 0;
  if(exNon>0) BUDGET_CATS.filter(c=>c!=="Salary").forEach(c=>annualCats[c]=Math.round((+existing.annual[c]||0)/exNon*otherSum));
  else annualCats.Programme = otherSum;
  const rec = { annual:annualCats, totalAnnual:annual, monthlyPlan, salaryPlan, otherPlan,
                editedBy:ME?ME.name:"—", editedAt:TODAY_ISO };
  if(existing && existing.book) rec.book = existing.book;  // keep workbook export metadata
  DB.budgets[ngoId] = rec;
  await saveDB(); closeModal(); render();
  toast("Budget plan saved for "+ngoById(ngoId).short);
}

/* live totals under the Salary/Other grid in the budget modal */
function bbGridTotals(){
  let s=0,o=0;
  FY_MONTHS.forEach((m,i)=>{
    s += parseFloat(el("bbS"+i)&&el("bbS"+i).value)||0;
    o += parseFloat(el("bbO"+i)&&el("bbO"+i).value)||0;
  });
  if(el("bbSt")) el("bbSt").textContent = fmtRsFull(s);
  if(el("bbOt")) el("bbOt").textContent = fmtRsFull(o);
  if(el("bbGt")) el("bbGt").textContent = fmtRsFull(s+o);
}

function clearBudget(ngoId){
  if(!canEditNgo(ngoId)){ toast("You don't have access to change this NGO's budget"); return; }
  const n = ngoById(ngoId);
  confirmAction("Clear budget plan?",
    `The entire budget plan for <b>${esc(n?n.short:'this NGO')}</b> — including the annual amount and all monthly figures — will be removed. Debit notes are not affected.`,
    async ()=>{
      delete DB.budgets[ngoId];
      await saveDB(); closeModal(); render();
      toast("Budget plan cleared for "+(n?n.short:'NGO'));
    }, "Clear budget", true);
}

/* =====================================================================
   FINALIZED BUDGET WORKBOOK — import + export
   Reproduces the finalized "Partnership Budget" file: a Summary sheet,
   an All Trusts (budget vs actual) sheet and one sheet per partner
   trust, with the same layout, merges and formulas. Budgets come from
   DB.budgets (salaryPlan/otherPlan); actuals flow from debit notes.
   ===================================================================== */
const BB_FY       = "FY "+FY_MONTHS[0].slice(0,4)+"-"+FY_MONTHS[11].slice(2,4);
const BB_FY_SHORT = FY_MONTHS[0].slice(0,4)+"-"+FY_MONTHS[11].slice(2,4);
/* 0-based column index of each month's Budget column (its Actual is +1):
   F H J · N P R · V X Z · AD AF AH, with a quarter pair after each block */
const BB_MCOL = [5,7,9, 13,15,17, 21,23,25, 29,31,33];
const BB_QCOL = [11,19,27,35];   /* L T AB AJ */
const BB_YCOL = 37;              /* AL (year Budget), AM = Actual */

function bbToday(){ const d=new Date();
  return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear(); }
function bbCol(c){ return XLSX.utils.encode_col(c); }
function bbSheetSafe(s){ return String(s||"Sheet").replace(/[\[\]\*\?\/\\:]/g," ").replace(/\s+/g," ").trim().slice(0,31)||"Sheet"; }

/* per-month Salary vs Other actuals for one NGO, from debit notes */
function bbMonthActuals(ngoId){
  const sal=FY_MONTHS.map(()=>0), oth=FY_MONTHS.map(()=>0);
  DB.debits.forEach(d=>{
    if(d.ngoId!==ngoId || !dnCounts(d)) return;
    const i=FY_MONTHS.indexOf(d.month); if(i<0) return;
    if(d.category==="Salary") sal[i]+=(+d.amount||0); else oth[i]+=(+d.amount||0);
  });
  return {sal,oth};
}

/* the NGOs that appear in the workbook, in workbook order.
   After an import every included NGO carries budget.book metadata; before
   any import, fall back to every NGO that has a budget. */
function bbExportList(){
  const withBook = DB.ngos.filter(n=>DB.budgets[n.id] && DB.budgets[n.id].book);
  if(withBook.length)
    return withBook.slice().sort((a,b)=>(DB.budgets[a.id].book.order||999)-(DB.budgets[b.id].book.order||999));
  return DB.ngos.filter(n=>DB.budgets[n.id] && DB.budgets[n.id].totalAnnual>0);
}
function bbMeta(n){
  const b=DB.budgets[n.id]||{}, k=b.book||{};
  return { sheet: bbSheetSafe(k.sheet||n.short||n.name),
           trust: k.trust||n.name,
           summaryName: k.summaryName||k.trust||n.name,
           atName: k.atName||k.trust||n.name,
           /* with workbook metadata the objective is authoritative even when
              blank (the finalized file leaves some blank on purpose) */
           objective: b.book ? (k.objective||"") : (n.vertical||""),
           site: k.site||"" };
}

/* ---------- export ---------- */
/* styles only take effect when the style-capable writer loads; the plain
   SheetJS build silently ignores them, so the export still works offline */
function bbStyles(){
  const bd={style:"thin",color:{rgb:"C9C9C9"}};
  const border={top:bd,bottom:bd,left:bd,right:bd};
  return {
    title:{font:{bold:true,sz:13}},
    sub:{font:{sz:10,color:{rgb:"7A7A7A"}}},
    th:{font:{bold:true,sz:10},alignment:{horizontal:"center",vertical:"center"},
        fill:{patternType:"solid",fgColor:{rgb:"DDE8F4"}},border},
    thQ:{font:{bold:true,sz:10},alignment:{horizontal:"center",vertical:"center"},
        fill:{patternType:"solid",fgColor:{rgb:"C5D9F1"}},border},
    lab:{font:{bold:true}},
    tot:{font:{bold:true},fill:{patternType:"solid",fgColor:{rgb:"F2F2F2"}}},
    grand:{font:{bold:true},fill:{patternType:"solid",fgColor:{rgb:"C5D9F1"}}}
  };
}
async function bbLib(){
  if(window._XLSXS) return window._XLSXS;
  try{
    const prev=window.XLSX;
    await new Promise((res,rej)=>{ const s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js";
      s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    window._XLSXS=window.XLSX; window.XLSX=prev;
    return window._XLSXS||prev;
  }catch(e){ return window.XLSX; }
}
function bbCell(ws,r,c,cell){ ws[XLSX.utils.encode_cell({r,c})]=cell; }
function bbMoney(v,s){ const c={t:"n",v:Math.round(+v||0),z:"#,##0"}; if(s)c.s=s; return c; }
/* formula cell WITH its computed value cached — without the cached value,
   Excel/most viewers show freshly-written formula cells as blank until a
   manual full recalc, which made Summary/All Trusts look empty */
function bbFml(f,s,v){ const c={t:"n",f,z:"#,##0"}; if(s)c.s=s; if(v!=null&&isFinite(v))c.v=Math.round(v); return c; }
/* per-column computed values for one Budget-vs-Actual data row:
   months, quarter roll-ups and the FY total, for budget AND actual */
function bbRowVals(plan,act){
  const v={};
  FY_MONTHS.forEach((m,i)=>{ v[BB_MCOL[i]]=(+plan[i]||0); v[BB_MCOL[i]+1]=(+act[i]||0); });
  BB_QCOL.forEach((c,qi)=>{
    v[c]  =(+plan[3*qi]||0)+(+plan[3*qi+1]||0)+(+plan[3*qi+2]||0);
    v[c+1]=(+act [3*qi]||0)+(+act [3*qi+1]||0)+(+act [3*qi+2]||0);
  });
  v[BB_YCOL]  =plan.reduce((a,x)=>a+(+x||0),0);
  v[BB_YCOL+1]=act .reduce((a,x)=>a+(+x||0),0);
  return v;
}

/* rows 2-3: month/quarter header pairs + Budget/Actual labels (shared by
   the All Trusts sheet and every trust sheet) */
function bbHeadRows(ws,merges,S){
  FY_MONTHS.forEach((mo,i)=>{
    const c=BB_MCOL[i], [y,mm]=mo.split("-");
    bbCell(ws,1,c,{t:"d",v:new Date(+y,+mm-1,1),z:"mmm-yy",s:S.th});
    merges.push({s:{r:1,c},e:{r:1,c:c+1}});
  });
  ["Q1","Q2","Q3","Q4"].forEach((q,i)=>{ const c=BB_QCOL[i];
    bbCell(ws,1,c,{t:"s",v:q,s:S.thQ}); merges.push({s:{r:1,c},e:{r:1,c:c+1}}); });
  bbCell(ws,1,BB_YCOL,{t:"s",v:BB_FY_SHORT,s:S.thQ});
  merges.push({s:{r:1,c:BB_YCOL},e:{r:1,c:BB_YCOL+1}});
  ["Sr No","Trust","Project","Site Name","Expense Type"].forEach((h,c)=>bbCell(ws,2,c,{t:"s",v:h,s:S.th}));
  for(let c=5;c<=BB_YCOL+1;c+=2){ bbCell(ws,2,c,{t:"s",v:"Budget",s:S.th}); bbCell(ws,2,c+1,{t:"s",v:"Actual",s:S.th}); }
}
function bbWide(){ const cols=[{wch:6},{wch:38},{wch:26},{wch:16},{wch:12}];
  for(let c=5;c<=BB_YCOL+1;c++) cols.push({wch:12}); return cols; }
/* quarter + year roll-up formulas for one row (budget and actual),
   with their computed values cached from `vals` */
function bbRollups(ws,r0,vals,S){
  const R=r0+1;
  BB_QCOL.forEach((c,qi)=>{
    const mc=BB_MCOL.slice(qi*3,qi*3+3);
    bbCell(ws,r0,c,  bbFml(mc.map(x=>bbCol(x)+R).join("+"),S,vals[c]));
    bbCell(ws,r0,c+1,bbFml(mc.map(x=>bbCol(x+1)+R).join("+"),S,vals[c+1]));
  });
  bbCell(ws,r0,BB_YCOL,  bbFml(BB_QCOL.map(x=>bbCol(x)+R).join("+"),S,vals[BB_YCOL]));
  bbCell(ws,r0,BB_YCOL+1,bbFml(BB_QCOL.map(x=>bbCol(x+1)+R).join("+"),S,vals[BB_YCOL+1]));
}

/* one sheet per trust: r4 Salary, r5 Total A, r6 Other, r7 Total B, r8 Total */
function bbTrustSheet(n,S){
  const b=DB.budgets[n.id]||emptyBudget(), m=bbMeta(n);
  const {sal,oth}=bbMonthActuals(n.id);
  const vSal=bbRowVals(b.salaryPlan||[],sal), vOth=bbRowVals(b.otherPlan||[],oth);
  const ws={}, merges=[];
  bbCell(ws,0,0,{t:"s",v:m.trust+" - Budget vs Actual Expense "+BB_FY,s:S.title});
  bbHeadRows(ws,merges,S);
  const line=(r0,type,plans,acts,vals)=>{
    bbCell(ws,r0,1,{t:"s",v:m.trust});
    if(m.objective) bbCell(ws,r0,2,{t:"s",v:m.objective});
    if(m.site)      bbCell(ws,r0,3,{t:"s",v:m.site});
    bbCell(ws,r0,4,{t:"s",v:type});
    FY_MONTHS.forEach((mo,i)=>{
      bbCell(ws,r0,BB_MCOL[i],bbMoney(plans[i]||0));
      if(acts[i]>0) bbCell(ws,r0,BB_MCOL[i]+1,bbMoney(acts[i]));
    });
    bbRollups(ws,r0,vals);
  };
  line(3,"Salary",b.salaryPlan||[],sal,vSal);
  line(5,"Other", b.otherPlan ||[],oth,vOth);
  const sumRow=(r0,srcR,label,sr,vals)=>{
    if(sr!=null) bbCell(ws,r0,0,{t:"n",v:sr});
    bbCell(ws,r0,2,{t:"s",v:label,s:S.lab});
    for(let c=5;c<=BB_YCOL+1;c++) bbCell(ws,r0,c,bbFml("SUM("+bbCol(c)+srcR+")",S.tot,vals[c]));
  };
  sumRow(4,4,"Salary - Total A",1,vSal);
  sumRow(6,6,"Other - Total B",2,vOth);
  bbCell(ws,7,2,{t:"s",v:"Total (A+B)",s:S.lab});
  for(let c=5;c<=BB_YCOL+1;c++) bbCell(ws,7,c,bbFml(bbCol(c)+"5+"+bbCol(c)+"7",S.tot,(vSal[c]||0)+(vOth[c]||0)));
  ws["!merges"]=merges; ws["!cols"]=bbWide();
  ws["!ref"]="A1:"+XLSX.utils.encode_cell({r:7,c:BB_YCOL+1});
  return ws;
}

/* the consolidated All Trusts sheet: 3 rows per trust + grand total */
function bbAllTrustsSheet(list,S){
  const ws={}, merges=[];
  bbCell(ws,0,0,{t:"s",v:"All Partner Trusts - Budget vs Actual Expense "+BB_FY,s:S.title});
  bbHeadRows(ws,merges,S);
  const gv={}; for(let c=5;c<=BB_YCOL+1;c++) gv[c]=0;
  list.forEach((n,i)=>{
    const b=DB.budgets[n.id]||emptyBudget(), m=bbMeta(n), q="'"+m.sheet.replace(/'/g,"''")+"'";
    const {sal,oth}=bbMonthActuals(n.id);
    const vSal=bbRowVals(b.salaryPlan||[],sal), vOth=bbRowVals(b.otherPlan||[],oth);
    const base=3+i*3;                       /* 0-based Salary row */
    const refRow=(r0,srcR,type,vals)=>{
      bbCell(ws,r0,1,{t:"s",v:m.atName});
      if(m.objective) bbCell(ws,r0,2,{t:"s",v:m.objective});
      if(m.site)      bbCell(ws,r0,3,{t:"s",v:m.site});
      bbCell(ws,r0,4,{t:"s",v:type});
      BB_MCOL.forEach(c=>{
        bbCell(ws,r0,c,  bbFml(q+"!"+bbCol(c)+srcR,null,vals[c]));
        bbCell(ws,r0,c+1,bbFml(q+"!"+bbCol(c+1)+srcR,null,vals[c+1]));
      });
      bbRollups(ws,r0,vals);
    };
    bbCell(ws,base,0,{t:"n",v:i+1});
    refRow(base,  4,"Salary",vSal);
    refRow(base+1,6,"Other", vOth);
    /* trust total row: every column = Salary+Other; AL/AM from the trust sheet */
    const tr=base+2, R=base+1;
    bbCell(ws,tr,2,{t:"s",v:m.atName+" - Total",s:S.lab});
    bbCell(ws,tr,4,{t:"s",v:"Total",s:S.lab});
    for(let c=5;c<BB_YCOL;c++) bbCell(ws,tr,c,bbFml(bbCol(c)+R+"+"+bbCol(c)+(R+1),S.tot,(vSal[c]||0)+(vOth[c]||0)));
    bbCell(ws,tr,BB_YCOL,  bbFml(q+"!AL8",S.tot,(vSal[BB_YCOL]||0)+(vOth[BB_YCOL]||0)));
    bbCell(ws,tr,BB_YCOL+1,bbFml(q+"!AM8",S.tot,(vSal[BB_YCOL+1]||0)+(vOth[BB_YCOL+1]||0)));
    for(let c=5;c<=BB_YCOL+1;c++) gv[c]+=(vSal[c]||0)+(vOth[c]||0);
  });
  const gr=3+list.length*3;
  bbCell(ws,gr,2,{t:"s",v:"GRAND TOTAL (All Trusts)",s:S.lab});
  const totRows=list.map((n,i)=>3+i*3+2+1);          /* 1-based trust-total rows */
  for(let c=5;c<=BB_YCOL+1;c++)
    bbCell(ws,gr,c,bbFml(totRows.map(r=>bbCol(c)+r).join("+"),S.grand,gv[c]));
  ws["!merges"]=merges; ws["!cols"]=bbWide();
  ws["!ref"]="A1:"+XLSX.utils.encode_cell({r:gr,c:BB_YCOL+1});
  return ws;
}

/* the front Summary sheet */
function bbSummarySheet(list,S){
  const ws={};
  const merges=[ {s:{r:0,c:0},e:{r:0,c:5}}, {s:{r:1,c:0},e:{r:1,c:5}},
                 {s:{r:3,c:0},e:{r:3,c:2}}, {s:{r:3,c:3},e:{r:3,c:5}} ];
  bbCell(ws,0,0,{t:"s",v:"Partnership Budget Summary — "+BB_FY,s:S.title});

  X.utils.book_append_sheet(wb,bbAllTrustsSheet(list,S),"All Trusts");
  const used=new Set(["summary","all trusts"]);

     the Summary row order) */
  const tabList=list.slice().sort((a,b)=>{
    const ka=(DB.budgets[a.id].book||{}).tabOrder||999, kb=(DB.budgets[b.id].book||{}).tabOrder||999;

/* ---------- import ---------- */
function bbNorm(s){ return String(s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }
function bbLev(a,b){
  if(a===b) return 0;
  const m=a.length,n=b.length; if(!m||!n) return m||n;
  let prev=Array.from({length:n+1},(x,i)=>i);
  for(let i=1;i<=m;i++){
    const cur=[i];
    for(let j=1;j<=n;j++)
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur;
  }
  return prev[n];
}
function bbMatchNgo(t){
  const keys=[t.trust,t.summaryName,t.atName,t.sheet].filter(Boolean).map(bbNorm);
  let best=null, bestScore=0;
  DB.ngos.forEach(n=>{
    let score=0;
    [n.name,n.short].filter(Boolean).map(bbNorm).forEach(c=>{
      keys.forEach(k=>{
        if(!k||!c) return;
        if(k===c) score=Math.max(score,100);
        else if(k.length>=5&&c.length>=5&&(k.includes(c)||c.includes(k))) score=Math.max(score,80);
        else if(Math.min(k.length,c.length)>=5&&bbLev(k,c)<=2) score=Math.max(score,60);
      });
    });
    if(score>bestScore){ bestScore=score; best=n; }
  });
  return bestScore>=60?best:null;
}

async function bbParseBook(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:"array"});
  const names=wb.SheetNames;
  const find=t=>names.find(s=>s.trim().toLowerCase()===t);
  const sumName=find("summary"), atName=find("all trusts");
  const skip=new Set([sumName,atName].filter(Boolean));
  const cv=(ws,a)=>{ const c=ws[a]; return c?c.v:undefined; };
  /* tie Summary rows to trust sheets through the F-column formula =Sheet!AL8 */
  const sumMeta={};
  if(sumName){
    const sws=wb.Sheets[sumName];
    for(let r=6;r<300;r++){
      const bv=cv(sws,"B"+r); if(bv==null) continue;
      if(/grand total/i.test(String(bv))) break;
      const f=(sws["F"+r]||{}).f||"";
      const mm=f.match(/^=?'?([^'!]+)'?!/);   /* SheetJS stores .f without the leading = */
      if(mm) sumMeta[mm[1].trim().toLowerCase()]={
        summaryName:String(bv).trim(),
        objective:String(cv(sws,"C"+r)||"").trim(),
        order:r-5 };
    }
  }
  /* the trust-name variant used on the All Trusts sheet, via its F refs */
  const atMeta={};
  if(atName){
    const aws=wb.Sheets[atName];
    for(let r=4;r<600;r++){
      const f=(aws["F"+r]||{}).f||"";
      const mm=f.match(/^=?'?([^'!]+)'?!F\d+$/);
      if(mm){ const key=mm[1].trim().toLowerCase();
        if(!atMeta[key]) atMeta[key]=String(cv(aws,"B"+r)||"").trim(); }
    }
  }
  const out=[]; let ord=0, tab=0;
  const num=v=>{ const x=typeof v==="number"?v:parseFloat(String(v??"").replace(/[^0-9.\-]/g,"")); return isNaN(x)?0:x; };
  names.forEach(sn=>{
    if(skip.has(sn)) return;
    const ws=wb.Sheets[sn];
    /* finalized trust-sheet layout: row 4 = Salary, row 6 = Other */
    if(String(cv(ws,"E4")||"").trim().toLowerCase()!=="salary") return;
    if(String(cv(ws,"E6")||"").trim().toLowerCase()!=="other")  return;
    const readRow=R=>BB_MCOL.map(c=>num(cv(ws,bbCol(c)+R)));
    const sal=readRow(4), oth=readRow(6);
    const key=sn.trim().toLowerCase(), sm=sumMeta[key]||{};
    out.push({ sheet:sn,
      trust:String(cv(ws,"B4")||cv(ws,"B6")||sn).trim(),
      objective:sm.objective||String(cv(ws,"C4")||"").trim(),
      site:String(cv(ws,"D4")||"").trim(),
      summaryName:sm.summaryName||"", atName:atMeta[key]||"",
      /* the Summary row order drives Summary/All Trusts rows; the workbook
         tab order can differ, so keep both for a faithful round-trip */
      order:sm.order!=null?sm.order:(++ord)+1000,
      tabOrder:++tab,
      salaryPlan:sal, otherPlan:oth,
      salTotal:sal.reduce((a,c)=>a+c,0), othTotal:oth.reduce((a,c)=>a+c,0) });
  });
  out.sort((a,b)=>a.order-b.order);
  return out;
}

async function bbApplyImport(){
  const data=window._bbImport; if(!data||!data.length) return;
  /* keep a one-shot backup of the previous plans (restorable from a JSON backup too) */
  try{ DB.meta.budgetsBackup={at:TODAY_ISO, by:ME?ME.name:"—", data:JSON.parse(JSON.stringify(DB.budgets))}; }catch(e){}
  let applied=0, created=0;
  data.forEach((t,i)=>{
    const sel=el("bbMap"+i), v=sel?sel.value:"__skip";
    if(v==="__skip") return;
    let ngoId=v;
    if(v==="__create"){
      const rec={ id:genId("n"), name:t.trust, short:bbSheetSafe(t.sheet).slice(0,18)||t.trust.slice(0,18),
                  state:"—", vertical:/educat/i.test(t.objective)?"Education":"Livelihood",
                  lead:"—", since:TODAY_ISO.slice(0,7), partnership:"Active" };
      DB.ngos.push(rec); ngoId=rec.id; created++;
    }
    const monthlyPlan=FY_MONTHS.map((m,j)=>(t.salaryPlan[j]||0)+(t.otherPlan[j]||0));
    const salSum=t.salTotal, othSum=t.othTotal;
    const prev=DB.budgets[ngoId];
    const annual={}; BUDGET_CATS.forEach(c=>annual[c]=0);
    annual.Salary=salSum;
    const exNon=prev&&prev.annual?BUDGET_CATS.filter(c=>c!=="Salary").reduce((a,c)=>a+(+prev.annual[c]||0),0):0;
    if(exNon>0) BUDGET_CATS.filter(c=>c!=="Salary").forEach(c=>annual[c]=Math.round((+prev.annual[c]||0)/exNon*othSum));
    else annual.Programme=othSum;
    DB.budgets[ngoId]={ annual, totalAnnual:salSum+othSum, monthlyPlan,
      salaryPlan:t.salaryPlan, otherPlan:t.otherPlan,
      book:{ order:i+1, tabOrder:t.tabOrder||i+1, sheet:t.sheet, trust:t.trust,
             summaryName:t.summaryName||t.trust, atName:t.atName||t.trust,
             objective:t.objective||"", site:t.site||"" },
      editedBy:ME?ME.name:"—", editedAt:TODAY_ISO };
    applied++;
  });
  await saveDB(); closeModal(); render();
  toast("Imported budgets for "+applied+" NGO(s)"+(created?" · created "+created+" new NGO record(s)":""));
}
