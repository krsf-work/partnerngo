<style>
  :root{
    --paper:#f5f6f9;
    --paper-2:#eceef3;
    --card:#ffffff;
    --ink:#1b2333;
    --ink-2:#515f78;
    --ink-3:#929fb5;
    --rule:#e7e9f0;
    --rule-2:#d6dae3;
    --accent:#3f5fd8;
    --accent-soft:#e6eafe;
    --gold:#b08400;
    --green:#1c976a;
    --green-soft:#daf2e8;
    --amber:#d6912a;
    --amber-soft:#faecd2;
    --red:#d9543f;
    --red-soft:#fadfd9;
    --blue:#3079bd;
    --blue-soft:#dbe8f5;
    --violet:#7d63cc;
    --violet-soft:#e9e3f9;
    --shadow:0 1px 2px rgba(27,35,51,.04),0 3px 12px rgba(27,35,51,.055);
    --shadow-lg:0 2px 8px rgba(27,35,51,.07),0 16px 44px rgba(27,35,51,.12);
    --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    --display:'Fraunces',Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:var(--display);font-optical-sizing:auto}
  .news{font-family:var(--display)}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:13px;color:var(--ink)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--rule-2);border-radius:6px;border:2px solid var(--paper)}
  ::-webkit-scrollbar-track{background:transparent}

  /* ===== LOGIN ===== */
  #login{
    position:fixed;inset:0;z-index:200;
    display:flex;align-items:center;justify-content:center;
    background:var(--paper);
    background-image:none;
    background-size:22px 22px;
  }
  .login-card{
    width:380px;background:var(--card);
    border:1px solid var(--rule);box-shadow:var(--shadow-lg);
    padding:42px 40px 36px;border-radius:20px;
  }
  .login-mark{
    font-family:var(--sans);font-weight:700;font-size:12px;
    letter-spacing:.3em;text-transform:uppercase;color:var(--accent);
    margin-bottom:6px;
  }
  .login-card h1{font-family:var(--display);font-weight:600;font-size:30px;line-height:1.1;letter-spacing:-.01em;margin-bottom:4px}
  .login-card .sub{color:var(--ink-3);font-size:13px;margin-bottom:26px}
  .login-card label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px;font-weight:700}
  .login-pick{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
  .login-opt{
    display:flex;align-items:center;gap:12px;padding:11px 13px;
    border:1px solid var(--rule);background:var(--card);border-radius:11px;
    transition:.14s;text-align:left;
  }
  .login-opt:hover{border-color:var(--ink-3)}
  .login-opt.sel{border-color:var(--accent);background:var(--accent-soft)}
  .login-opt .av{
    width:32px;height:32px;flex:none;border-radius:50%;
    background:var(--ink-2);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;
  }
  .login-opt.sel .av{background:var(--accent)}
  .login-opt .nm{font-weight:600;font-size:13px}
  .login-opt .rl{font-size:11px;color:var(--ink-3)}
  .login-btn{
    width:100%;padding:12px;background:var(--accent);color:#fff;border-radius:10px;
    font-weight:700;font-size:13px;letter-spacing:.02em;transition:.14s;margin-top:18px;
  }
  .login-btn:hover{background:#3f5ce0}
  .login-inp{
    width:100%;padding:11px 13px;border:1px solid var(--rule-2);border-radius:10px;
    font-size:13px;font-family:var(--sans);background:var(--card);color:var(--ink);
  }
  .login-inp:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .login-err{
    font-size:12px;color:var(--red);margin-top:10px;min-height:16px;font-weight:600;
  }
  /* live-connection indicator in the topbar */
  .conn{display:flex;align-items:center;margin-right:4px}
  .conn-dot{
    width:9px;height:9px;border-radius:50%;display:inline-block;
    background:var(--ink-3);transition:.2s;
  }
  .conn-dot.on{background:var(--green);box-shadow:0 0 0 3px color-mix(in srgb,var(--green) 22%,transparent)}
  .conn-dot.off{background:var(--amber);box-shadow:0 0 0 3px color-mix(in srgb,var(--amber) 22%,transparent)}

  /* ===== SHELL ===== */
  #app{display:none;min-height:100vh}
  .shell{display:flex;min-height:100vh}
  .side{
    width:236px;flex:none;background:var(--card);
    border-right:1px solid var(--rule);
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
  }
  .brand{padding:22px 22px 18px;border-bottom:1px solid var(--rule)}
  .brand .mk{
    font-family:var(--display);font-weight:700;font-size:19px;
    letter-spacing:-.01em;display:flex;align-items:center;gap:9px;
  }
  .brand .mk i{
    width:28px;height:28px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-style:normal;font-size:13px;font-weight:700;border-radius:8px;
  }
  .brand .tg{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-top:6px;line-height:1.5}
  .nav{padding:14px 12px;flex:1;overflow-y:auto}
  .nav-sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:700;padding:14px 10px 7px}
  .nav-item{
    display:flex;align-items:center;gap:11px;width:100%;
    padding:9px 11px;border-radius:9px;font-size:13px;font-weight:600;
    color:var(--ink-2);transition:.12s;text-align:left;margin-bottom:2px;
  }
  .nav-item:hover{background:var(--paper-2);color:var(--ink)}
  .nav-item.active{background:var(--accent);color:#fff}
  .nav-item .ic{width:17px;text-align:center;font-size:14px;flex:none}
  .nav-item .ct{margin-left:auto;font-size:11px;font-weight:700;background:var(--paper-2);color:var(--ink-3);padding:1px 8px;border-radius:20px}
  .nav-item.active .ct{background:rgba(255,255,255,.22);color:#fff}
  .side-foot{border-top:1px solid var(--rule);padding:13px 16px;display:flex;align-items:center;gap:10px}
  .side-foot .av{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none}
  .side-foot .nm{font-weight:600;font-size:12.5px;line-height:1.2}
  .side-foot .rl{font-size:10.5px;color:var(--ink-3)}
  .side-foot .out{margin-left:auto;font-size:15px;color:var(--ink-3);padding:5px;border-radius:5px}
  .side-foot .out:hover{color:var(--accent);background:var(--paper-2)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    height:50px;border-bottom:1px solid var(--rule);
    background:var(--card);display:flex;align-items:center;
    padding:0 22px;gap:16px;position:sticky;top:0;z-index:30;
  }
  .crumb{font-size:12px;color:var(--ink-3)}
  .crumb b{color:var(--ink);font-weight:600}
  .topbar .gap{flex:1}
  .month-pick{display:flex;align-items:center;gap:8px}
  .month-pick label{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .sel-inp{
    padding:6px 10px;border:1px solid var(--rule-2);background:var(--card);
    font-size:12.5px;font-weight:500;border-radius:8px;color:var(--ink);
  }
  .sel-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .content{padding:18px 22px 48px;max-width:1320px;width:100%}

  /* ===== PAGE HEAD ===== */
  .phead{margin-bottom:14px}
  .phead .eyebrow{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:4px}
  .phead h1{font-family:var(--display);font-weight:600;font-size:22px;letter-spacing:-.015em;line-height:1.15}
  .phead .desc{color:var(--ink-2);font-size:12.5px;margin-top:3px;max-width:620px}
  .phead-row{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  /* compact head — title row only, no greeting/description */
  .phead.slim{margin-bottom:14px;display:flex;align-items:baseline;gap:12px}
  .phead.slim h1{font-size:19px}
  .phead.slim .eyebrow{margin-bottom:0;font-size:10px}

  /* ===== CARDS / PANELS ===== */
  .panel{background:var(--card);border:1px solid var(--rule);box-shadow:var(--shadow);border-radius:16px;overflow:hidden}
  .panel-h{
    padding:11px 14px;border-bottom:1px solid var(--rule);
    display:flex;align-items:center;gap:10px;
  }
  .panel-h h3{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:-.01em}
  .panel-h .note{font-size:11.5px;color:var(--ink-3);font-weight:500}
  .panel-h .ha{margin-left:auto;display:flex;gap:8px}
  .panel-b{padding:14px}

  /* ===== KPI ===== */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
  .kpi{
    background:var(--card);border:1px solid var(--rule);padding:13px 14px 12px;
    box-shadow:var(--shadow);position:relative;border-radius:13px;transition:.16s;
  }
  .kpi:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .kpi .ktop{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .kpi .ktile{
    width:34px;height:34px;flex:none;border-radius:10px;
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .kpi .ktile.blue{background:var(--blue-soft);color:var(--blue)}
  .kpi .ktile.green{background:var(--green-soft);color:var(--green)}
  .kpi .ktile.amber{background:var(--amber-soft);color:var(--amber)}
  .kpi .ktile.red{background:var(--red-soft);color:var(--red)}
  .kpi .ktile.accent{background:var(--accent-soft);color:var(--accent)}
  .kpi .ktile.violet{background:var(--violet-soft);color:var(--violet)}
  .kpi .lab{font-size:11.5px;color:var(--ink-3);font-weight:600;letter-spacing:0}
  .kpi .val{font-family:var(--mono);font-weight:800;font-size:25px;letter-spacing:-.025em;line-height:1.05}
  .kpi .sub{font-size:11.5px;color:var(--ink-2);margin-top:4px;font-weight:500}
  .kpi .spark{display:none}
  .kpi.accent,.kpi.green,.kpi.amber,.kpi.blue{border-left:1px solid var(--rule)}

  /* ===== BADGES ===== */
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11px;font-weight:600;letter-spacing:.01em;
    padding:3px 9px;border-radius:20px;white-space:nowrap;
  }
  .badge.green{background:var(--green-soft);color:var(--green)}
  .badge.amber{background:var(--amber-soft);color:var(--amber)}
  .badge.red{background:var(--red-soft);color:var(--red)}
  .badge.blue{background:var(--blue-soft);color:var(--blue)}
  .badge.gray{background:var(--paper-2);color:var(--ink-3)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none}
  .dot.green{background:var(--green)}.dot.amber{background:var(--amber)}.dot.red{background:var(--red)}.dot.gray{background:var(--ink-3)}.dot.blue{background:var(--blue)}

  /* ===== PROGRESS ===== */
  .pbar{height:7px;background:var(--paper-2);border-radius:20px;overflow:hidden;position:relative}
  .pbar i{display:block;height:100%;border-radius:20px;transition:width .5s cubic-bezier(.3,.8,.3,1)}
  .pbar i.green{background:var(--green)}
  .pbar i.amber{background:var(--amber)}
  .pbar i.red{background:var(--red)}
  .pbar i.blue{background:var(--blue)}
  .pbar i.accent{background:var(--accent)}

  /* ===== KPI band breakdown (RYG counts in one box) ===== */
  .band-row{display:flex;gap:6px}
  .band{
    flex:1;text-align:center;padding:6px 4px 5px;border-radius:9px;
    border:1px solid transparent;
  }
  .band .bn{font-family:var(--mono);font-weight:800;font-size:19px;line-height:1;letter-spacing:-.02em}
  .band .bl{font-size:9px;letter-spacing:.03em;text-transform:uppercase;font-weight:700;margin-top:3px}
  .band.green{background:var(--green-soft)}
  .band.green .bn,.band.green .bl{color:var(--green)}
  .band.amber{background:var(--amber-soft)}
  .band.amber .bn,.band.amber .bl{color:var(--amber)}
  .band.red{background:var(--red-soft)}
  .band.red .bn,.band.red .bl{color:var(--red)}
  .kpi.split .lab{margin-bottom:7px}

  /* ===== expandable NGO portfolio table ===== */
  .ngo-tbl td{padding:9px 12px}
  tr.ngo-main{cursor:pointer;transition:.1s}
  tr.ngo-main:hover{background:var(--paper-2)}
  tr.ngo-main.open{background:var(--accent-soft)}
  tr.ngo-main td{border-bottom:1px solid var(--rule)}
  .caret{display:inline-block;width:14px;color:var(--ink-3);transition:transform .15s;font-size:10px}
  tr.ngo-main.open .caret{transform:rotate(90deg);color:var(--accent)}
  tr.bet-sub td{padding:0;border-bottom:1px solid var(--rule);background:var(--paper-2)}
  .bet-sub-inner{padding:10px 16px 10px 42px;display:flex;align-items:center;gap:12px}
  .bet-sub-inner:not(:last-child){border-bottom:1px dashed var(--rule-2)}
  .bet-sub-inner .bi{font-size:15px;width:20px;text-align:center}
  .bet-sub-inner .bt{flex:1;font-size:12.5px;color:var(--ink-2);font-weight:500}
  .bet-sub-inner .bv{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);white-space:nowrap}
  .mini-bar{width:120px;height:7px;background:var(--card);border:1px solid var(--rule);border-radius:20px;overflow:hidden;flex:none}
  .mini-bar i{display:block;height:100%;border-radius:20px}
  .mini-bar i.green{background:var(--green)}
  .mini-bar i.amber{background:var(--amber)}
  .mini-bar i.red{background:var(--red)}
  .ptag{
    display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;
    letter-spacing:.03em;text-transform:uppercase;padding:4px 10px;border-radius:20px;
    border:1px solid transparent;cursor:pointer;transition:.12s;
  }
  .ptag.Active{background:var(--green-soft);color:var(--green)}
  .ptag.Passive{background:var(--paper-2);color:var(--ink-3);border-color:var(--rule-2)}
  .ptag:hover{filter:brightness(.97);border-color:var(--rule-2)}
  .ptag .pd{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* ===== PARTNER SCORECARD GRID ===== */
  .sc-tabs{display:flex;gap:2px}
  .sc-tab{
    padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--ink-3);
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:.12s;
  }
  .sc-tab:hover{color:var(--ink)}
  .sc-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .sc-tbl{font-size:12.5px}
  .sc-tbl th.sc-c,.sc-tbl td.sc-c{text-align:center;width:58px}
  .sc-tbl th.sc-tot,.sc-tbl td.sc-tot{text-align:center;width:70px}
  .sc-tbl th.sc-st,.sc-tbl td.sc-st{text-align:center;width:82px}
  .sc-tbl td{padding:0;border-bottom:1px solid var(--rule)}
  .sc-tbl td.sc-name{padding:9px 12px}
  .sc-cell{
    display:flex;align-items:center;justify-content:center;
    height:42px;font-family:var(--mono);font-weight:500;font-size:12.5px;
    cursor:pointer;transition:.1s;border-left:1px solid var(--card);
  }
  .sc-cell:hover{outline:2px solid var(--accent);outline-offset:-2px;z-index:2;position:relative}
  .sc-cell.s-hi{background:var(--green-soft);color:var(--green)}
  .sc-cell.s-mid{background:#fbf3e0;color:var(--amber)}
  .sc-cell.s-lo{background:var(--red-soft);color:var(--red)}
  .sc-cell.s-na{background:var(--paper-2);color:var(--ink-3)}
  .sc-tot-v{font-family:var(--mono);font-weight:700;font-size:13px}
  .sc-foot td{background:var(--paper);font-weight:700;border-top:1.5px solid var(--rule-2);border-bottom:none}
  .sc-foot .sc-cell{height:38px;background:transparent;cursor:default;font-weight:700}
  .sc-foot .sc-cell:hover{outline:none}
  .sc-name .av{
    width:26px;height:26px;border-radius:7px;flex:none;display:inline-flex;
    align-items:center;justify-content:center;font-size:10px;font-weight:700;
    background:var(--accent-soft);color:var(--accent);margin-right:9px;vertical-align:middle;
  }

  /* score picker popover */
  .score-pop{
    position:fixed;z-index:140;background:var(--card);border:1px solid var(--rule-2);
    border-radius:12px;box-shadow:var(--shadow-lg);padding:9px;
    display:none;grid-template-columns:repeat(4,1fr);gap:5px;width:188px;
  }
  .score-pop.show{display:grid}
  .score-pop .sp-opt{
    padding:7px 0;text-align:center;font-family:var(--mono);
    font-size:12.5px;font-weight:600;border-radius:7px;background:var(--paper-2);
    color:var(--ink-2);transition:.1s;cursor:pointer;
  }
  .score-pop .sp-opt:hover{background:var(--accent);color:#fff}
  .score-pop .sp-head{
    grid-column:1/-1;font-size:10px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink-3);padding:1px 3px 4px;
  }

  /* ===== TABLES ===== */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{
    font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--ink-3);font-weight:700;text-align:left;
    padding:8px 12px;border-bottom:1px solid var(--rule);background:var(--paper);
    white-space:nowrap;
  }
  tbody td{padding:9px 12px;border-bottom:1px solid var(--rule);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.click{cursor:pointer;transition:.1s}
  tbody tr.click:hover{background:var(--paper-2)}
  td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12px}
  .tbl-foot td{background:var(--paper);font-weight:700;border-top:1px solid var(--rule)}

  /* ===== BUTTONS ===== */
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px;border:1px solid var(--rule-2);background:var(--card);
    font-size:12px;font-weight:600;border-radius:8px;transition:.12s;color:var(--ink);
  }
  .btn:hover{border-color:var(--ink-3);background:var(--paper-2)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#3551c4;border-color:#3551c4}
  .btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.accent:hover{filter:brightness(1.07)}
  .btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
  .btn.danger:hover{filter:brightness(1.06);border-color:var(--red)}
  .btn.sm{padding:5px 9px;font-size:11px}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn.ghost:hover{background:var(--paper-2)}
  /* visible keyboard focus for accessibility */
  .btn:focus-visible,.nav-item:focus-visible,.tab:focus-visible,
  .sel-inp:focus-visible,.sc-cell:focus-visible{
    outline:2px solid var(--accent);outline-offset:2px;
  }

  /* ===== TABS ===== */
  .tabs{display:flex;gap:2px;border-bottom:1.5px solid var(--rule);margin-bottom:20px}
  .tab{
    padding:9px 15px;font-size:12.5px;font-weight:600;color:var(--ink-3);
    border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:.12s;
    display:flex;align-items:center;gap:7px;
  }
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab .ct{font-size:10.5px;background:var(--paper-2);color:var(--ink-3);padding:1px 6px;border-radius:8px;font-weight:600}
  .tab.active .ct{background:var(--accent-soft);color:var(--accent)}

  /* ===== BIG BET — COMPACT COLLAPSIBLE ROWS ===== */
  .bet-list{
    background:var(--card);border:1px solid var(--rule);
    border-radius:13px;box-shadow:var(--shadow);overflow:hidden;
  }
  .bet-row{
    display:flex;align-items:center;gap:12px;padding:9px 14px;
    border-bottom:1px solid var(--rule);cursor:pointer;transition:.1s;
  }
  .bet-row:last-of-type{border-bottom:none}
  .bet-row:hover{background:var(--paper-2)}
  .bet-row.open{background:var(--accent-soft)}
  .bet-row .caret{
    width:13px;flex:none;color:var(--ink-3);font-size:9px;transition:transform .15s;
  }
  .bet-row.open .caret{transform:rotate(90deg);color:var(--accent)}
  .bet-row .bi{
    width:28px;height:28px;flex:none;border-radius:8px;background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;font-size:14px;
  }
  .bet-row .bmain{flex:1;min-width:0}
  .bet-row .btitle{
    font-weight:600;font-size:13px;line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .bet-row .bngo{font-size:11px;color:var(--ink-3);margin-top:1px}
  .bet-row .bbar-wrap{width:150px;flex:none;display:flex;align-items:center;gap:8px}
  .bet-row .bbar-wrap .pbar{flex:1}
  .bet-row .bpct{
    font-family:var(--mono);font-weight:700;font-size:12px;
    width:38px;text-align:right;flex:none;
  }
  .bet-row .bfig{
    width:120px;flex:none;text-align:right;
    font-family:var(--mono);
  }
  .bet-row .bfig .fv{font-weight:700;font-size:13px}
  .bet-row .bfig .ft{font-size:10px;color:var(--ink-3);margin-top:1px}
  .bet-row .bdot{width:8px;height:8px;border-radius:50%;flex:none}
  .bet-row .bdot.green{background:var(--green)}
  .bet-row .bdot.amber{background:var(--amber)}
  .bet-row .bdot.red{background:var(--red)}
  .bet-row .bdot.gray{background:var(--ink-3)}
  .bet-detail{
    border-bottom:1px solid var(--rule);background:var(--paper-2);
    padding:13px 14px 15px;
  }
  .bet-detail:last-of-type{border-bottom:none}
  .bet-detail .dhead{
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--ink-3);margin-bottom:8px;
  }
  .bet-detail .dhead b{color:var(--ink)}

  /* monthly ladder grid */
  .ladder{display:flex;gap:0;overflow-x:auto;padding:2px}
  .lad-cell{
    flex:none;width:104px;border:1px solid var(--rule);border-right:none;
    background:var(--card);transition:.12s;
  }
  .lad-cell:last-child{border-right:1px solid var(--rule)}
  .lad-cell:hover{background:var(--paper)}
  .lad-cell.editable{cursor:pointer}
  .lad-cell.editable:hover{box-shadow:inset 0 0 0 2px var(--accent-soft)}
  .lad-cell.future{opacity:.5}
  .lad-cell.current{box-shadow:inset 0 2px 0 var(--accent)}
  .lad-mo{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:6px 9px 4px;text-align:center;border-bottom:1px solid var(--rule)}
  .lad-body{padding:7px 9px}
  .lad-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
  .lad-line .k{font-size:9.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
  .lad-line .v{font-family:var(--mono);font-size:12.5px;font-weight:500}
  .lad-line .v.plan{color:var(--ink-2)}
  .lad-line .v.ach{font-weight:700;font-size:13.5px}
  .lad-var{font-size:9.5px;font-weight:600;text-align:center;padding-top:4px;border-top:1px solid var(--rule);margin-top:5px}
  .lad-var.pos{color:var(--green)}
  .lad-var.neg{color:var(--red)}
  .lad-var.zero{color:var(--ink-3)}

  /* ===== MODAL ===== */
  .modal-bg{
    position:fixed;inset:0;z-index:120;background:rgba(26,34,51,.4);
    backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:30px;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--card);border:1px solid var(--rule);box-shadow:var(--shadow-lg);
    width:520px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;
    animation:pop .2s cubic-bezier(.3,.9,.3,1);border-radius:18px;overflow:hidden;
  }
  .modal.wide{width:760px}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--rule);display:flex;align-items:flex-start;gap:14px}
  .modal-h .eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .modal-h h2{font-family:var(--display);font-weight:600;font-size:21px;letter-spacing:-.01em;line-height:1.15;margin-top:3px}
  .modal-h .x{margin-left:auto;font-size:20px;color:var(--ink-3);padding:3px 8px;border-radius:7px;flex:none}
  .modal-h .x:hover{background:var(--paper-2);color:var(--accent)}
  .modal-b{padding:20px 22px;overflow-y:auto}
  .modal-f{padding:14px 22px;border-top:1px solid var(--rule);display:flex;gap:9px;justify-content:flex-end;background:var(--paper)}

  .field{margin-bottom:15px}
  .field label{display:block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:6px}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--rule-2);background:var(--paper);
    border-radius:9px;transition:.12s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:62px;line-height:1.5}
  .field .hint{font-size:11px;color:var(--ink-3);margin-top:5px}
  .frow{display:flex;gap:13px}
  .frow .field{flex:1}

  .empty{text-align:center;padding:52px 20px;color:var(--ink-3)}
  .empty .mk{font-size:34px;margin-bottom:10px;opacity:.5}
  .empty p{font-size:13px;max-width:340px;margin:0 auto}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

  /* mini bar chart */
  .barchart{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:10px}
  .barchart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .barchart .stack{width:100%;display:flex;flex-direction:column-reverse;height:100px;justify-content:flex-start}
  .barchart .seg{width:100%;border-radius:2px 2px 0 0;min-height:1px;transition:height .4s}
  .barchart .lbl{font-size:9.5px;color:var(--ink-3);font-weight:600;white-space:nowrap}
  .barchart .bb-plan{background:repeating-linear-gradient(45deg,var(--rule-2),var(--rule-2) 3px,transparent 3px,transparent 6px);border:1px dashed var(--ink-3)}

  /* doc / list rows */
  .lrow{display:flex;align-items:center;gap:13px;padding:11px 15px;border-bottom:1px solid var(--rule);transition:.1s}
  .lrow:last-child{border-bottom:none}
  .lrow:hover{background:var(--paper-2)}
  .lrow .ico{width:34px;height:34px;border-radius:10px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
  .lrow .meta{flex:1;min-width:0}
  .lrow .meta .t{font-weight:600;font-size:13px}
  .lrow .meta .s{font-size:11px;color:var(--ink-3)}

  .seg-toggle{display:inline-flex;border:1px solid var(--rule-2);border-radius:9px;overflow:hidden}
  .seg-toggle button{padding:6px 12px;font-size:11.5px;font-weight:600;color:var(--ink-3);background:var(--card)}
  .seg-toggle button.on{background:var(--accent);color:#fff}

  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--paper-2);color:var(--ink-2)}

  .tag-vert{font-size:10px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:20px;text-transform:uppercase}
  .tag-vert.live{background:var(--green-soft);color:var(--green)}
  .tag-vert.adv{background:var(--blue-soft);color:var(--blue)}
  .tag-vert.edu{background:var(--amber-soft);color:var(--amber)}
  .tag-vert.health{background:var(--red-soft);color:var(--red)}
  .tag-vert.climate{background:var(--green-soft);color:var(--green)}

  /* ===== focus / vertical accent colors ===== */
  .foc-livelihood,.fc-livelihood{--fc:var(--green)}
  .foc-education,.fc-education{--fc:var(--amber)}
  .foc-advocacy,.fc-advocacy{--fc:var(--blue)}
  .foc-healthcare,.fc-healthcare{--fc:var(--red)}
  .foc-climate,.fc-climate{--fc:var(--violet)}

  /* ===== PARTNER NGO CARDS (V2 style) ===== */
  .ngo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
  @media(max-width:1050px){.ngo-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:680px){.ngo-grid{grid-template-columns:1fr}}
  .ngo-card{
    background:var(--card);border:1px solid var(--rule);border-radius:14px;
    box-shadow:var(--shadow);overflow:hidden;cursor:pointer;
    display:flex;flex-direction:column;transition:.14s;
  }
  .ngo-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--rule-2)}
  .ngo-card-stripe{height:4px;background:var(--accent)}
  .ngo-card.livelihood .ngo-card-stripe,.ngo-card-stripe.livelihood{background:var(--green)}
  .ngo-card.education .ngo-card-stripe,.ngo-card-stripe.education{background:var(--amber)}
  .ngo-card.advocacy .ngo-card-stripe,.ngo-card-stripe.advocacy{background:var(--blue)}
  .ngo-card.healthcare .ngo-card-stripe,.ngo-card-stripe.healthcare{background:var(--red)}
  .ngo-card.climate .ngo-card-stripe,.ngo-card-stripe.climate{background:var(--violet)}
  .ngo-card-body{padding:15px 16px;flex:1;display:flex;flex-direction:column;gap:12px}
  .ngo-card-top{display:flex;gap:11px;align-items:flex-start}
  .ngo-avatar{
    width:42px;height:42px;flex:none;border-radius:11px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;background:var(--accent-soft);color:var(--accent);
  }
  .ngo-avatar.livelihood{background:var(--green-soft);color:var(--green)}
  .ngo-avatar.education{background:var(--amber-soft);color:var(--amber)}
  .ngo-avatar.advocacy{background:var(--blue-soft);color:var(--blue)}
  .ngo-avatar.healthcare{background:var(--red-soft);color:var(--red)}
  .ngo-avatar.climate{background:var(--violet-soft);color:var(--violet)}
  .risk-dot{position:absolute;top:-3px;right:-3px;width:12px;height:12px;border-radius:50%;border:2px solid var(--card)}
  .risk-dot.green{background:var(--green)} .risk-dot.amber{background:var(--amber)}
  .risk-dot.red{background:var(--red)} .risk-dot.gray{background:var(--ink-3)}
  .ngo-card-name{font-weight:600;font-size:14px;line-height:1.3;color:var(--ink)}
  .ngo-card-meta{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-3);margin-top:3px}
  .foc-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .foc-dot.livelihood{background:var(--green)} .foc-dot.education{background:var(--amber)}
  .foc-dot.advocacy{background:var(--blue)} .foc-dot.healthcare{background:var(--red)}
  .foc-dot.climate{background:var(--violet)}
  .ngo-card-people{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--rule)}
  .apl-ico{
    width:28px;height:28px;flex:none;border-radius:8px;background:var(--paper-2);
    display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--ink-2);
  }
  .apl-l{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
  .apl-n{font-size:12.5px;font-weight:600;color:var(--ink);margin-top:1px}
  .ngo-card-budget{border-top:1px solid var(--rule);padding-top:11px}
  .bgt-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .bgt-l{font-size:11px;color:var(--ink-3)}
  .bgt-v{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink)}
  .bgt-pct{font-size:11px;font-weight:700;margin-left:3px}
  .bgt-pct.green{color:var(--green)} .bgt-pct.amber{color:var(--amber)} .bgt-pct.red{color:var(--red)}
  .ngo-card-foot{
    padding:10px 16px;border-top:1px solid var(--rule);background:var(--paper);
    display:flex;justify-content:space-between;align-items:center;
  }
  .ngo-card-go{font-size:11.5px;font-weight:600;color:var(--accent)}
  .pill{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px}
  .pill.green{background:var(--green-soft);color:var(--green)}
  .pill.gray{background:var(--paper-2);color:var(--ink-3)}
  .pill.amber{background:var(--amber-soft);color:var(--amber)}
  .pill.red{background:var(--red-soft);color:var(--red)}
  .pill.no-dot{}

  /* ===== NGO HERO BAND (V2 detail header) ===== */
  .ngo-hero{
    background:var(--card);border:1px solid var(--rule);border-radius:15px;
    box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px;
  }
  .ngo-hero-stripe{height:5px;background:var(--accent)}
  .ngo-hero-stripe.livelihood{background:var(--green)}
  .ngo-hero-stripe.education{background:var(--amber)}
  .ngo-hero-stripe.advocacy{background:var(--blue)}
  .ngo-hero-stripe.healthcare{background:var(--red)}
  .ngo-hero-stripe.climate{background:var(--violet)}
  .ngo-hero-content{padding:20px 22px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center}
  @media(max-width:720px){.ngo-hero-content{grid-template-columns:auto 1fr}}
  .ngo-hero-avatar{
    width:60px;height:60px;flex:none;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:21px;background:var(--accent-soft);color:var(--accent);
  }
  .ngo-hero-avatar.livelihood{background:var(--green-soft);color:var(--green)}
  .ngo-hero-avatar.education{background:var(--amber-soft);color:var(--amber)}
  .ngo-hero-avatar.advocacy{background:var(--blue-soft);color:var(--blue)}
  .ngo-hero-avatar.healthcare{background:var(--red-soft);color:var(--red)}
  .ngo-hero-avatar.climate{background:var(--violet-soft);color:var(--violet)}
  .ngo-hero-titles .he{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:3px}
  .ngo-hero-titles h1{font-family:var(--display);font-weight:600;font-size:24px;letter-spacing:-.02em;line-height:1.15}
  .ngo-hero-titles .lede{margin-top:5px;color:var(--ink-3);font-size:12.5px;max-width:560px;line-height:1.5}
  .ngo-hero-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .ngo-hero-strip{
    padding:13px 22px;background:var(--paper);border-top:1px solid var(--rule);
    display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  }
  @media(max-width:720px){.ngo-hero-strip{grid-template-columns:1fr 1fr}}
  .ngo-hero-strip .l{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:3px}
  .ngo-hero-strip .v{font-size:12.5px;color:var(--ink);font-weight:600}
  .ngo-hero-strip .v.mono{font-family:var(--mono);font-size:11.5px;color:var(--ink-2);font-weight:500}

  /* ===== NGO DETAIL TABS (V2 pill style) ===== */
  .ngo-tabs{
    display:flex;gap:3px;margin-bottom:18px;background:var(--paper-2);
    border:1px solid var(--rule);border-radius:11px;padding:4px;width:fit-content;flex-wrap:wrap;
  }
  .ngo-tabs .tb{
    padding:7px 13px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--ink-3);
    border-radius:7px;transition:.13s;display:flex;align-items:center;gap:6px;
  }
  .ngo-tabs .tb:hover{color:var(--ink)}
  .ngo-tabs .tb.active{background:var(--card);color:var(--ink);font-weight:700;box-shadow:var(--shadow)}
  .ngo-tabs .tb .tc{font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
  .ngo-tabs .tb.active .tc{color:var(--accent)}

  /* ===== section head inside tabs ===== */
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:13px}
  .sec-head h2{font-family:var(--display);font-weight:600;font-size:17px}
  .sec-head .sh-act{margin-left:auto;display:flex;gap:8px}

  /* ===== activity stream (Overview) ===== */
  .act-item{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--rule)}
  .act-item:last-child{border-bottom:none}
  .act-ico{
    width:30px;height:30px;flex:none;border-radius:9px;background:var(--paper-2);
    display:flex;align-items:center;justify-content:center;font-size:13px;
  }
  .act-body{flex:1;min-width:0}
  .act-top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .act-t{font-size:12.5px;font-weight:600;color:var(--ink)}
  .act-d{font-size:10.5px;color:var(--ink-3);flex:none}
  .act-s{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .dl-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--rule);font-size:12.5px}
  .dl-row:last-child{border-bottom:none}
  .dl-row .k{color:var(--ink-3)}
  .dl-row .v{font-weight:600;color:var(--ink)}

  /* ===== MBO objective cards (V2) ===== */
  .obj-card{background:var(--card);border:1px solid var(--rule);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
  .obj-head{
    display:grid;grid-template-columns:auto 1fr auto auto;gap:13px;align-items:center;
    padding:14px 16px;cursor:pointer;transition:.1s;
  }
  .obj-head:hover{background:var(--paper-2)}
  .obj-num{
    width:32px;height:32px;flex:none;border-radius:9px;background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
  }
  .obj-title{font-weight:600;font-size:13.5px;line-height:1.35}
  .obj-legend{display:flex;gap:11px;margin-top:5px;font-size:11px;color:var(--ink-3)}
  .obj-legend b{font-family:var(--sans);font-weight:600}
  .obj-arrow{font-size:17px;color:var(--ink-3);transition:transform .15s}
  .obj-card.open .obj-arrow{transform:rotate(90deg);color:var(--accent)}
  .obj-body{display:none;border-top:1px solid var(--rule)}
  .obj-card.open .obj-body{display:block}
  .donut-c{position:relative;width:54px;height:54px;flex:none}
  .donut-c .dn-mid{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;font-size:13px;
  }
  .kr-row{
    display:grid;grid-template-columns:1fr auto;gap:13px;align-items:flex-start;
    padding:12px 16px;border-bottom:1px solid var(--rule);border-left:3px solid var(--rule-2);
  }
  .kr-row:last-child{border-bottom:none}
  .kr-row.kr-done{border-left-color:var(--green)}
  .kr-row.kr-not{border-left-color:var(--red)}
  .kr-row.kr-prog{border-left-color:var(--amber)}
  .kr-text{font-size:12.5px;line-height:1.4;color:var(--ink)}

  .chart-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-3);margin-bottom:8px}

  /* ===== FINANCE insight cards ===== */
  .ins-card{

  .ins-card.red{border-left-color:var(--red)}
  .ins-card.amber{border-left-color:var(--amber)}
  .ins-card.blue{border-left-color:var(--blue)}

  .ins-v{font-family:var(--mono);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:4px 0 4px}
  .ins-s{font-size:11.5px;color:var(--ink-3);line-height:1.5}
  .ins-s b{color:var(--ink)}

  .watch-row{
    display:flex;align-items:center;gap:11px;padding:9px 11px;
    border:1px solid var(--rule);border-radius:10px;cursor:pointer;transition:.1s;
  }
  .watch-row:hover{background:var(--paper-2);border-color:var(--rule-2)}
  .watch-dot{width:9px;height:9px;border-radius:50%;flex:none}
  .watch-dot.red{background:var(--red)} .watch-dot.blue{background:var(--blue)}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:6px;
    font-size:12.5px;font-weight:500;box-shadow:var(--shadow-lg);

  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .splitline{height:1px;background:var(--rule);margin:22px 0}
  a.link{color:var(--accent);text-decoration:none;font-weight:600}

  /* hamburger — hidden on desktop, shown on narrow screens */
  .hamburger{
    display:none;width:34px;height:34px;flex:none;border-radius:8px;
    font-size:17px;color:var(--ink-2);border:1px solid var(--rule-2);

  /* dim scrim behind an open mobile sidebar */
  .side-scrim{
    display:none;position:fixed;inset:0;z-index:55;
    background:rgba(27,35,51,.42);
  }

  @media(max-width:920px){
    .kpi-grid{grid-template-columns:repeat(2,1fr)}

  @media(max-width:560px){
    .kpi-grid{grid-template-columns:1fr}
    .stat-grid{grid-template-columns:1fr !important}
  }
</style>

<script>
/* =================================================================
   KRSF PROGRAM OFFICE TRACKER
   Single-file app · persistent storage via window.storage
   ================================================================= */

/* ---------- constants ---------- */
const FY_MONTHS = ["2026-04","2026-05","2026-06","2026-07","2026-08","2026-09",
                    "2026-10","2026-11","2026-12","2027-01","2027-02","2027-03"];
const FY_END = FY_MONTHS[FY_MONTHS.length-1];   // last month of the financial year
const MONTH_NAMES = {1:"Jan",2:"Feb",3:"Mar",4:"Apr",5:"May",6:"Jun",
                     7:"Jul",8:"Aug",9:"Sep",10:"Oct",11:"Nov",12:"Dec"};
/* real "today", computed once at boot — no hardcoded dates anywhere else */
const TODAY = new Date();
const TODAY_ISO = TODAY.toISOString().slice(0,10);          // e.g. 2026-05-17
const TODAY_MONTH = TODAY_ISO.slice(0,7);                   // e.g. 2026-05
/* the live reporting month = current calendar month if inside the FY,
   otherwise clamped to the nearest FY month */
function liveReportingMonth(){
  if(FY_MONTHS.includes(TODAY_MONTH)) return TODAY_MONTH;
  return TODAY_MONTH < FY_MONTHS[0] ? FY_MONTHS[0] : FY_END;
}
/* a document is "expiring soon" if it lapses within the next 90 days */
const SOON_CUTOFF_ISO = new Date(TODAY.getTime()+90*86400000).toISOString().slice(0,10);
const VERTICALS = ["Livelihood","Advocacy","Education","Healthcare","Climate"];
const BUDGET_CATS = ["Salary","Travel","Programme","Admin-Other"];
/* Debit-note processing workflow — four ordered stages.
   A debit note starts at the first stage and moves down as it is processed.
   Each move is timestamped in the note's history. */
const DN_STATUS = [
  "Hard copy not received",
  "Under review by Program Team",
  "Under review with Finance Team",
  "Payment released"
];
const DN_STATUS_DEFAULT = DN_STATUS[0];
/* colour for each stage — used by badges */
const DN_STATUS_COLOR = {
  "Hard copy not received":      "amber",
  "Under review by Program Team":"blue",
  "Under review with Finance Team":"violet",
  "Payment released":            "green"
};
/* Partner scorecard — 8 criteria, each scored 0–5, total out of 40.
   key = short column header, label = full name shown on hover/tooltip. */
const SCORE_CRITERIA = [
  { key:"OKR",   label:"OKR / Goal delivery" },
  { key:"Data",  label:"Data quality & timeliness" },
  { key:"Docs",  label:"Compliance documents" },
  { key:"Funds", label:"Fund utilisation" },
  { key:"Fin",   label:"Financial reporting" },
  { key:"Lead",  label:"Leadership & governance" },
  { key:"Comm",  label:"Communication & responsiveness" },
  { key:"Learn", label:"Learning & adaptation" }
];
const SCORE_MAX = SCORE_CRITERIA.length * 5;   // 40
const VERT_CLASS = {Livelihood:"live",Advocacy:"adv",Education:"edu",Healthcare:"health",Climate:"climate"};

/* ---------- helpers ---------- */
function monthLabel(m){ if(!m)return"—"; const[y,mo]=m.split("-"); return MONTH_NAMES[+mo]+" "+y.slice(2); }
function monthLong(m){ if(!m)return"—"; const[y,mo]=m.split("-"); return MONTH_NAMES[+mo]+" 20"+y.slice(2); }
function fmtN(n){ if(n==null||isNaN(n))return"—"; return Math.round(n).toLocaleString("en-IN"); }
function fmtRs(n){
  if(n==null||isNaN(n))return"—";
  if(Math.abs(n)>=1e7) return "₹"+(n/1e7).toFixed(2)+" Cr";
  if(Math.abs(n)>=1e5) return "₹"+(n/1e5).toFixed(2)+" L";
  if(Math.abs(n)>=1e3) return "₹"+(n/1e3).toFixed(1)+"k";
  return "₹"+Math.round(n);
}
function fmtRsFull(n){ if(n==null||isNaN(n))return"—"; return "₹"+Math.round(n).toLocaleString("en-IN"); }
function pct(a,b){ if(!b)return 0; return Math.round(a/b*100); }
let _idSeq = 0;
function genId(p){ return p+"_"+Date.now().toString(36)+"_"+(_idSeq++).toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function statusColor(p){ if(p>=90)return"green"; if(p>=65)return"amber"; return"red"; }
function el(id){ return document.getElementById(id); }
function toast(msg){
  const t=el("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2400);
}

/* ---------- session state ---------- */
let DB = null;            // full data object
let ME = null;            // current user object
let CUR_MONTH = liveReportingMonth(); // selected reporting month — derived from real today
let CUR_PAGE = "dash";
let PAGE_ARG = null;       // e.g. ngo id when drilled in

/* =================================================================
   SEED DATA
   ================================================================= */
/* =================================================================
   MBO / OKR DATA  — real outcomes uploaded by the APL (from Excel)
   Each row: {id, ngoId, month, objNum, objective, kr, timeline,
              status: "Done"|"Not Done"|"Pending", comment, ref, isOther}
   VNCS (n1) seed below is the genuine uploaded data.

/* build MBO rows for the other NGOs from their Goals so every
   NGO's OKR tab is populated; VNCS uses the real uploaded data above */
function buildMboForNgo(ngo, bets){
  const rows = [];
  // only generate for months that fall inside the financial year
  const months = FY_MONTHS.filter(m=>m>="2026-01");
  let idc = 1;
  bets.forEach((bet,bi)=>{
    months.forEach(m=>{
      const cell = bet.months[m];
      if(!cell || cell.plan==null) return;
      let status = "Pending";
      if(cell.actual!=null) status = cell.actual>=cell.plan*0.95 ? "Done" : "Not Done";
      rows.push({
        id:"mbo_"+ngo.id+"_"+(idc++),
        ngoId:ngo.id,
        month:m,
        objNum:bi+1,
        objective:bet.title,
        kr:"Reach "+fmtN(cell.plan)+" "+bet.unit+" in "+monthLong(m),
        timeline:m+"-28",
        status:status,
        comment:cell.note||"",
        ref:"",
        isOther:false,
        derived:true   // auto-derived from the Goal ladder, not a real uploaded outcome
      });
    });
  });
  return rows;
}

    const per=Math.round(annual/12); return FY_MONTHS.map(()=>per);
  }
  const budgets = {
    n1:{ annual:{Salary:2640000, Travel:480000, Programme:8400000, "Admin-Other":600000} },
    n2:{ annual:{Salary:1980000, Travel:300000, Programme:2400000, "Admin-Other":420000} },
    n3:{ annual:{Salary:2400000, Travel:360000, Programme:1100000, "Admin-Other":340000} },
    n4:{ annual:{Salary:1560000, Travel:240000, Programme:780000,  "Admin-Other":240000} },
    n5:{ annual:{Salary:1680000, Travel:264000, Programme:660000,  "Admin-Other":216000} },
    n6:{ annual:{Salary:1320000, Travel:228000, Programme:540000,  "Admin-Other":192000} },
    n7:{ annual:{Salary:2160000, Travel:540000, Programme:3600000, "Admin-Other":480000} },
    n8:{ annual:{Salary:1080000, Travel:180000, Programme:480000,  "Admin-Other":156000} },
    n9:{ annual:{Salary:1920000, Travel:336000, Programme:1320000, "Admin-Other":312000} },
    n10:{annual:{Salary:2280000, Travel:600000, Programme:5400000, "Admin-Other":540000} }
  };
  Object.keys(budgets).forEach(nid=>{
    const total = BUDGET_CATS.reduce((s,c)=>s+budgets[nid].annual[c],0);
    budgets[nid].totalAnnual = total;
    budgets[nid].monthlyPlan = evenPlan(total);
  });

  /* ----- DEBIT NOTES ----- */
  const debits = [];
  let dnCounter = 1;
  ngos.forEach(n=>{
    const b = budgets[n.id];
    FY_MONTHS.slice(0,9).forEach((m,i)=>{
      const factor = 0.72 + (parseInt(n.id.slice(1))%5)*0.05 + (i*0.005);
      const sal = Math.round(b.annual.Salary/12 * (0.95+((i*7)%10)/100));
      const prog = Math.round(b.annual.Programme/12 * factor);
      const trv = Math.round(b.annual.Travel/12 * (0.6+((i*3)%10)/15));
      const statusFor = (idx)=> idx>=7 ? (idx>=8?"Pending":"Approved") : "Paid";
      debits.push({ id:"dn"+(dnCounter++), ngoId:n.id, month:m, category:"Salary",
        amount:sal, dnNo:n.short.slice(0,3).toUpperCase()+"-S"+(i+1),
        date:m+"-28", status:statusFor(i), note:"Staff salary "+monthLabel(m) });
      debits.push({ id:"dn"+(dnCounter++), ngoId:n.id, month:m, category:"Programme",
        amount:prog, dnNo:n.short.slice(0,3).toUpperCase()+"-P"+(i+1),
        date:m+"-30", status:statusFor(i), note:"Programme activities "+monthLabel(m) });
      if(i%2===0){
        debits.push({ id:"dn"+(dnCounter++), ngoId:n.id, month:m, category:"Travel",
          amount:trv, dnNo:n.short.slice(0,3).toUpperCase()+"-T"+(i+1),
          date:m+"-25", status:statusFor(i), note:"Field travel "+monthLabel(m) });
      }
    });
  });
  debits.filter(d=>d.month==="2026-01"&&d.category==="Programme").slice(0,2).forEach(d=>d.status="Query Raised");

  /* ----- DOCUMENTS ----- */
  const docTypes=["MoU","Annual Proposal","Approved Budget","12A Certificate","80G Certificate","FCRA Certificate","Audited Financials"];
  const documents=[];
  let docC=1;
  ngos.forEach(n=>{
    docTypes.forEach((t,i)=>{
      if(n.id==="n3"&&i>3) return;
      if(n.id==="n10"&&i>4) return;
      documents.push({ id:"doc"+(docC++), ngoId:n.id, type:t,
        name:t.replace(/ /g,"_")+"_"+n.short+".pdf",
        uploaded: n.since+"-15",
        expires: (t.includes("Certificate")||t==="MoU") ? (i%2? "2027-03-31":"2026-09-30") : null });
    });
  });

  /* ----- TASKS ----- */
  const tasks=[
    { id:"t1", ngoId:"n10", aplId:"a4", title:"Navchetna 90-day improvement plan — kick-off review", due:"2026-02-10", status:"Open", priority:"High" },
    { id:"t2", ngoId:"n3",  aplId:"a1", title:"Collect missing FCRA & 80G certificates from AAA", due:"2026-02-05", status:"Open", priority:"High" },
    { id:"t3", ngoId:"n1",  aplId:"a1", title:"Field verification visit — VNCS Tendu federations", due:"2026-02-18", status:"Open", priority:"Medium" },
    { id:"t4", ngoId:"n7",  aplId:"a3", title:"Approve SeSTA January programme debit notes", due:"2026-02-08", status:"Open", priority:"High" },
    { id:"t5", ngoId:"n4",  aplId:"a2", title:"Resolve query on SVT December programme debit note", due:"2026-01-30", status:"Done", priority:"Medium" },
    { id:"t6", ngoId:"n9",  aplId:"a4", title:"Review SRISTI Khedut Haat expansion proposal", due:"2026-02-20", status:"Open", priority:"Low" },
    { id:"t7", ngoId:"n8",  aplId:"a3", title:"Vidya — mid-year FLN test data reconciliation", due:"2026-02-14", status:"Open", priority:"Medium" }
  ];

  /* ----- PARTNER SCORECARDS  (scored per month) -----
     scorecards[ngoId][month] = { OKR:5, Data:4.5, ... }  each 0–5, half-steps */
  const scorecards = {};
  const scoreSeed = {
    n1:[4.5,2.5,4.5,3.5,3.5,4.5,4.5,4.5],
    n2:[5,4.5,4,4.5,5,4.5,5,4.5],
    n3:[2.5,2.5,3.5,3.5,3.5,4.5,3.5,2.5],
    n4:[4,3,3,4,4.5,4,4,3.5],
    n5:[4,4,3,4,5,3,5,4],
    n6:[3,3.5,2.5,4.5,5,2.5,3.5,4.5],
    n7:[4.5,4,4.5,4,4,4.5,4.5,4],
    n8:[3.5,3.5,3,3.5,3.5,3.5,4,3.5],
    n9:[4.5,4,4,4.5,4.5,4,4.5,4.5],
    n10:[2.5,2,3,3,2.5,3,3,2.5]
  };
  // months that already have reported scorecards (Apr 2025 → Jan 2026)
  const scoredMonths = FY_MONTHS.slice(0, 10);
  ngos.forEach(n=>{
    const base = scoreSeed[n.id] || [3,3,3,3,3,3,3,3];
    scorecards[n.id] = {};
    scoredMonths.forEach((m, mi)=>{
      const obj = {};
      // small drift month-to-month so the Trend view has movement
      const drift = ((mi - 4) * 0.1);
      SCORE_CRITERIA.forEach((c,i)=>{
        let v = base[i] + drift + (i%2? 0.0 : -0.1*(mi%3));
        v = Math.max(0, Math.min(5, Math.round(v*2)/2));
        obj[c.key] = v;
      });
      scorecards[n.id][m] = obj;
    });
  });

  /* ----- MBO / OKR ----- */
  const mbo = MBO_SEED.slice();   // real VNCS data
  ngos.forEach(n=>{
    if(n.id==="n1") return;       // VNCS already has real data
    const nbets = bigBets.filter(b=>b.ngoId===n.id);
    buildMboForNgo(n, nbets).forEach(r=>mbo.push(r));
  });

  return { users, ngos, bigBets, budgets, debits, documents, tasks, scorecards, mbo,
           refFiles:[],
           meta:{ fyLabel:"FY 2025-26", created:Date.now() } };
}

/* =================================================================
   PERSISTENCE  ·  Realtime Database live sync (localStorage offline cache)
   =================================================================

   Storage model — overwrite-safe by design:
   Each top-level collection (ngos, bigBets, budgets, debits, documents,
   tasks, scorecards, mbo, refFiles, users, meta) is stored as ONE
   node under "tracker/" in the Realtime Database. So two people
   editing different things write to different nodes and never
   collide. Live listeners keep every open browser's DB fresh within
   ~1-2s, so even same-collection edits merge instead of overwriting.
   ================================================================= */
const STORE_KEY   = "npp_tracker_cache_v3";   // local offline cache
const SESSION_KEY = "npp_tracker_session_v3";
const DB_PARTS = ["meta","users","ngos","bigBets","budgets","debits",
                  "documents","tasks","scorecards","mbo","refFiles"];

let fb = { app:null, db:null, storage:null, ready:false };
let CLOUD_OK = false;            // is the live connection healthy?
let SAVE_OK = true;
let _lastSynced = {};            // JSON snapshot of each part, to diff on save
let _applyingRemote = false;     // guard: don't echo remote changes back as a save
let _unsub = [];                 // active Firestore listener unsubscribe fns

/* ---- connect to Firebase ---- */
function cloudInit(){
  try{
    if(!window.firebase || !window.FIREBASE_CONFIG) return false;
    fb.app = firebase.apps.length ? firebase.app() : firebase.initializeApp(window.FIREBASE_CONFIG);
    fb.db = firebase.database();
    fb.ready = true;
    return true;
  }catch(e){
    console.error("Firebase init failed", e);
    fb.ready = false;
    return false;
  }
}

/* ---- offline cache (so the app still opens if the network is down) ---- */
function cacheSave(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }catch(e){}
}
function cacheLoad(){
  try{ const s=localStorage.getItem(STORE_KEY); if(s) return JSON.parse(s); }catch(e){}
  return null;
}

/* ---- first-ever run: write a clean skeleton to RTDB ---- */
async function cloudSeedIfEmpty(){
  const metaRef = fb.db.ref("tracker/meta");
  const snap = await metaRef.once("value");
  if(snap.exists()) return false;          // already initialised — nothing to do
  const skeleton = skeletonData();
  const updates = {};
  DB_PARTS.forEach(part=>{ updates["tracker/"+part] = skeleton[part]; });
  await fb.db.ref().update(updates);
  return true;
}

/* ---- pull the whole DB once from RTDB ---- */
async function cloudLoadAll(){
  const out = {};
  const snaps = await Promise.all(
    DB_PARTS.map(p=>fb.db.ref("tracker/"+p).once("value"))
  );
  snaps.forEach((s,i)=>{
    const part = DB_PARTS[i];
    out[part] = s.exists() ? s.val() : skeletonData()[part];
  });
  return out;
}

/* ---- live listeners: keep DB fresh as others make changes ---- */
function cloudListen(){
  _unsub.forEach(fn=>{ try{fn();}catch(e){} });
  _unsub = [];
  DB_PARTS.forEach(part=>{
    const ref = fb.db.ref("tracker/"+part);
    const handler = snap=>{
      if(!snap.exists()) return;
      if(!DB){ return; }   // DB not assigned yet — ignore until loadDB() finishes
      let incoming = snap.val();
      // Coerce array collections that Firebase may return as keyed objects
      if(["users","ngos","bigBets","debits","documents","tasks","mbo","refFiles"].includes(part)){
        incoming = toArr(incoming);
      }
      // coerce arrays nested inside records too
      if(part==="users"){
        incoming.forEach(u=>{ u.ngoIds = toArr(u.ngoIds); });
      }
      if(part==="budgets" && incoming && typeof incoming==="object"){
        Object.keys(incoming).forEach(k=>{
          if(incoming[k] && incoming[k].monthlyPlan!==undefined)
            incoming[k].monthlyPlan = toArr(incoming[k].monthlyPlan);
        });
      }
      if(part==="debits"){
        incoming.forEach(d=>{
          if(d.scrolls!==undefined) d.scrolls = toArr(d.scrolls);
          if(d.history!==undefined) d.history = toArr(d.history);
        });
      }
      if(part==="bigBets"){
        incoming.forEach(b=>{
          if(b && (!b.months || typeof b.months!=="object" || Array.isArray(b.months)))
            b.months = {};
        });
      }
      const inJson = JSON.stringify(incoming);
      // ignore the echo of our own just-written change
      if(inJson === _lastSynced[part]) return;
      _applyingRemote = true;
      DB[part] = incoming;
      _lastSynced[part] = inJson;
      _applyingRemote = false;
      cacheSave();
      if(typeof ME!=="undefined" && ME && typeof CUR_PAGE!=="undefined" && CUR_PAGE) render();
      setConnState(true);
    };
    ref.on("value", handler, err=>{
      console.error("listener error ("+part+")", err);
      setConnState(false);
    });
    // store an unsubscribe function that turns off this listener
    _unsub.push(()=>ref.off("value", handler));
  });
}

/* ---- main load path ---- */
async function loadDB(){
  if(cloudInit()){
    let data = null;
    try{
      await cloudSeedIfEmpty();
      data = await cloudLoadAll();
      CLOUD_OK = true;
    }catch(e){
      console.error("Cloud load failed, using offline cache", e);
      CLOUD_OK = false;
    }
    if(data){
      // We have live Firebase data — coerce and migrate it regardless of cache
      let merged;
      try{
        merged = migrateDB(data);
      }catch(e){
        // migrateDB failed — apply toArr manually and retry rather than dropping data
        console.error("migrateDB failed, retrying with coercion", e);
        ["users","ngos","bigBets","debits","documents","tasks","mbo","refFiles"]
          .forEach(p=>{ if(data[p] && !Array.isArray(data[p])) data[p] = Object.values(data[p]); });
        merged = migrateDB(data);
      }
      DB = merged;                 // assign DB FIRST, then attach listeners
      // _lastSynced must reflect the MIGRATED data that is now in memory,
      // not the raw cloud data — otherwise the echo-check and change-diff
      // both misfire on the first listener event / first save.
      DB_PARTS.forEach(p=>{ _lastSynced[p] = JSON.stringify(merged[p] ?? skeletonData()[p]); });
      cacheSave();
      cloudListen();
      return merged;
    }
  }
  // offline fallback — cache, else a clean skeleton
  const cached = cacheLoad();
  return migrateDB(cached || skeletonData());
}

/* ---- save: write ONLY the collections that actually changed ---- */
async function saveDB(){
  if(!DB) return false;
  cacheSave();
  if(_applyingRemote) return true;
  if(!CLOUD_OK || !fb.ready){
    if(SAVE_OK) toast("⚠ Offline — changes saved on this device only");
    SAVE_OK = false;
    return false;
  }
  let ok = true;
  const updates = {}, pending = {};   // pending = the new _lastSynced values, applied only on success
  try{
    DB_PARTS.forEach(part=>{
      const val = DB[part] ?? skeletonData()[part];
      const cur = JSON.stringify(val);
      if(cur !== _lastSynced[part]){
        updates["tracker/"+part] = val;
        pending[part] = cur;
      }
    });
    if(Object.keys(updates).length){
      await fb.db.ref().update(updates);
      // write confirmed — NOW it is safe to mark these parts as synced
      Object.keys(pending).forEach(p=>{ _lastSynced[p] = pending[p]; });
    }
  }catch(e){
    ok = false;
    console.error("save failed", e);
    // _lastSynced is intentionally NOT updated — the change stays "dirty"
    // so the next saveDB() retries the write instead of silently dropping it.
  }
  if(!ok && SAVE_OK) toast("⚠ Couldn't sync — your last change will retry automatically");
  SAVE_OK = ok;
  setConnState(ok);
  // a failed write leaves the change "dirty" in _lastSynced; schedule a retry
  // so it isn't stranded until the next manual edit.
  if(!ok) scheduleSaveRetry();
  return ok;
}
let _retryTimer = null;
function scheduleSaveRetry(){
  if(_retryTimer) return;          // one retry in flight is enough
  _retryTimer = setTimeout(async ()=>{
    _retryTimer = null;
    if(!DB) return;
    // re-enable the cloud path for one attempt; saveDB will re-disable if it fails again
    if(fb.ready) CLOUD_OK = true;
    const ok = await saveDB();
    if(ok) toast("✓ Reconnected — your changes are now synced");
  }, 15000);                       // retry 15s later
}

/* ---- connection indicator ---- */
function setConnState(good){
  CLOUD_OK = !!good;
  const el2 = (typeof el==="function") ? el("connDot") : null;
  if(el2){
    el2.className = "conn-dot " + (good?"on":"off");
    el2.title = good ? "Live — connected to Firebase" : "Offline — changes saved on this device only";
  }
}

/* ---- session (which user is logged in on this device) ---- */
async function loadSession(){
  try{ return localStorage.getItem(SESSION_KEY); }catch(e){ return null; }
}
async function saveSession(uid){
  try{ if(uid) localStorage.setItem(SESSION_KEY,uid); else localStorage.removeItem(SESSION_KEY); }catch(e){}
}

/* Convert a value that may be a Firebase object-with-numeric-keys back to
   a proper JS array.  Firebase Realtime Database serialises arrays as
   {"0":{…},"1":{…}} when round-tripped through .val(), so anything that
   should be an array must be coerced before we call .forEach / .map on it. */
function toArr(v){
  if(Array.isArray(v)) return v;
  if(v && typeof v==="object"){
    // numeric-keyed object → restore as array (preserving sparse gaps as null)
    const keys = Object.keys(v);
    if(keys.length && keys.every(k=>/^\d+$/.test(k))){
      const out = [];
      keys.forEach(k=>{ out[Number(k)] = v[k]; });
      return out.filter(x=>x!==undefined); // drop empty slots
    }
  }
  return [];
}

/* fill in fields added after a DB was first saved */
function migrateDB(db){
  if(!db || typeof db!=="object") db = skeletonData();
  DB_PARTS.forEach(p=>{ if(db[p]===undefined) db[p] = skeletonData()[p]; });
  // Coerce every array collection — Firebase may return them as objects
  ["users","ngos","bigBets","debits","documents","tasks","mbo","refFiles"]
    .forEach(p=>{ db[p] = toArr(db[p]); });
  if(!db.scorecards || typeof db.scorecards!=="object" || Array.isArray(db.scorecards)) db.scorecards = {};
  if(!db.budgets   || typeof db.budgets  !=="object" || Array.isArray(db.budgets))   db.budgets   = {};
  // ---- coerce arrays NESTED inside records (Firebase turns these into objects too) ----
  db.users.forEach(u=>{
    // ngoIds must be a real array or APL permission checks silently fail
    u.ngoIds = toArr(u.ngoIds);
  });
  db.bigBets.forEach(b=>{
    if(!b || typeof b!=="object") return;
    // months must always be a plain keyed object — never undefined, never an array.
    // (RTDB drops an empty {} on save, so a months-less goal comes back undefined
    //  and would crash every dashboard/goal render.)
    if(!b.months || typeof b.months!=="object" || Array.isArray(b.months)) b.months = {};
    // numeric fields that the health/progress maths depends on
    if(typeof b.baseline!=="number") b.baseline = 0;
    if(typeof b.annualTarget!=="number"){
      const n = Number(b.annualTarget);
      b.annualTarget = isNaN(n)?0:n;
    }
    if(!b.unit) b.unit = "";
    if(!b.title) b.title = "Untitled goal";
  });
  // budget monthlyPlan must be a numeric array
  Object.keys(db.budgets).forEach(k=>{
    const bg = db.budgets[k];
    if(bg && bg.monthlyPlan!==undefined) bg.monthlyPlan = toArr(bg.monthlyPlan);
  });
  // debit notes — coerce nested scroll/history arrays and back-fill status
  db.debits.forEach(d=>{
    if(d.scrolls!==undefined) d.scrolls = toArr(d.scrolls);
    if(d.history!==undefined) d.history = toArr(d.history);
    // an old note saved before the workflow change → default it
    if(!d.status || !DN_STATUS.includes(d.status)) d.status = DN_STATUS_DEFAULT;
  });
  db.ngos.forEach(n=>{ if(!n.partnership) n.partnership = "Active"; });
  // every NGO must have a budget object so finance never crashes
  db.ngos.forEach(n=>{
    const b = db.budgets[n.id];
    if(!b || !b.monthlyPlan || !Array.isArray(b.monthlyPlan) || !b.annual)
      db.budgets[n.id] = emptyBudget();
  });
  // ---- keep the FY label in step with the active financial year ----
  if(!db.meta || typeof db.meta!=="object") db.meta = skeletonData().meta;
  const fyStartYr = FY_MONTHS[0].slice(0,4);
  const fyEndYr2  = String(Number(fyStartYr)+1).slice(2);
  db.meta.fyLabel = "FY "+fyStartYr+"-"+fyEndYr2;
  if(!db.meta.program) db.meta.program = "NGO Partnership Program";
  // ---- SAFETY NET: there must always be a working PM login ----
  // If an older/partial seed left no PM (or no usable credentials), restore the
  // default admin account so the owner can never be locked out.
  let pm = db.users.find(u=>u.role==="PM");
  if(!pm){
    pm = skeletonData().users[0];
    db.users.unshift(pm);
  }
  if(!pm.username || !pm.password){
    pm.username = pm.username || "admin";
    pm.password = pm.password || "krsf@2026";
  }
  return db;
}
/* a safe zero budget — used when an NGO has no plan yet */
function emptyBudget(){
  const annual={}; BUDGET_CATS.forEach(c=>annual[c]=0);
  return { annual, totalAnnual:0, monthlyPlan:FY_MONTHS.map(()=>0) };
}

// visible NGOs — everyone sees the whole portfolio (full network access)
function visibleNgos(){

function canManageNgos(){ return ME && ME.role==="PM"; }
function ngoById(id){ return DB.ngos.find(n=>n.id===id); }
function userById(id){ return DB.users.find(u=>u.id===id); }
/* names of the APLs assigned to an NGO (via their ngoIds), comma-joined.
   Falls back gracefully when no APL is assigned yet. */
function aplNamesFor(ngoId){
  const names = (DB.users||[])
    .filter(u=>u.role==="APL" && Array.isArray(u.ngoIds) && u.ngoIds.includes(ngoId))
    .map(u=>u.name);
  return names.length ? names.join(", ") : "—";

function betsForNgo(id){ return DB.bigBets.filter(b=>b.ngoId===id); }
function visibleBets(){
  const ids = new Set(visibleNgos().map(n=>n.id));
  return DB.bigBets.filter(b=>ids.has(b.ngoId));
}

/* Is this an "income level" bet, where the achieved value is a running
   level (not additive)?  Detection is now EXPLICIT: a bet may carry
   levelType:true.  As a fallback for legacy data we also treat ₹ bets
   whose title clearly describes an income level as level-type. */
function betIsLevelType(bet){
  if(typeof bet.levelType==="boolean") return bet.levelType;
  if(bet.unit!=="₹") return false;
  const t=(bet.title||"").toLowerCase();
  return t.includes("average")||t.includes("income level")||t.includes("establish");
}

// cumulative achieved for a goal up to & including month m
function betCumulative(bet, uptoMonth){
  const months = (bet && bet.months) || {};
  if(betIsLevelType(bet)){
    let latest = bet.baseline||0;
    for(const m of FY_MONTHS){
      if(m> uptoMonth) break;
      const c = months[m];
      if(c && c.actual!=null) latest = c.actual;
    }
    return latest;
  }
  let sum = bet.baseline || 0;
  for(const m of FY_MONTHS){
    if(m > uptoMonth) break;
    const c = months[m];
    if(c && c.actual!=null) sum += c.actual;
  }
  return sum;
}
function betCumulativePlan(bet, uptoMonth){
  const months = (bet && bet.months) || {};
  if(betIsLevelType(bet)){
    let latest = bet.baseline||0;
    for(const m of FY_MONTHS){ if(m>uptoMonth)break;
      const c=months[m]; if(c&&c.plan!=null) latest=c.plan; }
    return latest;
  }
  let sum = bet.baseline||0;
  for(const m of FY_MONTHS){ if(m>uptoMonth)break;
    const c=months[m]; if(c&&c.plan!=null) sum+=c.plan; }
  return sum;
}

// progress % of a bet against annual target (cumulative over the whole FY)
function betProgress(bet){
  const cum = betCumulative(bet, FY_END);
  return pct(cum, bet.annualTarget);
}
// on-track status: cumulative achieved vs cumulative plan as of last fully-reported month
function lastReportedMonth(bet){
  const months = (bet && bet.months) || {};
  let last=null;
  for(const m of FY_MONTHS){ if(months[m] && months[m].actual!=null) last=m; }
  return last;
}
function betHealth(bet){
  const lm = lastReportedMonth(bet);
  if(!lm) return {status:"gray",label:"Not started",pace:0};
  const cumA = betCumulative(bet, lm);
  const cumP = betCumulativePlan(bet, lm);
  const pace = pct(cumA, cumP||1);
  let status = pace>=95?"green": pace>=80?"amber":"red";
  return { status, label: status==="green"?"On track":status==="amber"?"Slight slip":"Behind", pace, cumA, cumP, lm };
}

/* Budget actuals from debit notes. A debit note counts toward utilised
   budget as soon as it is logged — the budget tracker reflects all
   recorded spend regardless of which processing stage it is at. */
function dnCounts(d){ return true; }

/* a human timestamp for the audit trail, e.g. "18 May 2026, 2:14 PM" */
function stamp(){
  const d = new Date();
  const day = d.getDate();
  const mon = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  let h = d.getHours(); const ap = h>=12?"PM":"AM"; h = h%12||12;
  const mm = String(d.getMinutes()).padStart(2,"0");
  return day+" "+mon+" "+d.getFullYear()+", "+h+":"+mm+" "+ap;
}

// budget actuals for NGO/month from debit notes
function ngoSpendForMonth(ngoId, month){
  return DB.debits.filter(d=>d.ngoId===ngoId && d.month===month && dnCounts(d))
                  .reduce((s,d)=>s+(d.amount||0),0);
}
function ngoSpendUpto(ngoId, uptoMonth){
  let s=0;
  for(const m of FY_MONTHS){ if(m>uptoMonth)break; s+=ngoSpendForMonth(ngoId,m); }
  return s;
}
function ngoSpendByCat(ngoId, uptoMonth){
  const out={}; BUDGET_CATS.forEach(c=>out[c]=0);
  // only count months that are inside the financial year and at/before uptoMonth
  // — this keeps the category split consistent with ngoSpendUpto().
  DB.debits.filter(d=>d.ngoId===ngoId && dnCounts(d)
                   && FY_MONTHS.includes(d.month) && d.month<=uptoMonth)
           .forEach(d=>{
             const cat = BUDGET_CATS.includes(d.category) ? d.category : "Programme";
             out[cat]=(out[cat]||0)+(d.amount||0);
           });
  return out;
}
function budgetUtilPct(ngoId, uptoMonth){
  const b=DB.budgets[ngoId]; if(!b||!b.totalAnnual) return 0;
  return pct(ngoSpendUpto(ngoId,uptoMonth), b.totalAnnual);
}
// expected pace = months elapsed / 12
function monthsElapsed(uptoMonth){
  return FY_MONTHS.indexOf(uptoMonth)+1;
}

// scorecard status from total /40 — Green ≥35, Yellow ≥25, else Red
function scoreStatus(total){
  if(total>=35) return "green";
  if(total>=25) return "amber";
  return "red";
}
function scoreStatusLabel(total){
  return total>=35?"Green": total>=25?"Yellow":"Red";
}
/* heat-map cell class that MATCHES the status badge (green/amber/red) */
function scoreCellClass(status){
  return status==="green"?"s-hi": status==="amber"?"s-mid": status==="red"?"s-lo":"s-na";
}
// a partner's scorecard for a given month (defaults to CUR_MONTH)
function ngoScore(ngoId, month){
  const m = month || CUR_MONTH;
  const all = DB.scorecards && DB.scorecards[ngoId];
  const sc = all && all[m];
  if(!sc) return {status:"gray",pct:0,total:0,scored:false};
  let total = 0, any = false;
  SCORE_CRITERIA.forEach(c=>{
    if(typeof sc[c.key]==="number"){ total += sc[c.key]; any = true; }
  });
  const pct = Math.round(total/SCORE_MAX*100);
  return { status: any?scoreStatus(total):"gray", pct, total, scored:any };
}
/* set / clear a single scorecard cell for the current reporting month */
function setScoreCell(ngoId, key, val){
  if(blockIfCantEditNgo(ngoId)) return;
  if(!DB.scorecards) DB.scorecards={};
  if(!DB.scorecards[ngoId]) DB.scorecards[ngoId]={};
  if(!DB.scorecards[ngoId][CUR_MONTH]) DB.scorecards[ngoId][CUR_MONTH]={};
  if(val==null) delete DB.scorecards[ngoId][CUR_MONTH][key];
  else DB.scorecards[ngoId][CUR_MONTH][key] = val;
  closeScorePop();
  saveDB();
  render();
}

function findUser(username, password){
  const u = (username||"").trim().toLowerCase();
  const p = password||"";
  return (DB.users||[]).find(x=>
    (x.username||"").trim().toLowerCase()===u && (x.password||"")===p);
}

function confirmResetDatabase(){

/* the latest FY month that actually has reported data (debit notes,
   bet actuals or scorecards) — used as the smart default reporting month */
function latestDataMonth(){
  let latest = FY_MONTHS[0];
  (DB.debits||[]).forEach(d=>{ if(FY_MONTHS.includes(d.month) && d.month>latest) latest=d.month; });
  (DB.bigBets||[]).forEach(b=>{
    FY_MONTHS.forEach(m=>{ const c=b.months&&b.months[m]; if(c&&c.actual!=null&&m>latest) latest=m; });
  });
  Object.values(DB.scorecards||{}).forEach(sc=>{
    Object.keys(sc).forEach(m=>{ if(FY_MONTHS.includes(m)&&m>latest) latest=m; });
  });
  /* prefer the live calendar month if it's inside the FY and not behind the data */
  const live = liveReportingMonth();
  return live>=latest ? live : latest;
}

async function init(){
  // connect + load data from Firebase — never let an error freeze the login screen
  try{
    DB = await loadDB();
  }catch(e){
    console.error("loadDB failed, falling back to skeleton", e);
    DB = migrateDB(skeletonData());
    CLOUD_OK = false;
  }
  setConnState(CLOUD_OK);
  // reveal the login form (or skip straight in if a session is remembered)
  const bootEl = el("loginBoot"), formEl = el("loginForm");
  if(bootEl) bootEl.style.display = "none";
  if(formEl) formEl.style.display = "block";
  if(!CLOUD_OK && bootEl){
    bootEl.style.display = "block";
    bootEl.style.color = "var(--amber)";
    bootEl.textContent = "⚠ Offline — working from this device's saved copy.";
  }
  const sess = await loadSession();
  if(sess && userById(sess)){
    ME = userById(sess);
    el("login").style.display="none";
    el("app").style.display="block";
    bootApp();
  } else {
    const u = el("loginUser"); if(u) u.focus();
    // a quiet hint so the owner can confirm the app reached the database
    const hint = el("loginHint");
    if(hint){
      if(CLOUD_OK){
        const pm = (DB.users||[]).find(x=>x.role==="PM");
        hint.innerHTML = pm
          ? "Connected. Program Manager username: <b>"+esc(pm.username||"admin")+"</b>"
          : "Connected, but no admin account was found — use “Can't sign in?”.";
      } else {
        hint.textContent = "Not connected to Firebase — see “Can't sign in?”.";
      }
    }
  }
}

function buildNav(){
  const items = navItems();
  let html=""; let lastSec=null;
  items.forEach(it=>{
    if(it.sec!==lastSec){ html+=`<div class="nav-sec">${it.sec}</div>`; lastSec=it.sec; }
    html+=`<button class="nav-item ${it.id===CUR_PAGE?'active':''}" data-page="${it.id}" onclick="go('${it.id}')">
      <span class="ic">${it.ic}</span><span>${it.label}</span>
      ${it.count!=null?`<span class="ct">${it.count}</span>`:''}
    </button>`;
  });
  el("nav").innerHTML = html;

/* open / close the mobile sidebar */
function toggleSide(force){
  const side = el("side"), scrim = el("sideScrim");
  const open = (typeof force==="boolean") ? force : !side.classList.contains("open");
  side.classList.toggle("open", open);
  scrim.classList.toggle("show", open);
}
function go(page, arg){
  CUR_PAGE = page; PAGE_ARG = arg||null;
  document.querySelectorAll(".nav-item").forEach(n=>
    n.classList.toggle("active", n.dataset.page===page));
  toggleSide(false);          // collapse the mobile sidebar after navigating
  window.scrollTo(0,0);
  render();
}
function render(){
  if(!ME) return;
  buildNav();
  const c = el("content");
  let crumb = "<b>"+ (navItems().find(i=>i.id===CUR_PAGE)?.label||"") +"</b>";
  switch(CUR_PAGE){
    case "dash":   c.innerHTML = pageDash(); break;
    case "bets":   c.innerHTML = pageBets(); break;
    case "ngos":   c.innerHTML = pageNgos(); break;
    case "ngo":    c.innerHTML = pageNgoDetail(PAGE_ARG);
                   crumb = `<span style="cursor:pointer" onclick="go('ngos')">Partner NGOs</span> &nbsp;›&nbsp; <b>${esc(ngoById(PAGE_ARG)?.short||'')}</b>`;
                   break;
    case "budget": c.innerHTML = pageBudget(); break;
    case "debits": c.innerHTML = pageDebits(); break;
    case "tasks":  c.innerHTML = pageTasks(); break;
    case "okrupload": c.innerHTML = pageOkrUpload(); break;
    case "docs":   c.innerHTML = pageDocs(); break;
    case "admin":  c.innerHTML = (ME.role==="PM") ? pageAdmin() : pageDash(); break;
    default: c.innerHTML = pageDash();
  }
  el("crumb").innerHTML = crumb;
}

let _scorePopAnchor = null;
function openScorePop(ev, ngoId, key){
  ev.stopPropagation();
  let pop = el("scorePop");
  if(!pop){
    pop = document.createElement("div");
    pop.id = "scorePop";
    pop.className = "score-pop";
    document.body.appendChild(pop);
  }
  const crit = SCORE_CRITERIA.find(c=>c.key===key);
  const opts = [0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5];
  pop.innerHTML =
    `<div class="sp-head">${esc(crit?crit.label:key)}</div>` +
    opts.map(v=>`<div class="sp-opt" onclick="setScoreCell('${ngoId}','${key}',${v})">${fmtScore(v)}</div>`).join("") +
    `<div class="sp-opt" style="grid-column:1/-1;background:var(--paper)"
          onclick="setScoreCell('${ngoId}','${key}',null)">Clear</div>`;
  pop.classList.add("show");
  _scorePopAnchor = ev.currentTarget;
  positionScorePop();
  // dismiss on outside click, or whenever the page scrolls
  setTimeout(()=>{
    document.addEventListener("click", closeScorePop, {once:true});
  },0);
  window.addEventListener("scroll", closeScorePop, {once:true,capture:true});
  window.addEventListener("resize", closeScorePop, {once:true});
}
function positionScorePop(){
  const pop = el("scorePop");
  if(!pop || !_scorePopAnchor) return;
  const r = _scorePopAnchor.getBoundingClientRect();
  const pw = pop.offsetWidth||196, ph = pop.offsetHeight||260;
  let left = r.left;
  let top  = r.bottom + 6;
  if(left + pw > window.innerWidth - 8)  left = window.innerWidth - pw - 8;
  if(top + ph > window.innerHeight - 8)  top = r.top - ph - 6;   // flip above
  pop.style.left = Math.max(8,left) + "px";
  pop.style.top  = Math.max(8,top) + "px";
}
function closeScorePop(){
  const pop = el("scorePop");
  if(pop) pop.classList.remove("show");
  _scorePopAnchor = null;
}
