function pageDocs(){
  const ngos = visibleNgos();
  const ids = new Set(ngos.map(n=>n.id));
  const docs = DB.documents.filter(d=>ids.has(d.ngoId));
  const expired  = docs.filter(d=>d.expires && d.expires<TODAY_ISO);
  const expiring = docs.filter(d=>d.expires && d.expires>=TODAY_ISO && d.expires<SOON_CUTOFF_ISO);
  const flagged  = expired.concat(expiring);

  return `
  <div class="phead">
    <div class="phead-row">
      <div>
        <div class="eyebrow">Compliance vault</div>
        <h1 class="serif">Documents</h1>
        <div class="desc">MoUs, proposals, budgets and statutory certificates for every partner NGO.</div>
      </div>
    </div>
  </div>
  ${flagged.length?`<div class="panel" style="margin-bottom:16px;border-left:3px solid var(--${expired.length?'red':'amber'})">
    <div class="panel-h"><h3>Needs renewal</h3><span class="note">${expired.length?expired.length+' expired · ':''}${expiring.length} expiring within 90 days</span></div>
    ${flagged.map(d=>{
      const n=ngoById(d.ngoId);
      const isExp = d.expires<TODAY_ISO;
      return `<div class="lrow"><span class="ico">${isExp?'⛔':'⚠'}</span>
        <div class="meta"><div class="t">${esc(n.short)} — ${esc(d.type)}</div><div class="s">${esc(d.name)}</div></div>
        <span class="badge ${isExp?'red':'amber'}">${isExp?'Expired '+d.expires:'Expires '+d.expires}</span></div>`;
    }).join("")}
  </div>`:''}
  <div class="panel">
    <div class="panel-h"><h3>All documents</h3><span class="note">${docs.length} files across ${ngos.length} NGOs</span></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>NGO</th><th>Type</th><th>File</th><th>Added</th><th>Validity</th></tr></thead>
        <tbody>
        ${ngos.map(n=>{
          const nd = docs.filter(d=>d.ngoId===n.id);
          return nd.map(d=>{
            let exp;
            if(!d.expires) exp = `<span style="color:var(--ink-3);font-size:12px">—</span>`;
            else if(d.expires<TODAY_ISO) exp = `<span class="badge red">Expired ${d.expires}</span>`;
            else if(d.expires<SOON_CUTOFF_ISO) exp = `<span class="badge amber">Expires ${d.expires}</span>`;
            else exp = `<span class="badge gray">Valid to ${d.expires}</span>`;
            return `<tr>
              <td><b>${esc(n.short)}</b></td>
              <td>${esc(d.type)}</td>
              <td class="mono" style="font-size:11px;color:var(--ink-2)">${esc(d.name)}</td>
              <td style="font-size:12px">${d.uploaded}</td>
              <td>${exp}</td>
            </tr>`;
          }).join("");
        }).join("")}
        </tbody>
      </table>
    </div>
  </div>`;
}

        <input type="file" accept=".json" style="display:none" onchange="importBackup(this)">
      </label>
    </div>
  </div>`;
}

/* ---- APL add / edit ---- */
function openAplForm(editId){
  if(ME.role!=="PM") return;
  const u = editId ? (DB.users||[]).find(x=>x.id===editId) : null;
  const ngos = DB.ngos || [];
  const body = `
    <div class="frow">
      <div class="field">
        <label>Full name</label>
        <input type="text" id="apName" value="${u?esc(u.name):''}" placeholder="e.g. Pradyumn Ghatate">
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="apTitle" value="${u?esc(u.title||''):''}" placeholder="Associate Partnership Lead">
      </div>
    </div>
    <div class="frow">
      <div class="field">
        <label>Username</label>
        <input type="text" id="apUser" value="${u?esc(u.username||''):''}" placeholder="lowercase, no spaces">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="text" id="apPass" value="${u?esc(u.password||''):''}" placeholder="give them a simple one to start">
      </div>
    </div>
    <div class="field">
      <label>Assigned NGOs <span style="text-transform:none;font-weight:400">— this APL can edit only these</span></label>
      ${ngos.length? `<div class="chk-grid">
        ${ngos.map(n=>`<label class="chk">
          <input type="checkbox" class="apNgo" value="${n.id}" ${u&&(u.ngoIds||[]).includes(n.id)?'checked':''}>
          <span>${esc(n.short)} <span style="color:var(--ink-3)">· ${esc(n.vertical)}</span></span>
        </label>`).join("")}
      </div>` : `<div class="hint">No NGOs exist yet — add partner NGOs first, then assign them here.</div>`}
    </div>`;
  const foot = `
    ${editId?`<button class="btn danger" style="margin-right:auto" onclick="deleteApl('${editId}')">Remove APL</button>`:''}
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveApl('${editId||''}')">${editId?'Save changes':'Add APL'}</button>`;
  showModal(modalShell(editId?"Edit APL":"New APL", editId?"Edit Partnership Lead":"Add a Partnership Lead", body, foot));
}
async function saveApl(editId){
  const name = el("apName").value.trim();
  const username = el("apUser").value.trim().toLowerCase();
  const password = el("apPass").value;
  if(!name || !username || !password){ toast("Name, username and password are all required"); return; }
  // username must be unique
  const clash = (DB.users||[]).find(x=>x.id!==editId &&
    (x.username||"").trim().toLowerCase()===username);
  if(clash){ toast("That username is already taken"); return; }
  const ngoIds = Array.from(document.querySelectorAll(".apNgo"))
    .filter(c=>c.checked).map(c=>c.value);
  const initials = name.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
  if(editId){
    const u = (DB.users||[]).find(x=>x.id===editId);
    Object.assign(u, { name, username, password, ngoIds,
      title: el("apTitle").value.trim()||"Associate Partnership Lead", avatar:initials });
    stampEdit(u);
  } else {
    const rec = { id:genId("u"), role:"APL", name, username, password, ngoIds,
      title: el("apTitle").value.trim()||"Associate Partnership Lead", avatar:initials };
    stampEdit(rec);
    if(!DB.users) DB.users=[];
    DB.users.push(rec);
  }
  await saveDB();
  closeModal(); render();
  toast(editId?"APL updated":"APL added — share the username & password with them");
}
function deleteApl(id){
  const u = (DB.users||[]).find(x=>x.id===id);
  if(!u) return;
  confirmAction("Remove this APL login?",
    `<b>${esc(u.name)}</b> will no longer be able to sign in. Their NGOs and all
     recorded data stay intact — only the login is removed.`,
    async ()=>{
      DB.users = (DB.users||[]).filter(x=>x.id!==id);
      await saveDB(); closeModal(); render();
      toast("APL login removed");
    }, "Remove login", true);
}

function openPmForm(){
  if(ME.role!=="PM") return;
  const pm = (DB.users||[]).find(u=>u.role==="PM");
  const body = `
    <div class="field">
      <label>Name</label>

    </div>

}
async function savePm(){
  const pm = (DB.users||[]).find(u=>u.role==="PM");
  const name = el("pmName").value.trim();
  const username = el("pmUser").value.trim().toLowerCase();
  const password = el("pmPass").value;
  if(!name || !username || !password){ toast("All fields are required"); return; }
  const clash = (DB.users||[]).find(x=>x.id!==pm.id &&
    (x.username||"").trim().toLowerCase()===username);
  if(clash){ toast("That username is already taken"); return; }
  pm.name=name; pm.username=username; pm.password=password;
  pm.avatar = name.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
  stampEdit(pm);
  await saveDB();
  closeModal(); render();
  bootApp();   // refresh the sidebar chip
  toast("Your login was updated");
}

/* ---- backup / restore ---- */
function exportBackup(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "NGO_Partnership_Program_backup_"+TODAY_ISO+".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Backup downloaded");
}
function importBackup(input){
  if(ME.role!=="PM") return;
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    let data;
    try{ data = JSON.parse(reader.result); }
    catch(e){ toast("That file isn't a valid backup"); return; }
    if(!data || !Array.isArray(data.users)){ toast("That file doesn't look like a tracker backup"); return; }
    confirmAction("Restore from this backup?",
      `This replaces <b>all current live data</b> with the contents of the backup
       file. Everyone's tracker will update. This cannot be undone — make sure
       you have a current backup first.`,
      async ()=>{
        DB = migrateDB(data);
        // force every collection to be treated as changed so it all writes
        DB_PARTS.forEach(p=>{ _lastSynced[p] = "__force__"; });
        await saveDB();
        closeModal(); render();
        toast("Data restored from backup");
      }, "Restore everything", true);
  };
  reader.readAsText(file);
  input.value = "";
}

/* ---- boot ---- */
window.addEventListener("load", ()=>{
  // Safety net: if init takes >8 s, show the login form anyway so the
  // page never gets permanently stuck on "Connecting…"
  const safetyTimer = setTimeout(()=>{
    const bootEl = el("loginBoot"), formEl = el("loginForm");
    if(formEl && formEl.style.display==="none"){
      if(bootEl){ bootEl.style.color="var(--amber)"; bootEl.textContent="⚠ Could not reach server — check your connection and reload."; }
      if(formEl) formEl.style.display="block";
    }
  }, 8000);
  init().finally(()=>clearTimeout(safetyTimer));
});
