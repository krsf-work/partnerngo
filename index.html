      <button class="sc-tab ${SC_VIEW==='trend'?'active':''}" onclick="setScView('trend')">Trend</button>
    </div>`;
  const body = SC_VIEW==='trend' ? scorecardTrend(ngos) : scorecardGrid(ngos, crit);
  return `
  <div class="panel">
    <div class="panel-h" style="flex-direction:column;align-items:stretch;gap:0;padding-bottom:0">
      <div style="display:flex;align-items:center;gap:10px;padding-bottom:9px">
        <h3>Partner Scorecard</h3>
        <span class="note">${SC_VIEW==='trend'
          ? 'monthly total / '+SCORE_MAX+' · last 6 reported months'
          : monthLong(CUR_MONTH)+' · click any cell to score · 0–5 each, total /'+SCORE_MAX}</span>
      </div>
      ${tabs}
    </div>
    ${body}
  </div>`;
}

function scorecardGrid(ngos, crit){
  const month = CUR_MONTH;
  const colAvg = crit.map(c=>{
    const vals = ngos.map(n=>{
      const sc=(DB.scorecards[n.id]||{})[month]||{};
      return sc[c.key];
    }).filter(v=>typeof v==="number");
    return vals.length? (vals.reduce((a,b)=>a+b,0)/vals.length):0;
  });
  const scored = ngos.map(n=>ngoScore(n.id,month)).filter(s=>s.scored);
  const totAvg = scored.length ? scored.reduce((s,x)=>s+x.total,0)/scored.length : 0;

  return `
    <div class="tbl-wrap">
      <table class="sc-tbl">
        <thead><tr>
          <th>Partner</th>
          ${crit.map(c=>`<th class="sc-c" title="${esc(c.label)}">${esc(c.key)}</th>`).join("")}
          <th class="sc-tot">Total /${SCORE_MAX}</th>
          <th class="sc-st">Status</th>
        </tr></thead>
        <tbody>
        ${ngos.map(n=>{
          const sc = (DB.scorecards[n.id]||{})[month] || {};
          const s = ngoScore(n.id, month);
          const initials = n.short.slice(0,2).toUpperCase();
          return `<tr>
            <td class="sc-name">
              <span class="av">${esc(initials)}</span>
              <b>${esc(n.name.length>30?n.name.slice(0,30)+'…':n.name)}</b>
              <span style="color:var(--ink-3);font-size:11px"> · ${esc(n.vertical)}</span>
            </td>
            ${crit.map(c=>{
              const v = sc[c.key];
              return `<td class="sc-c">
                <div class="sc-cell ${scoreClass(v)}"
                     onclick="openScorePop(event,'${n.id}','${c.key}')">
                  ${v==null?'–':fmtScore(v)}
                </div></td>`;
            }).join("")}
            <td class="sc-tot"><span class="sc-tot-v">${s.scored?fmtScore(s.total):'–'}</span></td>
            <td class="sc-st"><span class="badge ${s.status}">${
              s.scored?scoreStatusLabel(s.total):'Not scored'}</span></td>
          </tr>`;
        }).join("")}
        </tbody>
        <tfoot class="sc-foot"><tr>
          <td class="sc-name" style="font-weight:700">Portfolio average</td>
          ${colAvg.map(a=>`<td class="sc-c"><div class="sc-cell">${a?fmtScore(a):'–'}</div></td>`).join("")}
          <td class="sc-tot"><span class="sc-tot-v">${totAvg?fmtScore(totAvg):'–'}</span></td>
          <td class="sc-st"><span class="badge ${totAvg?scoreStatus(totAvg):'gray'}">${
            totAvg?scoreStatusLabel(totAvg):'—'}</span></td>
        </tr></tfoot>
      </table>
    </div>`;
}

/* Trend tab — monthly total /40 per partner over the last 6 reported months */
function scorecardTrend(ngos){
  const allMonths = new Set();
  ngos.forEach(n=>{
    Object.keys(DB.scorecards[n.id]||{}).forEach(m=>allMonths.add(m));
  });
  const months = [...allMonths].sort().slice(-6);
  if(!months.length){
    return `<div class="empty"><div class="mk">▦</div><p>No scorecard history yet.</p></div>`;
  }
  return `
    <div class="tbl-wrap">
      <table class="sc-tbl">
        <thead><tr>
          <th>Partner</th>
          ${months.map(m=>`<th class="sc-c">${esc(monthLabel(m))}</th>`).join("")}
          <th class="sc-st">Latest</th>
        </tr></thead>
        <tbody>
        ${ngos.map(n=>{
          const initials = n.short.slice(0,2).toUpperCase();
          const cells = months.map(m=>{
            const s = ngoScore(n.id, m);
            return s.scored
              ? `<td class="sc-c"><div class="sc-cell ${scoreCellClass(s.status)}">${fmtScore(s.total)}</div></td>`
              : `<td class="sc-c"><div class="sc-cell s-na">–</div></td>`;
          }).join("");
          const last = ngoScore(n.id, months[months.length-1]);
          return `<tr>
            <td class="sc-name">
              <span class="av">${esc(initials)}</span>
              <b>${esc(n.name.length>30?n.name.slice(0,30)+'…':n.name)}</b>
              <span style="color:var(--ink-3);font-size:11px"> · ${esc(n.vertical)}</span>
            </td>
            ${cells}
            <td class="sc-st"><span class="badge ${last.status}">${
              last.scored?scoreStatusLabel(last.total):'—'}</span></td>
          </tr>`;
        }).join("")}
        </tbody>
      </table>
    </div>`;
}
/* show 4.5 not 4.50, and 32 not 32.0 */
function fmtScore(v){
  if(v==null||isNaN(v)) return "–";
  return (Math.round(v*10)/10).toString();
}

/* one NGO row + (if expanded) its big-bet sub-rows */
function dashNgoRow(n){
  const sc   = ngoScore(n.id);
  const bd   = DB.budgets[n.id]||{};
  const appr = bd.totalAnnual||0;
  const used = ngoSpendUpto(n.id,CUR_MONTH);
  const up   = pct(used,appr);
  const bets = betsForNgo(n.id);
  const open = DASH_OPEN===n.id;

  // NGO-level delivery: how many of its bets are on track, and avg % of annual target
  const healths = bets.map(b=>betHealth(b).status);
  const onTrack = healths.filter(s=>s==="green").length;
  const offTrack= healths.filter(s=>s==="red").length;
  const progs = bets.map(b=>betProgress(b));
  const avgProg = progs.length? Math.round(progs.reduce((a,b)=>a+b,0)/progs.length):0;
  // band reflects DELIVERY (vs plan), not raw % — matches the rest of the app
  const aBand = !bets.length?'gray': offTrack? 'red' : onTrack<bets.length? 'amber' : 'green';

  const scLabel = sc.status==='green'?'Green':sc.status==='amber'?'Yellow':sc.status==='red'?'Red':'—';

  const mainRow = `
    <tr class="ngo-main ${open?'open':''}" onclick="toggleNgoRow('${n.id}')">
      <td>
        <span class="caret">▶</span>
        <b>${esc(n.short)}</b>
        <span style="color:var(--ink-3);font-size:11px"> · ${esc(n.state)}</span>
      </td>
      <td style="font-size:12px">${esc(aplNamesFor(n.id))}</td>
      <td class="num">
        ${fmtRs(appr)} <span style="color:var(--ink-3)">·</span> ${fmtRs(used)}
        <div style="font-size:10.5px;color:var(--${up>=100?'red':up>=85?'amber':'green'})">${up}% used</div>
      </td>
      <td>
        <span class="ptag ${n.partnership}" onclick="setPartnership('${n.id}',event)" title="Click to change">
          <span class="pd"></span>${n.partnership}
        </span>
      </td>
      <td><span class="badge ${sc.status}"><span class="dot ${sc.status}"></span>${scLabel}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:9px" title="${onTrack} of ${bets.length} goals on track · ${avgProg}% of annual targets">
          <div class="mini-bar"><i class="${aBand}" style="width:${Math.min(avgProg,100)}%"></i></div>
          <b style="font-size:11.5px;color:var(--${aBand});white-space:nowrap">${bets.length?onTrack+'/'+bets.length:'—'}</b>
        </div>
      </td>
    </tr>`;

  if(!open) return mainRow;

  const sub = bets.length ? bets.map(b=>{
    const p = betProgress(b);
    const band = betHealth(b).status;
    const cum = betCumulative(b,FY_END);
    return `<div class="bet-sub-inner">
      <span class="bi">${b.icon||'◎'}</span>
      <span class="bt">${esc(b.title)}</span>
      <span class="bv">${fmtCompact(cum,b.unit)} / ${fmtCompact(b.annualTarget,b.unit)}</span>
      <div class="mini-bar"><i class="${band==='gray'?'amber':band}" style="width:${Math.min(p,100)}%"></i></div>
      <b style="font-size:12px;width:42px;text-align:right;color:var(--${band==='gray'?'ink-3':band})">${p}%</b>
    </div>`;
  }).join("") : `<div class="bet-sub-inner"><span class="bt" style="color:var(--ink-3)">No goals defined for this NGO yet.</span></div>`;

  return mainRow + `<tr class="bet-sub"><td colspan="6">${sub}</td></tr>`;
}

function fmtCompact(v,unit){
  if(unit==="₹") return fmtRs(v);
  return fmtN(v);
}

let BETS_FILTER = "all";   // all | green | amber | red

      ${["all","green","amber","red"].map(f=>`
        <button class="${BETS_FILTER===f?'on':''}" onclick="BETS_FILTER='${f}';render()">
          ${f==='all'?'All':f==='green'?'On track':f==='amber'?'Slipping':'Behind'} ${counts[f]}

      ${ngos.map(n=>`<option value="${n.id}" ${BETS_NGO===n.id?'selected':''}>${esc(n.short)}</option>`).join("")}
    </select>
    <span style="font-size:12px;color:var(--ink-3);margin-left:auto">${bets.length} goal${bets.length!==1?'s':''} · click a row to expand</span>
  </div>

  ${bets.length ? orderedNgoIds.map(nid=>{
    const n = ngoById(nid);

      ${esc(n.short)} <span style="color:var(--rule-2)">·</span>
      <span style="font-weight:600;text-transform:none;letter-spacing:0">${esc(n.name)}</span>
    </div>
    <div class="bet-list">
      ${byNgo[nid].map(renderBetRow).join("")}
    </div>`;
  }).join("")
    : `<div class="panel"><div class="empty"><div class="mk">◎</div><p>No goals match this filter.</p></div></div>`}
  `;
}

/* one compact bet row; expands to the monthly ladder when open */
function renderBetRow(bet){
  const n = ngoById(bet.ngoId);
  const h = betHealth(bet);
  const level = betIsLevelType(bet);
  const cum = betCumulative(bet,FY_END);
  const prog = pct(cum, bet.annualTarget);
  const progCls = h.status==="gray"?"accent":h.status;
  const open = BETS_OPEN===bet.id;

  const row = `
    <div class="bet-row ${open?'open':''}" onclick="toggleBet('${bet.id}')">
      <span class="caret">▶</span>
      <span class="bi">${bet.icon||'◎'}</span>
      <div class="bmain">
        <div class="btitle">${esc(bet.title)}</div>
        <div class="bngo">${esc(n.short)} · ${esc(n.vertical)}</div>
      </div>
      <div class="bbar-wrap">
        <span class="bdot ${h.status}"></span>
        <div class="pbar"><i class="${progCls}" style="width:${Math.min(prog,100)}%"></i></div>
      </div>
      <span class="bpct" style="color:var(--${progCls==='accent'?'ink-3':progCls})">${prog}%</span>
      <div class="bfig">
        <div class="fv">${level?fmtRs(cum):fmtN(cum)}</div>
        <div class="ft">of ${level?fmtRs(bet.annualTarget):fmtN(bet.annualTarget)}</div>
      </div>
    </div>`;

  if(!open) return row;

  // expanded: monthly ladder
  const cellsHtml = FY_MONTHS.map(m=>{
    const c = bet.months[m]||{};
    const isFuture = m>CUR_MONTH;
    const isCurrent = m===CUR_MONTH;
    const hasActual = c.actual!=null;
    let varHtml="";
    if(c.plan!=null && hasActual){
      const d = c.actual-c.plan;
      const vcls = d>=0?"pos": d< -c.plan*0.15?"neg":"zero";
      varHtml = `<div class="lad-var ${vcls}">${d>=0?'+':''}${fmtCompact(d,bet.unit)}</div>`;
    } else if(c.plan!=null && !hasActual && !isFuture){
      varHtml = `<div class="lad-var zero">awaiting</div>`;
    }
    return `<div class="lad-cell editable ${isFuture?'future':''} ${isCurrent?'current':''}"
                 onclick="event.stopPropagation();openCellEdit('${bet.id}','${m}')">
      <div class="lad-mo">${monthLabel(m)}</div>
      <div class="lad-body">
        <div class="lad-line"><span class="k">Plan</span><span class="v plan">${c.plan!=null?fmtCompact(c.plan,bet.unit):'·'}</span></div>
        <div class="lad-line"><span class="k">Got</span><span class="v ach" style="color:${hasActual?'var(--ink)':'var(--ink-3)'}">${hasActual?fmtCompact(c.actual,bet.unit):'·'}</span></div>
        ${varHtml}
      </div>
    </div>`;
  }).join("");

  const detail = `
    <div class="bet-detail">
      <div class="dhead">
        <span>${level?'Current level vs annual target':'Cumulative against annual target'} —
          <b>${prog}%</b> ${h.status!=='gray'?`· <span style="color:var(--${h.status})">${h.label} (${h.pace}% of plan-to-date)</span>`:'· not started'}
        </span>
        <span style="display:flex;gap:8px">
          ${canEdit()?`<button class="btn sm" onclick="event.stopPropagation();openBetForm('${bet.id}')">Edit bet</button>`:''}
        </span>
      </div>
      <div style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:6px">
        Monthly ladder ${canEdit()?'· tap a month to enter plan &amp; achieved':'· read-only'}
      </div>
      <div class="ladder">${cellsHtml}</div>
      ${bet.editedAt?`<div style="font-size:10.5px;color:var(--ink-3);margin-top:8px">Last updated ${esc(bet.editedAt)} by ${esc(bet.editedBy||'—')}</div>`:''}
    </div>`;

  return row + detail;
}

/* =================================================================
   MODAL INFRASTRUCTURE
   ================================================================= */
let _lastFocus = null;
function showModal(html, wide){
  _lastFocus = document.activeElement;
  const m = el("modal");
  m.className = "modal" + (wide?" wide":"");
  m.innerHTML = html;
  el("modalBg").classList.add("show");
  // focus the first sensible control for keyboard users
  setTimeout(()=>{
    const f = m.querySelector("input,select,textarea,button.primary,button.accent");
    if(f) f.focus();
  },30);
}
function closeModal(){
  el("modalBg").classList.remove("show");
  el("modal").innerHTML = "";
  if(_lastFocus && _lastFocus.focus){ try{_lastFocus.focus();}catch(e){} }
}
/* Escape closes any open modal or popover */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if(el("modalBg") && el("modalBg").classList.contains("show")) closeModal();
    closeScorePop();
  }
});
function modalShell(eyebrow, title, body, footer){
  return `
    <div class="modal-h">
      <div>
        <div class="eyebrow">${eyebrow}</div>
        <h2 class="serif">${title}</h2>
      </div>
      <button class="x" onclick="closeModal()" aria-label="Close" title="Close (Esc)">×</button>
    </div>
    <div class="modal-b">${body}</div>
    <div class="modal-f">${footer}</div>`;
}

/* a styled confirmation dialog — replaces native confirm() everywhere */
let _confirmCb = null;
function confirmAction(title, message, onYes, yesLabel, danger){
  _confirmCb = onYes;
  showModal(modalShell("Please confirm", title,
    `<div style="font-size:13px;color:var(--ink-2);line-height:1.6">${message}</div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn ${danger?'danger':'primary'}" onclick="runConfirm()">${esc(yesLabel||'Confirm')}</button>`));
}
function runConfirm(){
  const cb = _confirmCb; _confirmCb = null;
  closeModal();
  if(typeof cb==="function") cb();
}

/* stamp a record with who last edited it and when — lightweight audit trail */
function stampEdit(rec){
  if(!rec) return rec;
  rec.editedBy = ME ? ME.name : "—";
  rec.editedAt = TODAY_ISO;
  return rec;
}
function editStampLine(rec){

    Last updated ${esc(rec.editedAt)} by ${esc(rec.editedBy||'—')}</div>`;

/* block an edit action for read-only Viewers; returns true if blocked */
function blockIfReadOnly(){
  if(!canEdit()){ toast("Read-only access — you can view but not change records"); return true; }
  return false;
}
/* block an edit unless the user can edit THIS NGO; returns true if blocked */
function blockIfCantEditNgo(ngoId){
  if(!canEdit()){ toast("Read-only access — you can view but not change records"); return true; }
  if(!canEditNgo(ngoId)){
    toast("This NGO isn't assigned to you — you can view it but not edit it");
    return true;
  }

/* ---------- monthly cell edit (plan + achieved) ---------- */
function openCellEdit(betId, month){
  const bet = DB.bigBets.find(b=>b.id===betId);
  if(!bet) return;
  if(blockIfCantEditNgo(bet.ngoId)) return;
  const n = ngoById(bet.ngoId);
  const c = bet.months[month] || {plan:null,actual:null,note:""};
  const level = betIsLevelType(bet);
  const idx = FY_MONTHS.indexOf(month);

  // context: cumulative before this month
  const prevMonth = idx>0? FY_MONTHS[idx-1] : null;
  const cumBefore = prevMonth? betCumulative(bet,prevMonth) : (bet.baseline||0);

  const body = `
    <div style="background:var(--paper-2);border:1px solid var(--rule);padding:13px 15px;margin-bottom:18px;border-radius:6px">
      <div style="display:flex;gap:9px;align-items:center;margin-bottom:5px">
        <span style="font-size:20px">${bet.icon}</span>
        <div style="font-family:var(--display);font-weight:600;font-size:14px;line-height:1.3">${esc(bet.title)}</div>
      </div>
      <div style="font-size:11.5px;color:var(--ink-3)">${esc(n.short)} · annual target
        <b style="color:var(--ink)">${level?fmtRs(bet.annualTarget):fmtN(bet.annualTarget)+' '+esc(bet.unit)}</b>
        ${level?'':` · ${prevMonth?'cumulative to '+monthLabel(prevMonth):'baseline'}: <b style="color:var(--ink)">${fmtN(cumBefore)}</b>`}
      </div>
    </div>

    <div class="frow">
      <div class="field">
        <label>${level?'Income level planned':'Target for'} ${monthLong(month)}</label>
        <input type="number" id="cellPlan" value="${c.plan!=null?c.plan:''}" placeholder="e.g. ${level?'30000':'600'}"/>
        <div class="hint">${level?'Where you expect the income level to reach.':'What the NGO + APL plan to deliver this month.'}</div>
      </div>
      <div class="field">
        <label>Actually achieved</label>
        <input type="number" id="cellActual" value="${c.actual!=null?c.actual:''}" placeholder="e.g. ${level?'27800':'576'}"/>
        <div class="hint">${level?'Reported income level at month-end.':'Filled at month-end against the target.'}</div>
      </div>
    </div>
    <div class="field">
      <label>Note / evidence link <span style="text-transform:none;font-weight:400">(optional)</span></label>
      <textarea id="cellNote" placeholder="Context, reasons for variance, or a link to field evidence / data sheet…">${esc(c.note||'')}</textarea>
    </div>
    <div id="cellPreview"></div>
  `;
  const footer = `
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveCellEdit('${betId}','${month}')">Save month</button>`;

  showModal(modalShell(
    monthLong(month)+" · monthly entry",
    "Plan &amp; Achieved",
    body, footer));

  // live variance preview
  const upd=()=>{
    const p=parseFloat(el("cellPlan").value), a=parseFloat(el("cellActual").value);
    const pv=el("cellPreview");
    if(isNaN(p)||isNaN(a)){ pv.innerHTML=""; return; }
    const d=a-p, pc=pct(a,p);
    const cls=pc>=95?"green":pc>=80?"amber":"red";
    pv.innerHTML=`<div style="border:1px solid var(--rule);border-radius:6px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);font-weight:600">This month</div>
        <div style="font-size:13px;margin-top:3px">Variance <b class="mono" style="color:var(--${cls})">${d>=0?'+':''}${fmtCompact(d,bet.unit)}</b> · ${pc}% of target</div>
      </div>
      <span class="badge ${cls}">${pc>=95?'On target':pc>=80?'Slight slip':'Below target'}</span>
    </div>`;
  };
  ["cellPlan","cellActual"].forEach(id=>el(id).addEventListener("input",upd));
  upd();
}
async function saveCellEdit(betId, month){
  const bet = DB.bigBets.find(b=>b.id===betId);
  const p = el("cellPlan").value.trim();
  const a = el("cellActual").value.trim();

async function saveBet(editId){
  const title = el("bfTitle").value.trim();
  const target = parseFloat(el("bfTarget").value);
  if(!title || isNaN(target)){ toast("Add a title and an annual target"); return; }
  const icSel = document.querySelector(".icon-pick.sel-ic");
  const icon = icSel? icSel.dataset.ic : "🎯";
  const unit = el("bfUnit").value.trim()||"units";
  const baseline = parseFloat(el("bfBaseline").value)||0;
  const levelType = el("bfLevel").value==="true";
  if(editId){
    const b = DB.bigBets.find(x=>x.id===editId);
    b.title=title; b.annualTarget=target; b.unit=unit; b.icon=icon;
    b.baseline=baseline; b.ngoId=el("bfNgo").value; b.levelType=levelType;
    stampEdit(b);
  } else {
    const months={};
    FY_MONTHS.forEach(m=>months[m]={plan:null,actual:null,note:""});
    const rec = { id:genId("b"), ngoId:el("bfNgo").value, title, icon,
      unit, annualTarget:target, baseline, levelType, months };
    stampEdit(rec);
    DB.bigBets.push(rec);
  }
  await saveDB();
  closeModal();
  render();
  toast(editId?"Big bet updated":"Big bet created");
}
function deleteBet(id){
  const bet = DB.bigBets.find(b=>b.id===id);
  confirmAction("Delete this goal?",
    `“${esc(bet?bet.title:'')}” and all of its monthly plan &amp; achieved data will be removed permanently.`,
    async ()=>{
      DB.bigBets = DB.bigBets.filter(b=>b.id!==id);
      await saveDB();
      closeModal();
      render();
      toast("Big bet deleted");
    }, "Delete goal", true);
}

async function saveNgo(editId){
  const name = el("nfName").value.trim();
  const short = el("nfShort").value.trim();
  if(!name || !short){ toast("Name and short name are required"); return; }
  const fields = {
    name, short,
    vertical: el("nfVertical").value,
    state: el("nfState").value.trim()||"—",
    since: el("nfSince").value,
    lead: el("nfLead").value.trim()||"—",
    partnership: el("nfStatus").value
  };
  if(editId){
    const n = ngoById(editId);
    Object.assign(n, fields);
    stampEdit(n);
  } else {
    const rec = { id:genId("n"), ...fields };
    stampEdit(rec);
    DB.ngos.push(rec);
    DB.budgets[rec.id] = emptyBudget();
  }
  await saveDB();
  closeModal();
  render();
  toast(editId?"Partner updated":"Partner added — set up its budget & goals next");
}
function deleteNgo(id){
  const n = ngoById(id);
  if(!n) return;
  const betN = betsForNgo(id).length;
  const dnN  = DB.debits.filter(d=>d.ngoId===id).length;
  confirmAction("Delete this partner NGO?",
    `<b>${esc(n.name)}</b> will be removed along with ${betN} goal${betN!==1?'s':''},
     ${dnN} debit note${dnN!==1?'s':''}, its budget, documents, tasks, scorecards and outcomes.
     This cannot be undone.`,
    async ()=>{
      DB.ngos     = DB.ngos.filter(x=>x.id!==id);
      DB.bigBets  = DB.bigBets.filter(b=>b.ngoId!==id);
      DB.debits   = DB.debits.filter(d=>d.ngoId!==id);
      DB.documents= DB.documents.filter(d=>d.ngoId!==id);
      DB.tasks    = DB.tasks.filter(t=>t.ngoId!==id);
      DB.mbo      = (DB.mbo||[]).filter(r=>r.ngoId!==id);
      if(DB.budgets) delete DB.budgets[id];
      if(DB.scorecards) delete DB.scorecards[id];
      await saveDB();
      closeModal();
      go("ngos");
      toast("Partner NGO deleted");
    }, "Delete partner", true);
}

function ngoActivityStream(ngoId){
  // build a real activity feed from debit notes, bet updates and documents
  const items = [];
  // recent debit notes
  DB.debits.filter(d=>d.ngoId===ngoId).forEach(d=>{
    items.push({
      sort:d.month+"-"+(d.date||""),
      icon:"₹",
      title:`Debit note ${d.dnNo} ${d.status.toLowerCase()}`,
      detail:`${d.category} — ${fmtRsFull(d.amount)} · ${monthLabel(d.month)}`,
      date:monthLabel(d.month)
    });
  });
  // latest reported month on each bet
  betsForNgo(ngoId).forEach(bet=>{
    const lm = lastReportedMonth(bet);
    if(lm){
      const c = bet.months[lm]||{};
      items.push({
        sort:lm+"-15",
        icon:bet.icon||"◎",
        title:`Goal progress logged`,
        detail:`${bet.title.slice(0,54)}${bet.title.length>54?'…':''} — ${fmtN(c.actual)} ${esc(bet.unit)} in ${monthLabel(lm)}`,
        date:monthLabel(lm)
      });
    }
  });
  // documents
  DB.documents.filter(d=>d.ngoId===ngoId).forEach(d=>{
    items.push({
      sort:d.uploaded,
      icon:"▣",
      title:`${d.type} uploaded`,
      detail:`${esc(d.name)}`,
      date:d.uploaded
    });
  });
  items.sort((a,b)=>b.sort.localeCompare(a.sort));
  return items.slice(0,7);
}

function portfolioActivityStream(ngos, limit){
  const items = [];
  const ids = new Set(ngos.map(n=>n.id));
  DB.debits.filter(d=>ids.has(d.ngoId)).forEach(d=>{
    const n = ngoById(d.ngoId);
    items.push({
      sort:d.month+"-"+(d.date||""), icon:"₹",
      title:`${n.short} · debit note ${d.dnNo} ${d.status.toLowerCase()}`,
      detail:`${d.category} — ${fmtRsFull(d.amount)} · ${monthLabel(d.month)}`,
      date:monthLabel(d.month), ngoId:d.ngoId
    });
  });
  ngos.forEach(n=>{
    betsForNgo(n.id).forEach(bet=>{
      const lm = lastReportedMonth(bet);
      if(lm){
        const c = bet.months[lm]||{};
        items.push({
          sort:lm+"-15", icon:bet.icon||"◎",
          title:`${n.short} · goal progress logged`,
          detail:`${bet.title.slice(0,48)}${bet.title.length>48?'…':''} — ${fmtN(c.actual)} ${esc(bet.unit)} in ${monthLabel(lm)}`,
          date:monthLabel(lm), ngoId:n.id
        });
      }
    });
  });
  DB.documents.filter(d=>ids.has(d.ngoId)).forEach(d=>{
    const n = ngoById(d.ngoId);
    items.push({
      sort:d.uploaded, icon:"▣",
      title:`${n.short} · ${d.type} uploaded`,
      detail:`${esc(d.name)}`, date:d.uploaded, ngoId:d.ngoId
    });
  });
  items.sort((a,b)=>b.sort.localeCompare(a.sort));
  return items.slice(0, limit||12);
}

let MBO_MONTH = {};     // selected month per ngo
let MBO_OPEN  = {};     // open/closed state per objective group key

function ngoMboTab(ngoId){
  const n = ngoById(ngoId);
  const all = (DB.mbo||[]).filter(r=>r.ngoId===ngoId);

  // months that have data, newest first  (V2: months[0] is default)
  const months = [...new Set(all.map(r=>r.month))].sort().reverse();
  const selMonth = MBO_MONTH[ngoId] || (months[0] || "");

  const monthOpts = months.map(m=>
    `<option value="${m}" ${m===selMonth?'selected':''}>${monthLong(m)}</option>`).join("");

      Goal targets so the tab isn't empty. Replace them by uploading the partner's real
      monthly outcomes sheet${canEditNgo(ngoId)?' via <b>↑ Upload Excel</b>':''}.
    </div>`;
  }
  html += renderMboBlocks(rows, ngoId);
  return html;

/* V2's renderMboBlocks — group rows by objNum+objective, main first,
   then an "Other Objectives" divider for isOther rows */
function renderMboBlocks(rows, ngoId){
  const main  = rows.filter(r=>!r.isOther);
  const other = rows.filter(r=>r.isOther);

  const groupBy = (arr)=>{
    const map = {};
    arr.forEach(r=>{
      const key = (r.objNum||0)+"|"+r.objective;
      if(!map[key]) map[key] = { objNum:r.objNum, objective:r.objective, key, krs:[] };
      map[key].krs.push(r);
    });
    return Object.values(map).sort((a,b)=>(a.objNum||0)-(b.objNum||0));
  };

  let html = "";
  groupBy(main).forEach(g=>html += renderObjCard(g, ngoId));
  if(other.length){
    html += `<div class="other-divider">Other Objectives</div>`;
    groupBy(other).forEach(g=>html += renderObjCard(g, ngoId));
  }
  if(!html) html = `<div class="panel"><div class="empty"><div class="mk">◎</div><p>No outcomes for this month.</p></div></div>`;
  return html;
}

/* a single objective card — collapsible, with status donut + KR rows */
function renderObjCard(g, ngoId){
  const done    = g.krs.filter(k=>k.status==="Done").length;
  const notDone = g.krs.filter(k=>k.status==="Not Done").length;
  const pending = g.krs.filter(k=>k.status==="Pending").length;
  const total   = g.krs.length||1;
  const donePct = Math.round(done/total*100);
  const open    = MBO_OPEN[g.key] !== false;   // open by default

  return `
  <div class="obj-card ${open?'open':''}">
    <div class="obj-head" onclick="MBO_OPEN['${esc(g.key)}']=${!open};render()">
      <div class="obj-num">${g.objNum||"—"}</div>
      <div>
        <div class="obj-title">${esc(g.objective)}</div>
        <div class="obj-legend">
          ${done?`<span><b style="color:var(--green)">${done}</b> done</span>`:''}
          ${notDone?`<span><b style="color:var(--red)">${notDone}</b> not done</span>`:''}
          ${pending?`<span><b style="color:var(--amber)">${pending}</b> in progress</span>`:''}
        </div>
      </div>
      ${svgDonut(done,notDone,pending,donePct)}
      <div class="obj-arrow">›</div>
    </div>
    <div class="obj-body">
      ${g.krs.map(k=>{
        const sCls = k.status==="Done"?"kr-done":k.status==="Not Done"?"kr-not":"kr-prog";
        const sel  = k.status==="Done"?"green":k.status==="Not Done"?"red":"amber";
        return `
        <div class="kr-row ${sCls}">
          <div>
            <div class="kr-text">${esc(k.kr)}</div>
            <div class="kr-meta">
              ${k.timeline?`<time>${esc(k.timeline)}</time>`:''}
              ${k.ref?`<a href="${esc(k.ref)}" target="_blank" rel="noopener">↗ Reference</a>`:''}
            </div>
            ${k.comment?`<div class="kr-cmt">${esc(k.comment)}</div>`:''}
          </div>
          <div class="kr-actions">
            <select class="status-select ${sel}" onchange="updateKrStatus('${k.id}',this.value)" ${canEditNgo(k.ngoId)?'':'disabled'}>
              <option value="Done"     ${k.status==="Done"?'selected':''}>Done</option>
              <option value="Not Done" ${k.status==="Not Done"?'selected':''}>Not Done</option>
              <option value="Pending"  ${k.status==="Pending"?'selected':''}>In progress</option>
            </select>
            ${canEditNgo(k.ngoId)?`<button class="btn ghost sm" onclick="openMboModal('${k.ngoId}','${k.id}')">Edit</button>`:''}
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function saveMbo(ngoId, editId){
  const objective = el("mbObjective").value.trim();
  const kr = el("mbKr").value.trim();
  if(!objective || !kr){ toast("Objective and key result are required"); return; }
  const rec = {
    id: editId || genId("mbo"),
    ngoId,
    month: el("mbMonth").value,
    objNum: parseInt(el("mbObjNum").value)||1,
    objective, kr,
    timeline: el("mbTimeline").value.trim(),
    status: el("mbStatus").value,
    comment: el("mbComment").value.trim(),
    ref: el("mbRef").value.trim(),
    isOther: el("mbIsOther").value==="true"
  };
  stampEdit(rec);
  if(!DB.mbo) DB.mbo = [];
  if(editId){
    const i = DB.mbo.findIndex(x=>x.id===editId);
    if(i>=0) DB.mbo[i] = rec; else DB.mbo.push(rec);
  } else {
    DB.mbo.push(rec);
  }
  MBO_MONTH[ngoId] = rec.month;
  saveDB(); closeModal(); render();
  toast(editId?"Key result updated":"Key result added");
}

function deleteMbo(id){
  const r = (DB.mbo||[]).find(x=>x.id===id);
  confirmAction("Delete this key result?",
    `“${esc(r?(r.kr||'').slice(0,80):'')}…” will be removed from the outcomes log.`,
    ()=>{
      DB.mbo = (DB.mbo||[]).filter(x=>x.id!==id);
      saveDB(); closeModal(); render();

/* read a cell value flexibly under several possible header names */
function pickCol(row, names){
  for(const k of Object.keys(row)){
    const norm = k.toLowerCase().replace(/[^a-z]/g,"");
    for(const n of names){ if(norm===n||norm.includes(n)) return row[k]; }
  }
  return "";
}
async function importMboFile(ngoId){
  const inp = el("mbFile");
  if(!inp || !inp.files || !inp.files[0]){ toast("Choose a file first"); return; }
  if(typeof XLSX==="undefined"){ toast("Spreadsheet reader didn't load — check your connection"); return; }
  const defMonth = el("mbUpMonth").value;
  try{
    const buf = await inp.files[0].arrayBuffer();
    const wb = XLSX.read(buf,{type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{defval:""});
    if(!rows.length){ toast("No rows found in that file"); return; }
    let added = 0;
    rows.forEach(r=>{
      const objective = String(pickCol(r,["objective","goal"])).trim();
      const kr = String(pickCol(r,["keyresult","kr","activity","result"])).trim();
      if(!objective && !kr) return;
      let status = String(pickCol(r,["status"])).trim();
      const sl = status.toLowerCase();
      status = sl.startsWith("done")||sl.startsWith("complete")?"Done"
             : sl.startsWith("not")?"Not Done":"Pending";
      let month = String(pickCol(r,["month"])).trim();
      if(!/^\d{4}-\d{2}$/.test(month)) month = defMonth;
      const rec = {
        id: genId("mbo"), ngoId, month,
        objNum: parseInt(pickCol(r,["objectiveno","objno","objnum","no"]))||1,
        objective: objective||"(untitled objective)",
        kr: kr||"(untitled key result)",
        timeline: String(pickCol(r,["timeline","targetdate","duedate"])).trim(),
        status,
        comment: String(pickCol(r,["comment","remark","note"])).trim(),
        ref: String(pickCol(r,["reference","ref","link"])).trim(),
        isOther: String(pickCol(r,["type"])).toLowerCase().includes("other")
      };
      stampEdit(rec);
      if(!DB.mbo) DB.mbo=[];
      DB.mbo.push(rec);
      added++;
    });
    if(!added){ toast("Couldn't find Objective / Key Result columns"); return; }
    MBO_MONTH[ngoId] = defMonth;
    await saveDB();
    closeModal();
    render();
    toast(added+" key result"+(added>1?"s":"")+" imported");
  }catch(e){
    console.error(e);
    toast("Couldn't read that file — is it a valid spreadsheet?");
  }
}

  if(!b) return `<div class="panel"><div class="empty"><div class="mk">▦</div>

    <button class="btn accent" onclick="openBudgetUpload('${ngoId}')">↑ Upload budget plan</button></div></div>`;

  const spentUpto = ngoSpendUpto(ngoId,CUR_MONTH);
  const utilPct   = pct(spentUpto, b.totalAnnual);
  const elapsed   = monthsElapsed(CUR_MONTH);
  const planUpto  = b.monthlyPlan.slice(0,elapsed).reduce((a,c)=>a+c,0);
  const variance  = spentUpto - planUpto;
  const utilCls   = utilPct>95?"red": utilPct<55?"amber":"green";
  const over      = variance>0;

  // per-month + cumulative running totals
  let cumPlan=0, cumActual=0;
  const monthRows = FY_MONTHS.map((m,i)=>{
    const plan=b.monthlyPlan[i];
    const actual=ngoSpendForMonth(ngoId,m);
    const reported = m<=CUR_MONTH && actual>0;
    cumPlan += plan;
    if(reported) cumActual += actual;
    return {m,plan,actual,reported,cumPlan,cumActual};
  });
  const linePts = monthRows.map(r=>({
    label:monthLabel(r.m).split(" ")[0],
    cumPlan:r.cumPlan,
    cumActual:r.cumActual,
    reported:r.reported
  }));

  return `
  <div class="sec-head">
    <h2>Budget vs Actual</h2>
    <div class="sh-act">
      <button class="btn accent sm" onclick="openBudgetUpload('${ngoId}')">↑ Upload budget plan</button>
    </div>
  </div>

  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card">
      <div class="stat-ico blue">₹</div>
      <div><div class="stat-l">Approved Budget</div>
        <div class="stat-v">${fmtRs(b.totalAnnual)}</div>
        <div class="stat-sub">${DB.meta.fyLabel} plan</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-ico ${utilCls}">◔</div>
      <div><div class="stat-l">Utilised to ${monthLabel(CUR_MONTH)}</div>
        <div class="stat-v">${fmtRs(spentUpto)}</div>
        <div class="stat-sub" style="color:var(--${utilCls})">${utilPct}% of approved budget</div></div>
    </div>
    <div class="stat-card">

/* parse an uploaded monthly-plan sheet into a 12-element array (or null) */
async function parseBudgetSheet(file){
  if(typeof XLSX==="undefined") return null;
  try{
    const wb = XLSX.read(await file.arrayBuffer(),{type:"array"});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
    const plan = FY_MONTHS.map(()=>0);
    let hit = 0;
    const monthIndex = (raw)=>{
      const s = String(raw).trim();
      if(/^\d{4}-\d{2}$/.test(s)) return FY_MONTHS.indexOf(s);
      const mn = s.slice(0,3).toLowerCase();
      const num = Object.keys(MONTH_NAMES).find(k=>MONTH_NAMES[k].toLowerCase()===mn);
      if(!num) return -1;
      return FY_MONTHS.findIndex(m=>(+m.split("-")[1])===(+num));
    };
    rows.forEach(r=>{
      const idx = monthIndex(pickCol(r,["month","mon"]));
      const amt = parseFloat(String(pickCol(r,["planned","plan","amount","budget"])).replace(/[^0-9.\-]/g,""));
      if(idx>=0 && !isNaN(amt)){ plan[idx]=amt; hit++; }
    });
    return hit ? plan : null;
  }catch(e){ console.error(e); return null; }
}

async function saveBudgetPlan(ngoId){
  const annualInput = parseFloat(el("bgAnnual").value);
  const fileInput = el("bgFile");
  let monthlyPlan = null;

  // a sheet, if provided, defines the plan directly
  if(fileInput && fileInput.files && fileInput.files[0]){
    monthlyPlan = await parseBudgetSheet(fileInput.files[0]);
    if(!monthlyPlan){ toast("Couldn't read a Month / Planned column from that file"); return; }
  }
  const existing = DB.budgets[ngoId];

  if(!monthlyPlan){
    if(!annualInput || annualInput<=0){ toast("Enter a valid annual budget amount"); return; }
    const split = el("bgSplit").value;
    if(split==="keep" && existing && existing.monthlyPlan && existing.totalAnnual){
      const oldTotal = existing.monthlyPlan.reduce((a,c)=>a+c,0) || 1;
      monthlyPlan = existing.monthlyPlan.map(v=>Math.round(v/oldTotal*annualInput));
    } else {
      const per = Math.round(annualInput/12);
      monthlyPlan = FY_MONTHS.map(()=>per);
    }
  }
  const annual = monthlyPlan.reduce((a,c)=>a+c,0);
  // category split: keep proportions if known, else a sensible default
  let annualCats;
  if(existing && existing.annual && Object.values(existing.annual).some(v=>v>0)){
    const oldT = Object.values(existing.annual).reduce((a,c)=>a+c,0) || 1;
    annualCats = {};
    BUDGET_CATS.forEach(c=>annualCats[c]=Math.round((existing.annual[c]||0)/oldT*annual));
  } else {
    annualCats = {Salary:Math.round(annual*0.4), Travel:Math.round(annual*0.1),
                  Programme:Math.round(annual*0.4), "Admin-Other":Math.round(annual*0.1)};
  }
  DB.budgets[ngoId] = { annual:annualCats, totalAnnual:annual, monthlyPlan,
                        editedBy:ME?ME.name:"—", editedAt:TODAY_ISO };
  await saveDB(); closeModal(); render();
  toast("Budget plan saved for "+ngoById(ngoId).short);
}

  const fields = { label, kind: el("rfKind").value, url, addedAt: TODAY_ISO };
  if(editId){
    const f = (DB.refFiles||[]).find(x=>x.id===editId);
    Object.assign(f, fields); stampEdit(f);

    stampEdit(rec);
    if(!DB.refFiles) DB.refFiles=[];
    DB.refFiles.push(rec);
  }
  await saveDB(); closeModal(); render();
  toast(editId?"Reference file updated":"Reference file added");
}
function deleteRefFile(id){

}

/* =====================================================================

   ===================================================================== */
function svgGroupedBars(rows, seriesNames, colors, money){
  const W=720, H=240, padL=58, padB=34, padT=16, padR=14;
  const plotW=W-padL-padR, plotH=H-padB-padT;
  const maxV = niceMax(Math.max(1, ...rows.flatMap(r=>r.series)));
  const groups = rows.length;
  const gw = plotW/groups;
  const barW = Math.min(14, gw/(seriesNames.length+1.4));
  const ticks=4;
  const fmtV = money? (v=>fmtRs(v)) : (v=>fmtN(v));
  const fmtFull = money? (v=>fmtRsFull(v)) : (v=>fmtN(v));
  const key = "gbars_"+Math.random().toString(36).slice(2,7);

  let grid="";
  for(let t=0;t<=ticks;t++){
    const y=padT+plotH-(plotH*t/ticks);
    const val=maxV*t/ticks;
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--rule)" stroke-width="1"/>`;
    grid+=`<text x="${padL-9}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" font-family="var(--mono)" fill="var(--ink-3)">${fmtV(val)}</text>`;
  }
  let cols="";
  const tipData = rows.map((r,i)=>{
    const gx=padL+gw*i+gw/2;
    let inner=`<rect class="chart-vguide" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}" fill="var(--paper-2)"/>`;
    r.series.forEach((v,si)=>{
      const h=v/maxV*plotH;
      const x=gx-(barW*seriesNames.length+2)/2 + si*(barW+2);
      const y=padT+plotH-h;
      const op=r.dim?0.42:1;
      inner+=`<rect class="chart-bar" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${Math.max(h,0).toFixed(1)}" rx="2" fill="${colors[si]}" opacity="${op}"/>`;
    });
    inner+=`<rect class="chart-hot" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}"
      onmousemove="chartHover(event,'${key}',${i})" onmouseleave="hideChartTip()"/>`;
    inner+=`<text x="${gx.toFixed(1)}" y="${H-padB+15}" text-anchor="middle" font-size="9.5" fill="var(--ink-3)" font-weight="600">${esc(r.label)}</text>`;
    cols+=`<g class="chart-col">${inner}</g>`;
    return { _tip:
      `<div class="tt-h">${esc(r.label)}${r.dim?' · not reported':''}</div>` +
      seriesNames.map((s,si)=>
        `<div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:${colors[si]}"></span>${esc(s)}</span><span class="tt-v">${fmtFull(r.series[si]||0)}</span></div>`
      ).join("")
    };
  });
  window._chartData[key] = tipData;
  const legend = seriesNames.map((s,i)=>
    `<span><span class="lg-sw" style="background:${colors[i]}"></span>${esc(s)}</span>`).join("");
  return `
    <div class="chart-legend">${legend}</div>
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" class="svg-chart" preserveAspectRatio="xMidYMid meet">
        ${grid}${cols}
      </svg>
    </div>`;
}

/* ---- shared chart helpers ---- */
/* round a max value up to a clean axis bound so tick labels read nicely */
function niceMax(v){
  if(v<=0) return 1;
  const mag = Math.pow(10, Math.floor(Math.log10(v)));
  const norm = v/mag;
  const step = norm<=1?1: norm<=2?2: norm<=2.5?2.5: norm<=5?5:10;
  return step*mag;
}
/* the global chart tooltip — created once, positioned in JS */
function chartTip(){
  let t = document.getElementById("chartTip");
  if(!t){
    t = document.createElement("div");
    t.id = "chartTip"; t.className = "chart-tip";
    document.body.appendChild(t);
  }
  return t;
}
function showChartTip(ev, html){
  const t = chartTip();
  t.innerHTML = html;
  t.classList.add("show");
  const pad = 14;
  let x = ev.clientX + pad, y = ev.clientY + pad;
  const r = t.getBoundingClientRect();
  if(x + r.width > window.innerWidth-8)  x = ev.clientX - r.width - pad;
  if(y + r.height > window.innerHeight-8) y = ev.clientY - r.height - pad;
  t.style.left = x+"px"; t.style.top = y+"px";
}
function hideChartTip(){
  const t = document.getElementById("chartTip");
  if(t) t.classList.remove("show");
}
/* stash chart row data so hover handlers can read it without giant inline strings */
window._chartData = window._chartData || {};
function chartHover(ev, key, idx){
  const rows = window._chartData[key];
  if(!rows || !rows[idx]) return;
  showChartTip(ev, rows[idx]._tip);
}

/* value-labelled grouped bars — interactive: hover a month for exact figures.
   rows: [{label, plan, actual, reported}]  */
function svgBudgetBars(rows){
  const W=760, H=300, padL=66, padB=44, padT=22, padR=18;
  const plotW=W-padL-padR, plotH=H-padB-padT;
  const maxV = niceMax(Math.max(1, ...rows.map(r=>Math.max(r.plan||0, r.reported?(r.actual||0):0))));
  const gw = plotW/rows.length;
  const barW = Math.min(16, gw/3.4);
  const gap = 3;
  const ticks=4;
  const key = "bbars_"+Math.random().toString(36).slice(2,7);

  let grid="";
  for(let t=0;t<=ticks;t++){
    const y=padT+plotH-(plotH*t/ticks);
    const val=maxV*t/ticks;
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--rule)" stroke-width="1"/>`;
    grid+=`<text x="${padL-10}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="10" font-family="var(--mono)" fill="var(--ink-3)">${fmtRs(val)}</text>`;
  }

  let cols="";
  const tipData = rows.map((r,i)=>{
    const gx=padL+gw*i+gw/2;
    const ph=(r.plan||0)/maxV*plotH;
    const px=gx-barW-gap/2;
    const py=padT+plotH-ph;
    const over=r.reported && r.actual>r.plan;
    let inner=`<rect class="chart-vguide" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}" fill="var(--paper-2)"/>`;
    inner+=`<rect class="chart-bar" x="${px.toFixed(1)}" y="${py.toFixed(1)}" width="${barW}" height="${Math.max(ph,0).toFixed(1)}" rx="3" fill="var(--blue-soft)" stroke="var(--blue)" stroke-width="1"/>`;
    if(r.reported){
      const ah=(r.actual||0)/maxV*plotH;
      const ax=gx+gap/2, ay=padT+plotH-ah;
      inner+=`<rect class="chart-bar" x="${ax.toFixed(1)}" y="${ay.toFixed(1)}" width="${barW}" height="${Math.max(ah,0).toFixed(1)}" rx="3" fill="var(--${over?'red':'accent'})"/>`;
    }
    // transparent full-height hotzone for reliable hover
    inner+=`<rect class="chart-hot" x="${(gx-gw/2).toFixed(1)}" y="${padT}" width="${gw.toFixed(1)}" height="${plotH}"
      onmousemove="chartHover(event,'${key}',${i})" onmouseleave="hideChartTip()"/>`;
    inner+=`<text x="${gx.toFixed(1)}" y="${H-padB+17}" text-anchor="middle" font-size="10.5" fill="var(--ink-2)" font-weight="600">${esc(r.label)}</text>`;
    cols+=`<g class="chart-col">${inner}</g>`;
    // tooltip html
    const dvar = r.reported ? (r.actual-r.plan) : null;
    return { _tip:
      `<div class="tt-h">${esc(r.label)}</div>
       <div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--blue-soft);border:1px solid var(--blue)"></span>Planned</span><span class="tt-v">${fmtRsFull(r.plan||0)}</span></div>
       ${r.reported
         ? `<div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--${over?'red':'accent'})"></span>Actual</span><span class="tt-v">${fmtRsFull(r.actual||0)}</span></div>
            <div class="tt-d" style="color:${dvar>0?'#ff9b8a':'#9be3c4'}">${dvar>=0?'+':''}${fmtRsFull(dvar)} ${dvar>0?'over plan':'under plan'}</div>`
         : `<div class="tt-d">Not yet reported</div>`}`
    };
  });
  window._chartData[key] = tipData;

  return `

      <svg viewBox="0 0 ${W} ${H}" class="svg-chart" preserveAspectRatio="xMidYMid meet">
        ${grid}${cols}
      </svg>
    </div>`;
}

/* cumulative line chart — running planned total vs running actual.
   Interactive: hover any month for exact running figures and the gap.
   pts: [{label, cumPlan, cumActual, reported}]  */
function svgCumulativeLine(pts){
  const W=760, H=320, padL=70, padB=44, padT=22, padR=20;
  const plotW=W-padL-padR, plotH=H-padB-padT;
  const maxV = niceMax(Math.max(1, ...pts.map(p=>Math.max(p.cumPlan||0, p.reported?(p.cumActual||0):0))));
  const ticks=4;
  const x = i => padL + (pts.length>1? plotW*i/(pts.length-1) : plotW/2);
  const y = v => padT + plotH - (v/maxV*plotH);
  const key = "cline_"+Math.random().toString(36).slice(2,7);

  let grid="";
  for(let t=0;t<=ticks;t++){
    const gy=padT+plotH-(plotH*t/ticks);
    grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="var(--rule)" stroke-width="1"/>`;
    grid+=`<text x="${padL-10}" y="${(gy+3.5).toFixed(1)}" text-anchor="end" font-size="10" font-family="var(--mono)" fill="var(--ink-3)">${fmtRs(maxV*t/ticks)}</text>`;
  }
  let xlab="";
  pts.forEach((p,i)=>{
    xlab+=`<text x="${x(i).toFixed(1)}" y="${H-padB+17}" text-anchor="middle" font-size="10.5" fill="var(--ink-2)" font-weight="600">${esc(p.label)}</text>`;
  });

  const planPath = pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(p.cumPlan).toFixed(1)}`).join(" ");
  const rep = pts.map((p,i)=>({i,p})).filter(o=>o.p.reported);
  const actPath = rep.map((o,k)=>`${k?'L':'M'}${x(o.i).toFixed(1)},${y(o.p.cumActual).toFixed(1)}`).join(" ");

  // shaded gap between the two cumulative lines (over = red, under = green)
  let gapFill="";
  if(rep.length>1){
    const last=rep[rep.length-1];
    const over=last.p.cumActual>last.p.cumPlan;
    const top = rep.map(o=>`${x(o.i).toFixed(1)},${y(o.p.cumActual).toFixed(1)}`).join(" ");
    const bot = rep.slice().reverse().map(o=>`${x(o.i).toFixed(1)},${y(o.p.cumPlan).toFixed(1)}`).join(" ");
    gapFill=`<polygon points="${top} ${bot}" fill="var(--${over?'red':'green'})" opacity="0.13"/>`;
  }

  // dots
  let planDots="", actDots="";
  pts.forEach((p,i)=>{
    planDots+=`<circle cx="${x(i).toFixed(1)}" cy="${y(p.cumPlan).toFixed(1)}" r="3" fill="var(--blue)" opacity="0.6"/>`;
  });
  rep.forEach(o=>{
    const over=o.p.cumActual>o.p.cumPlan;
    actDots+=`<circle class="chart-pt" cx="${x(o.i).toFixed(1)}" cy="${y(o.p.cumActual).toFixed(1)}" r="4.5" fill="var(--${over?'red':'accent'})" stroke="var(--card)" stroke-width="1.8"/>`;
  });

  // interactive hover columns + tooltip data
  let hot="";
  const colW = pts.length>1 ? plotW/(pts.length-1) : plotW;
  const tipData = pts.map((p,i)=>{
    const cx=x(i);
    hot+=`<g class="chart-col">
      <line class="chart-vguide" x1="${cx.toFixed(1)}" y1="${padT}" x2="${cx.toFixed(1)}" y2="${padT+plotH}" stroke="var(--rule-2)" stroke-width="1" stroke-dasharray="3 3"/>
      <rect class="chart-hot" x="${(cx-colW/2).toFixed(1)}" y="${padT}" width="${colW.toFixed(1)}" height="${plotH}"
        onmousemove="chartHover(event,'${key}',${i})" onmouseleave="hideChartTip()"/>
    </g>`;
    const diff = p.reported ? (p.cumActual-p.cumPlan) : null;
    const over = diff!=null && diff>0;
    return { _tip:
      `<div class="tt-h">By ${esc(p.label)}</div>
       <div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--blue)"></span>Planned (cumulative)</span><span class="tt-v">${fmtRsFull(p.cumPlan||0)}</span></div>
       ${p.reported
         ? `<div class="tt-r"><span class="tt-k"><span class="tt-sw" style="background:var(--accent)"></span>Actual (cumulative)</span><span class="tt-v">${fmtRsFull(p.cumActual||0)}</span></div>
            <div class="tt-d" style="color:${over?'#ff9b8a':'#9be3c4'}">${over?'Over':'Under'} plan by ${fmtRsFull(Math.abs(diff))}</div>`
         : `<div class="tt-d">Not yet reported</div>`}`
    };
  });
  window._chartData[key] = tipData;

  return `
    <div class="chart-legend">
      <span><span class="lg-sw" style="background:var(--blue);opacity:.6"></span>Cumulative planned</span>
      <span><span class="lg-sw" style="background:var(--accent)"></span>Cumulative actual</span>
    </div>
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" class="svg-chart" preserveAspectRatio="xMidYMid meet">
        ${grid}
        ${gapFill}
        <path d="${planPath}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-dasharray="6 4" opacity="0.75"/>
        ${actPath?`<path d="${actPath}" fill="none" stroke="var(--accent)" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>`:''}
        ${planDots}${actDots}
        ${xlab}
        ${hot}
      </svg>
    </div>`;
}

function svgDonut(done,notDone,pending,pctLabel){
  const total=done+notDone+pending||1;
  const r=22, C=2*Math.PI*r, cx=28, cy=28;
  const segs=[
    {v:done,    col:"var(--green)"},
    {v:notDone, col:"var(--red)"},
    {v:pending, col:"var(--amber)"}
  ];
  let off=0, circles="";
  segs.forEach(s=>{
    const len=s.v/total*C;
    if(len>0){
      circles+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.col}"
        stroke-width="8" stroke-dasharray="${len} ${C}" stroke-dashoffset="${-off}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
    }
    off+=len;
  });
  return `<div class="donut-c">
    <svg width="54" height="54" viewBox="0 0 56 56">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--rule)" stroke-width="8"/>
      ${circles}
    </svg>
    <div class="dn-mid">${pctLabel}%</div>
  </div>`;
}

function svgRadar(dims){
  const N=dims.length, cx=150, cy=150, R=110, max=5;
  const angle=i=>(-Math.PI/2)+(2*Math.PI*i/N);
  const pt=(i,rad)=>[cx+Math.cos(angle(i))*rad, cy+Math.sin(angle(i))*rad];

  let rings="";
  for(let g=1;g<=max;g++){
    const pts=dims.map((_,i)=>pt(i,R*g/max).join(",")).join(" ");
    rings+=`<polygon points="${pts}" fill="none" stroke="var(--rule)" stroke-width="1"/>`;
  }
  let spokes="", labels="";
  dims.forEach((d,i)=>{
    const [ex,ey]=pt(i,R);
    spokes+=`<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="var(--rule)" stroke-width="1"/>`;
    const [lx,ly]=pt(i,R+18);
    const anchor = Math.abs(lx-cx)<8?"middle":(lx>cx?"start":"end");
    labels+=`<text x="${lx}" y="${ly+3}" text-anchor="${anchor}" font-size="9" fill="var(--ink-2)" font-weight="600">${esc(d.key)}</text>`;
  });
  const dataPts=dims.map((d,i)=>pt(i,R*d.score/max).join(",")).join(" ");
  return `
    <svg viewBox="0 0 300 300" width="280" height="280">
      ${rings}${spokes}
      <polygon points="${dataPts}" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="2"/>
      ${dims.map((d,i)=>{const[x,y]=pt(i,R*d.score/max);return `<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`;}).join("")}
      ${labels}
    </svg>`;
}

  showModal(modalShell(editId?"Edit debit note":"New debit note",
    editId?"Edit Debit Note":"Log a Debit Note", body, footer));
  recalcScrollTotal();
}

/* one editable scroll-line row */
function scrollRowHtml(line, i){
  return `<tr class="scroll-row">
    <td><input type="text" class="sc-id" value="${esc(line.scrollId||'')}" placeholder="Scroll ID e.g. 0001"></td>
    <td><input type="number" class="sc-amt" value="${line.amount!==''&&line.amount!=null?line.amount:''}"
         placeholder="Amount ₹" oninput="recalcScrollTotal()"></td>
    <td><button type="button" class="sc-del" onclick="removeScrollRow(this)" title="Remove">×</button></td>
  </tr>`;
}
function addScrollRow(){
  const tb = el("dfScrolls");
  if(!tb) return;
  const tmp = document.createElement("tbody");
  tmp.innerHTML = scrollRowHtml({scrollId:"",amount:""}, tb.children.length);
  tb.appendChild(tmp.firstElementChild);
}
function removeScrollRow(btn){
  const tb = el("dfScrolls");
  const row = btn.closest("tr");
  if(tb && tb.children.length>1) row.remove();
  else { row.querySelector(".sc-id").value=""; row.querySelector(".sc-amt").value=""; }
  recalcScrollTotal();
}
function readScrollLines(){
  return Array.from(document.querySelectorAll("#dfScrolls .scroll-row")).map(r=>({
    scrollId: r.querySelector(".sc-id").value.trim(),
    amount: parseFloat(r.querySelector(".sc-amt").value)||0
  }));
}
function recalcScrollTotal(){
  const total = readScrollLines().reduce((s,l)=>s+l.amount,0);
  const el2 = el("dfTotal");
  if(el2) el2.textContent = fmtRsFull(total);
}

/* read the Drive-link filename and pre-fill debit number + month */
function debitParseLink(){
  const url = (el("dfUrl")?el("dfUrl").value:"") || "";
  const msg = el("dfParseMsg");
  let txt = "";
  try{ txt = decodeURIComponent(url); }catch(e){ txt = url; }
  // debit note number — DB-01, DN-12, etc.
  const noEl = el("dfNo");
  const numM = txt.match(/\b(D[BN][-\s]?\d{1,3})\b/i);
  if(numM && noEl && !noEl.value.trim()){
    noEl.value = numM[1].toUpperCase().replace(/\s/g,"-");
  }
  // month name + year → FY month value
  const months = {january:"01",february:"02",march:"03",april:"04",may:"05",june:"06",
    july:"07",august:"08",september:"09",october:"10",november:"11",december:"12"};
  const mM = txt.toLowerCase().match(/(january|february|march|april|may|june|july|august|september|october|november|december)[\s_-]*(\d{4})/);
  if(mM){
    const val = mM[2]+"-"+months[mM[1]];
    if(FY_MONTHS.includes(val) && el("dfMonth")) el("dfMonth").value = val;
  }
  if(msg){
    if(numM || mM){
      msg.style.color = "var(--green)";
      msg.innerHTML = "✓ Read from the file name"
        + (numM?` — number <b>${esc((numM[1]||'').toUpperCase().replace(/\s/g,'-'))}</b>`:"")
        + (mM?`, month <b>${esc(monthLong(mM[2]+'-'+months[mM[1]]))}</b>`:"")
        + ". Check and adjust below.";
    } else {
      msg.style.color = "var(--ink-3)";
      msg.textContent = "Link saved. Fill in the number and month below.";
    }
  }
}

/* infer the budget category from free text on the debit note */
function guessDebitCategory(text){
  const t = (text||"").toLowerCase();
  if(/salary|stipend|honorar|wage|payroll|remuner/.test(t)) return "Salary";
  if(/travel|conveyance|fuel|transport|mileage|fare|ta\/da|tada/.test(t)) return "Travel";
  if(/admin|office|rent|utility|stationery|audit|bank charge|misc/.test(t)) return "Admin-Other";
  if(/programme|program|training|workshop|field|activity|material|equipment|event/.test(t)) return "Programme";
  return "Programme";
}

/* ---- read a debit-note Excel file and auto-fill the whole form ----
   Forgiving by design: scans every sheet, finds the header row wherever it
   sits, and maps columns by recognising their names. */
function importDebitExcel(){
  const inp = el("dfXls");
  const msg = el("dfXlsMsg");
  if(!inp || !inp.files || !inp.files[0]) return;
  if(typeof XLSX==="undefined"){
    if(msg){ msg.style.color="var(--red)"; msg.textContent="Spreadsheet reader didn't load — check your connection and retry."; }
    return;
  }
  const file = inp.files[0];
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const wb = XLSX.read(reader.result, {type:"array"});

      // ---- gather every sheet as its own grid (don't merge — sheets have
      //      different table shapes; merging loses the per-table structure) ----
      const sheets = wb.SheetNames.map(sn=>
        XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:""})
          .map(r=>r.map(c=>String(c).trim()))
      );
      const allFlat = [].concat(...sheets);
      const joined = allFlat.map(r=>r.join(" | ")).join("\n");

      // ---- debit note number: DB-01, DN-12 etc., anywhere in the workbook ----
      let dnNo = "";
      const numM = joined.match(/\b(D[BN][-\s]?\d{1,3})\b/i);
      if(numM) dnNo = numM[1].toUpperCase().replace(/\s/g,"-");

      // ---- date: prefer one on a line that mentions the debit-note date ----
      let isoDate = "";
      const toIso = (d1,m1,y1)=>{
        if(String(y1).length===2) y1="20"+y1;
        return y1+"-"+String(m1).padStart(2,"0")+"-"+String(d1).padStart(2,"0");
      };
      // first look for a row containing "Date" near the top (the note's own date)
      for(const row of allFlat){
        const line = row.join(" ");
        if(/debit\s*no|date\s*[:.]/i.test(line)){
          // strip ordinal suffixes (16th, 1st, 2nd, 3rd) so the date parses
          const clean = line.replace(/(\d)(st|nd|rd|th)\b/gi,"$1");
          const m = clean.match(/(\d{1,2})[-/\s]+(\d{1,2}|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*[-/\s,]+(\d{2,4})/i);
          if(m){
            const mon = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
            let mm = isNaN(+m[2]) ? mon[m[2].toLowerCase().slice(0,3)] : +m[2];
            if(mm){ isoDate = toIso(m[1],mm,m[3]); break; }
          }
        }
      }
      // fall back to the first date anywhere
      if(!isoDate){
        const dM = joined.match(/\b(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})\b/);
        if(dM) isoDate = toIso(dM[1],dM[2],dM[3]);
        const ymM = joined.match(/\b(20\d{2})[-/](\d{1,2})[-/](\d{1,2})\b/);
        if(ymM && !isoDate) isoDate = ymM[1]+"-"+String(ymM[2]).padStart(2,"0")+"-"+String(ymM[3]).padStart(2,"0");
      }

      // ---- find the BEST data table across all sheets ----
      // For each sheet: locate a header row (one with an amount-like column),
      // then count the data rows beneath it. The table with the MOST data rows
      // wins — that's the detailed expense/scroll breakdown, not a 1-line summary.
      const amtNames = ["amount","totalamount","total","amountrs","value"];
      const idNames  = ["scrollid","scroll","srno","sr","slno","sl","no","sno"];
      let best = null;   // {lines:[…], descText:''}
      sheets.forEach(flat=>{
        let headerIdx=-1,colAmt=-1,colId=-1,colDesc=-1;
        for(let i=0;i<flat.length;i++){
          const cells = flat[i].map(c=>c.toLowerCase().replace(/[^a-z]/g,""));
          const ai = cells.findIndex(c=>amtNames.includes(c));
          if(ai>=0){
            headerIdx=i; colAmt=ai;
            colId  = cells.findIndex(c=>idNames.includes(c));
            colDesc= cells.findIndex(c=>/desc|particular|budgetline|narration|head/.test(c));
            break;
          }
        }
        if(headerIdx<0) return;
        const lines=[]; let descText="";
        for(let i=headerIdx+1;i<flat.length;i++){
          const row=flat[i];
          if(/total/i.test(row.join(" "))) continue;            // skip summary rows
          const amt=parseFloat((row[colAmt]||"").replace(/[^0-9.\-]/g,""));
          if(isNaN(amt)||amt<=0) continue;
          lines.push({ scrollId: colId>=0?(row[colId]||"").trim():"", amount:amt });
          if(colDesc>=0 && row[colDesc]) descText += " "+row[colDesc];
        }
        if(lines.length && (!best || lines.length>best.lines.length)){
          best = { lines, descText };
        }
      });
      const lines = best ? best.lines : [];
      const descText = best ? best.descText : "";

      // ---- apply to the form ----
      if(dnNo && el("dfNo") && !el("dfNo").value.trim()) el("dfNo").value = dnNo;
      if(isoDate && el("dfDate")){
        el("dfDate").value = isoDate;
        const mv = isoDate.slice(0,7);
        if(FY_MONTHS.includes(mv) && el("dfMonth")) el("dfMonth").value = mv;
      }
      // category: detect ONLY from the expense-line descriptions — never the
      // whole workbook, whose legal boilerplate ("…Salary/Professional fees…")
      // would otherwise mis-trigger. Fall back to Programme if no lines.
      if(el("dfCat")){
        el("dfCat").value = descText.trim()
          ? guessDebitCategory(descText)
          : "Programme";
      }

      if(lines.length){
        const tb = el("dfScrolls");
        if(tb){
          tb.innerHTML = lines.map((l,i)=>scrollRowHtml(l,i)).join("");
          recalcScrollTotal();
        }
      }

      if(msg){
        const total = lines.reduce((s,l)=>s+l.amount,0);
        if(lines.length || dnNo){
          msg.style.color = "var(--green)";
          msg.innerHTML = "✓ Read from the Excel file"
            + (dnNo?` — <b>${esc(dnNo)}</b>`:"")
            + (lines.length?`, <b>${lines.length}</b> line${lines.length>1?'s':''} totalling <b>${fmtRsFull(total)}</b>`:"")
            + ". Check the fields below and save.";
        } else {
          msg.style.color = "var(--amber)";
          msg.textContent = "Couldn't find a data table in that file — fill the fields in by hand below.";
        }
      }
    }catch(e){
      console.error(e);
      if(msg){ msg.style.color="var(--red)"; msg.textContent="Couldn't read that file — is it a valid Excel/CSV?"; }
    }
  };
  reader.onerror = ()=>{ if(msg){ msg.style.color="var(--red)"; msg.textContent="Couldn't open that file."; } };
  reader.readAsArrayBuffer(file);
}

async function saveDebit(ngoId, editId){
  const scrolls = readScrollLines().filter(l=>l.scrollId || l.amount);
  if(!scrolls.length){ toast("Add at least one scroll line with an amount"); return; }
  const amt = scrolls.reduce((s,l)=>s+l.amount,0);
  if(amt<=0){ toast("The scroll lines must add up to more than zero"); return; }
  const dnNo = el("dfNo").value.trim();
  if(!dnNo){ toast("Enter the debit note number"); return; }
  // guard against logging the same debit note twice for this NGO
  const dup = DB.debits.find(x=>x.ngoId===ngoId && x.id!==editId
    && (x.dnNo||"").trim().toLowerCase()===dnNo.toLowerCase());
  if(dup){
    toast("Debit note "+dnNo+" is already logged for this NGO");
    return;
  }
  const month = el("dfMonth").value;
  const status = (document.querySelector('input[name="dfStatus"]:checked')||{}).value || DN_STATUS_DEFAULT;
  const d = editId ? DB.debits.find(x=>x.id===editId) : null;
  const obj = {
    month, category: el("dfCat").value, dnNo,
    amount: amt, scrolls,
    url: el("dfUrl").value.trim(),
    date: el("dfDate").value || (month+"-28"),
    note: el("dfNote").value.trim(),
    status,
    editedBy: ME?ME.name:"—", editedAt: TODAY_ISO
  };
  // build/extend the timestamped status history
  let history = (d && Array.isArray(d.history)) ? d.history.slice() : [];
  const prevStatus = d ? d.status : null;
  if(!history.length){
    // first save — record the starting stage
    history.push({ status, at: stamp(), by: ME?ME.name:"—" });
  } else if(status !== prevStatus){
    // status changed — append a new stamped entry
    history.push({ status, at: stamp(), by: ME?ME.name:"—" });
  }
  obj.history = history;

  // over-budget guard — compare against spend within this financial year
  const b = DB.budgets[ngoId];
  if(b && b.totalAnnual){
    let spentSoFar = DB.debits
      .filter(x=>x.ngoId===ngoId && x.id!==editId && FY_MONTHS.includes(x.month))
      .reduce((s,x)=>s+(x.amount||0),0);
    if(spentSoFar + amt > b.totalAnnual){
      const over = spentSoFar + amt - b.totalAnnual;
      confirmAction("This exceeds the approved budget",
        `Logging this debit note takes total spend to
         <b>${fmtRsFull(spentSoFar+amt)}</b>, which is <b>${fmtRsFull(over)}</b>
         over ${esc(ngoById(ngoId).short)}'s approved budget of ${fmtRsFull(b.totalAnnual)}.
         Save it anyway?`,
        ()=>commitDebit(ngoId,editId,obj), "Save anyway", true);
      return;
    }
  }
  commitDebit(ngoId,editId,obj);
}
async function commitDebit(ngoId, editId, obj){
  if(editId){
    const d=DB.debits.find(x=>x.id===editId);
    Object.assign(d,obj);
  } else {
    DB.debits.push({ id:genId("dn"), ngoId, ...obj });
  }
  await saveDB();
  closeModal();
  render();
  toast(editId?"Debit note updated":"Debit note logged · budget actuals refreshed");
}
function deleteDebit(id){
  const d = DB.debits.find(x=>x.id===id);
  confirmAction("Delete this debit note?",
    `Debit note <b>${esc(d?d.dnNo:'')}</b> (${d?fmtRsFull(d.amount):''}) will be removed and the budget actuals will refresh.`,
    async ()=>{
      DB.debits = DB.debits.filter(d=>d.id!==id);
      await saveDB();
      closeModal();
      render();
      toast("Debit note deleted");
    }, "Delete debit note", true);
}

/* =================================================================
   PAGE · BUDGET TRACKER (portfolio-wide)
   ================================================================= */
let FIN_NGO = "all";   // Finance page NGO filter
function pageBudget(){
  const ngos = visibleNgos();
  // keep the filter valid if the visible set changes
  if(FIN_NGO!=="all" && !ngos.some(n=>n.id===FIN_NGO)) FIN_NGO = "all";

  const elapsed = monthsElapsed(CUR_MONTH);
  const expectedPct = Math.round(elapsed/12*100);
  const curIdx = FY_MONTHS.indexOf(CUR_MONTH);
  const nextMonth = curIdx>=0 && curIdx<11 ? FY_MONTHS[curIdx+1] : null;

  // the set the page is currently reporting on (all NGOs, or just one)
  const scope = FIN_NGO==="all" ? ngos : ngos.filter(n=>n.id===FIN_NGO);

  let totalAnnual=0, totalSpent=0, totalPlan=0, totalNextPlan=0;
  const rows = scope.map(n=>{
    const b = DB.budgets[n.id] || emptyBudget();
    const spent = ngoSpendUpto(n.id,CUR_MONTH);
    const planUpto = b.monthlyPlan.slice(0,elapsed).reduce((a,c)=>a+c,0);
    const nextPlan = nextMonth ? (b.monthlyPlan[curIdx+1]||0) : 0;
    let devSum=0, devCnt=0;
    FY_MONTHS.forEach((m,i)=>{
      if(m>CUR_MONTH) return;
      const plan = b.monthlyPlan[i];
      const actual = ngoSpendForMonth(n.id,m);
      if(actual>0 && plan>0){ devSum += Math.abs(actual-plan)/plan; devCnt++; }
    });
    const adherence = devCnt ? Math.round(devSum/devCnt*100) : null;
    const cumVar = spent - planUpto;
    totalAnnual+=b.totalAnnual; totalSpent+=spent; totalPlan+=planUpto; totalNextPlan+=nextPlan;
    return { n, b, spent, planUpto, nextPlan, util:pct(spent,b.totalAnnual),
             adherence, cumVar, varPct: planUpto? Math.round(cumVar/planUpto*100):0 };
  });

  const portUtil = pct(totalSpent,totalAnnual);
  const portVar  = totalSpent - totalPlan;
  const variance = portVar, over = portVar>0;
  const utilCls  = portUtil>95?"red": portUtil<55?"amber":"green";
  const projectedYearEnd = elapsed ? Math.round(totalSpent/elapsed*12) : 0;
  const projectedPct = pct(projectedYearEnd,totalAnnual);

  // insights — computed across the FULL portfolio so they stay meaningful even when filtered
  const allRows = ngos.map(n=>{
    const b = DB.budgets[n.id] || emptyBudget();
    const spent = ngoSpendUpto(n.id,CUR_MONTH);
    const planUpto = b.monthlyPlan.slice(0,elapsed).reduce((a,c)=>a+c,0);
    let devSum=0, devCnt=0;
    FY_MONTHS.forEach((m,i)=>{
      if(m>CUR_MONTH) return;
      const plan=b.monthlyPlan[i], actual=ngoSpendForMonth(n.id,m);
      if(actual>0&&plan>0){ devSum+=Math.abs(actual-plan)/plan; devCnt++; }
    });
    const adherence = devCnt?Math.round(devSum/devCnt*100):null;
    const cumVar = spent-planUpto;
    return { n, b, spent, planUpto, adherence, cumVar,
             varPct: planUpto?Math.round(cumVar/planUpto*100):0 };
  });
  const bestDiscipline = allRows.filter(r=>r.adherence!=null).sort((a,b)=>a.adherence-b.adherence)[0];
  const highestVar = allRows.slice().sort((a,b)=>Math.abs(b.cumVar)-Math.abs(a.cumVar))[0];

  // cumulative running totals across the scope (drives the line chart + readout)
  let cumPlan=0, cumActual=0;
  const monthRows = FY_MONTHS.map((m,i)=>{
    let plan=0, actual=0;
    scope.forEach(n=>{
      const b=DB.budgets[n.id]||emptyBudget();
      plan += b.monthlyPlan[i]||0;
      actual += ngoSpendForMonth(n.id,m);
    });
    const reported = m<=CUR_MONTH && actual>0;
    cumPlan += plan;
    if(reported) cumActual += actual;
    return {m, plan, actual, reported, cumPlan, cumActual};
  });
  const linePts = monthRows.map(r=>({
    label:monthLabel(r.m).split(" ")[0],
    cumPlan:r.cumPlan, cumActual:r.cumActual, reported:r.reported
  }));
  const planUptoScope = monthRows.filter(r=>r.m<=CUR_MONTH).reduce((s,r)=>s+r.plan,0);

  const scopeLabel = FIN_NGO==="all"
    ? `${ngos.length} partner NGO${ngos.length!==1?'s':''}`
    : ngoById(FIN_NGO).name;

  /* ----- the filter bar ----- */
  const filterBar = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <span style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:700">Showing</span>
      <select class="sel-inp" onchange="FIN_NGO=this.value;render()">
        <option value="all" ${FIN_NGO==='all'?'selected':''}>All partner NGOs</option>
        ${ngos.map(n=>`<option value="${n.id}" ${FIN_NGO===n.id?'selected':''}>${esc(n.short)} — ${esc(n.name)}</option>`).join("")}
      </select>
      ${FIN_NGO!=='all'?`<button class="btn ghost sm" onclick="FIN_NGO='all';render()">Clear filter</button>
        <a class="link" style="font-size:12px;margin-left:auto;cursor:pointer" onclick="go('ngo','${FIN_NGO}')">Open ${esc(ngoById(FIN_NGO).short)} detail →</a>`:''}
    </div>`;

  return `
  <div class="phead slim">
    <div class="eyebrow">${DB.meta.fyLabel} · to ${monthLong(CUR_MONTH)}</div>
    <h1 class="serif">Finance</h1>
    <span style="margin-left:auto;font-size:12px;color:var(--ink-3)">${esc(scopeLabel)}</span>
  </div>

  ${filterBar}

  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card">
      <div class="stat-ico blue">₹</div>
      <div><div class="stat-l">Approved Budget</div>
        <div class="stat-v">${fmtRs(totalAnnual)}</div>
        <div class="stat-sub">${FIN_NGO==='all'?'across '+scope.length+' NGOs':DB.meta.fyLabel+' plan'}</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-ico ${utilCls}">◔</div>
      <div><div class="stat-l">Utilised to ${monthLabel(CUR_MONTH)}</div>
        <div class="stat-v">${fmtRs(totalSpent)}</div>
        <div class="stat-sub" style="color:var(--${utilCls})">${portUtil}% of approved budget</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-ico blue">◑</div>
      <div><div class="stat-l">Budget remaining</div>
        <div class="stat-v">${fmtRs(Math.max(0,totalAnnual-totalSpent))}</div>
        <div class="stat-sub">${pct(Math.max(0,totalAnnual-totalSpent),totalAnnual)}% of the approved budget unspent</div></div>

let TASK_F = { ngo:"all", priority:"all", from:"", to:"" };
function setTaskFilter(field, val){ TASK_F[field]=val; render(); }
function clearTaskFilters(){ TASK_F={ngo:"all",priority:"all",from:"",to:""}; render(); }

function pageTasks(){
  let tasks = DB.tasks.slice();
  if(ME.role==="APL") tasks = tasks.filter(t=>t.aplId===ME.id);
  const ngos = visibleNgos();

  // apply filters
  const active = TASK_F.ngo!=="all" || TASK_F.priority!=="all" || TASK_F.from || TASK_F.to;
  let filtered = tasks.filter(t=>{
    if(TASK_F.ngo!=="all" && t.ngoId!==TASK_F.ngo) return false;
    if(TASK_F.priority!=="all" && t.priority!==TASK_F.priority) return false;
    if(TASK_F.from && t.due && t.due < TASK_F.from) return false;
    if(TASK_F.to && t.due && t.due > TASK_F.to) return false;
    return true;
  });

  const open = filtered.filter(t=>t.status==="Open").sort((a,b)=>a.due.localeCompare(b.due));
  const done = filtered.filter(t=>t.status==="Done");

  const taskRow = t=>{
    const n = ngoById(t.ngoId);
    const apl = userById(t.aplId);
    const overdue = t.status==="Open" && t.due && t.due<TODAY_ISO;
    const pc = t.priority==="High"?"red":t.priority==="Medium"?"amber":"gray";
    const who = apl ? apl.name.split(" ")[0] : "Unassigned";
    return `<div class="lrow">
      <button onclick="toggleTask('${t.id}')" style="width:20px;height:20px;border-radius:5px;border:1.5px solid var(--${t.status==='Done'?'green':'rule-2'});background:${t.status==='Done'?'var(--green)':'transparent'};color:#fff;font-size:12px;flex:none">${t.status==='Done'?'✓':''}</button>
      <div class="meta">
        <div class="t" style="${t.status==='Done'?'text-decoration:line-through;color:var(--ink-3)':''}">${esc(t.title)}</div>
        <div class="s">${esc(n?n.short:'—')} · ${esc(who)} · due ${t.due}${overdue?' <b style="color:var(--red)">overdue</b>':''}</div>
      </div>
      <span class="badge ${pc}">${t.priority}</span>
    </div>`;
  };

  const filterBar = `
    <div class="filter-bar">
      <div class="ff">
        <label>Partner NGO</label>
        <select class="sel-inp" onchange="setTaskFilter('ngo',this.value)">
          <option value="all" ${TASK_F.ngo==='all'?'selected':''}>All NGOs</option>
          ${ngos.map(n=>`<option value="${n.id}" ${TASK_F.ngo===n.id?'selected':''}>${esc(n.short)}</option>`).join("")}
        </select>
      </div>
      <div class="ff">
        <label>Priority</label>
        <select class="sel-inp" onchange="setTaskFilter('priority',this.value)">
          <option value="all" ${TASK_F.priority==='all'?'selected':''}>Any priority</option>
          ${["High","Medium","Low"].map(p=>`<option value="${p}" ${TASK_F.priority===p?'selected':''}>${p}</option>`).join("")}
        </select>
      </div>
      <div class="ff">
        <label>Due from</label>
        <input type="date" class="sel-inp" value="${TASK_F.from}" onchange="setTaskFilter('from',this.value)">
      </div>
      <div class="ff">
        <label>Due to</label>
        <input type="date" class="sel-inp" value="${TASK_F.to}" onchange="setTaskFilter('to',this.value)">
      </div>
      ${active?`<button class="btn ghost sm" style="align-self:flex-end" onclick="clearTaskFilters()">Clear filters</button>`:''}
    </div>`;

  return `
  <div class="phead">
    <div class="phead-row">
      <div>
        <div class="eyebrow">Action items</div>
        <h1 class="serif">Tasks</h1>
        <div class="desc">${ME.role==="PM"?"Open work items across all partnership leads.":"Your open work items."}</div>
      </div>
      ${canEdit()?`<button class="btn accent" onclick="openTaskForm()">+ New task</button>`:''}
    </div>
  </div>
  ${filterBar}
  <div class="panel">
    <div class="panel-h"><h3>Open</h3><span class="note">${open.length} item${open.length!==1?'s':''}${active?' · filtered':''}</span></div>
    ${open.length? open.map(taskRow).join("")
      : `<div class="empty"><div class="mk">✓</div><p>${active?'No open tasks match these filters.':'Nothing open — all caught up.'}</p></div>`}
  </div>
  ${done.length?`<div class="panel" style="margin-top:16px">
    <div class="panel-h"><h3>Completed</h3><span class="note">${done.length} item${done.length!==1?'s':''}</span></div>
    ${done.map(taskRow).join("")}
  </div>`:''}`;
}
async function toggleTask(id){
  if(blockIfReadOnly()) return;
  const t = DB.tasks.find(x=>x.id===id);
  t.status = t.status==="Done"?"Open":"Done";
  await saveDB();
  render();
}
function openTaskForm(){
  if(blockIfReadOnly()) return;
  const ngos = visibleNgos();
  const body = `
    <div class="field">
      <label>Task</label>
      <input type="text" id="tfTitle" placeholder="e.g. Field verification visit to VNCS"/>
    </div>
    <div class="frow">
      <div class="field">
        <label>NGO</label>
        <select id="tfNgo">${ngos.map(n=>`<option value="${n.id}">${esc(n.short)}</option>`).join("")}</select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="tfPri"><option>High</option><option selected>Medium</option><option>Low</option></select>
      </div>
    </div>
    <div class="field">
      <label>Due date</label>
      <input type="date" id="tfDue" value="2026-02-15"/>
    </div>`;
  showModal(modalShell("New task","Add a Task",body,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn primary" onclick="saveTask()">Create task</button>`));
}
async function saveTask(){
  const title = el("tfTitle").value.trim();
  if(!title){ toast("Add a task title"); return; }
  const ngoId = el("tfNgo").value;
  // assign to the first APL covering this NGO (if any)
  const apl = (DB.users||[]).find(u=>u.role==="APL" && Array.isArray(u.ngoIds) && u.ngoIds.includes(ngoId));
  DB.tasks.push({ id:genId("t"), ngoId, aplId: apl?apl.id:"",
    title, due:el("tfDue").value, status:"Open", priority:el("tfPri").value });
  await saveDB();
  closeModal();
  render();
  toast("Task created");
}
